// ═══════════════════════════════════════════════════════════════
// ROTA BUILDER — slot-based, rows=dates
// ═══════════════════════════════════════════════════════════════

function RotaBuilder({rota,setRota,leaveEntries,setLeaveEntries,staff,dayNotes,setDayNotes,availability,addAudit,currentUser,wteConfig,staffHours,hoursCorrections,setHoursCorrections,trainingDays,staffShiftOverrides,constraintRules,sysRules,genRules}) {
  const [selQ,setSelQ]=useState("Q1");
  const [assignModal,setAM]=useState(null); // {date, slotKey}
  const [leaveModal,setLM]=useState(null);  // {date}
  const [noteModal,setNM]=useState(null);
  const [noteText,setNT]=useState("");
  const [leaveForm,setLF]=useState({init:"",type:"SL",note:""});
  const today=fmtISO(new Date());

  const q=QUARTERS.find(x=>x.id===selQ)||QUARTERS[0];
  const quarterDates=useMemo(()=>getDatesInRange(q.start,q.end),[q.start,q.end]);
  const activeStaff=staff.filter(s=>s.role==="staff"&&s.active);
  const tdMap=useMemo(()=>Object.fromEntries((trainingDays||[]).map(t=>[t.date,t])),[trainingDays]);

  const assignSlot=(date,slotKey,init)=>{
    setRota(p=>({...p,[date]:{...(p[date]||{}),[slotKey]:init||null}}));
    addAudit(currentUser.init,"Slot Assigned",`${slotKey} on ${date} → ${init||"cleared"}`);
    setAM(null);
  };

  const addLeave=()=>{
    if(!leaveForm.init||!leaveForm.type) return;
    setLeaveEntries(p=>({...p,[leaveModal.date]:[...(p[leaveModal.date]||[]),{...leaveForm,id:Date.now()}]}));
    addAudit(currentUser.init,"Leave Added",`${leaveForm.init} ${LEAVE_T[leaveForm.type]?.label} on ${leaveModal.date}`);
    setLM(null); setLF({init:"",type:"SL",note:""});
  };
  const removeLeave=(date,id)=>{
    setLeaveEntries(p=>({...p,[date]:(p[date]||[]).filter(x=>x.id!==id)}));
  };

  const saveNote=()=>{
    noteText.trim()?setDayNotes(p=>({...p,[noteModal]:noteText.trim()})):setDayNotes(p=>{const n={...p};delete n[noteModal];return n;});
    setNM(null);
  };

  // For a given date+slot, get assigned staff
  const getAssigned=(date,slotKey)=>(rota[date]||{})[slotKey];

  // Get availability status of a staff member on a date
  const getAvail = (init, date) => getAvailEntry(availability, init, date);

  // Precompute double-booked inits per date (staff in >1 slot same day)
  const doubleBooks = useMemo(() => {
    const out = {};
    quarterDates.forEach(date => {
      const vals = Object.values(rota[date]||{}).filter(Boolean);
      const seen = {};
      vals.forEach(init => { seen[init] = (seen[init]||0) + 1; });
      const dupes = new Set(Object.entries(seen).filter(([,c])=>c>1).map(([init])=>init));
      if (dupes.size) out[date] = dupes;
    });
    return out;
  }, [quarterDates, rota]);

  // Warn: assigned staff has any system-rule conflict on a given date
  const hasConflict = (init, date) => {
    if (!init) return false;
    const av = getAvail(init, date);
    if (sysRules?.unavailConflict?.enabled !== false && (av?.base==="UNAVAILABLE"||av?.base==="SL"||av?.base==="MILITARY"||av?.base==="PHEM")) return true;
    if (sysRules?.leaveEntryClash?.enabled !== false) {
      const avBase = av?.base;
      // Only flag if availability isn't already blocking (avoids double-counting)
      if (avBase !== "UNAVAILABLE" && avBase !== "SL" && avBase !== "MILITARY" && avBase !== "PHEM") {
        if ((leaveEntries[date]||[]).some(e=>e.init===init)) return true;
      }
    }
    if (sysRules?.doubleBook?.enabled !== false && doubleBooks[date]?.has(init)) return true;
    return false;
  };

  // Check if assignment violates a constraint rule
  const hasRuleWarning = (init, date, slotKey) => {
    if (!init || !constraintRules?.length) return false;
    const sl = SLOTS.find(s=>s.key===slotKey);
    const dow = new Date(date+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long"});
    return constraintRules.some(r=>r.active&&r.init===init&&(
      (r.type==="avoid_day"&&r.dayOfWeek===dow)||
      (r.type==="avoid_slot_group"&&sl&&r.slotGroup===sl.grp)
    ));
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6}}>
          {QUARTERS.map(qv=>(
            <button key={qv.id} onClick={()=>setSelQ(qv.id)}
              className={`btn${selQ===qv.id?" bp":" bs"}`} style={{fontSize:12,padding:"5px 12px"}}>
              {qv.label}
            </button>
          ))}
        </div>
        <div className="al al-i" style={{margin:0,padding:"6px 11px",fontSize:11.5}}>
          💡 Click a slot cell to assign · Click a date to add a note · <strong style={{color:"#ef4444"}}>Red</strong> = conflict · <strong style={{color:"#f97316"}}>Orange</strong> = grade mismatch · <strong style={{color:"#f59e0b"}}>Amber</strong> = rule warning · 🟢 = preferred
        </div>
      </div>

      <div className="bld-layout">
      <div className="bld-wrap" style={{flex:1,minWidth:0,overflowY:"auto",maxHeight:"calc(100vh - 180px)"}}>
        <table className="bld-tbl">
          <thead>
            <tr>
              <th className="bld-date-col" style={{background:"#f8fafc",position:"sticky",left:0,zIndex:5}}>Date</th>
              {/* Group headers */}
              {SLOTS.map(sl=>(
                <th key={sl.key} style={{background:sl.bg,color:sl.fg,borderColor:sl.bd,padding:"4px 3px",minWidth:44}}>
                  <div style={{fontSize:8.5,fontWeight:800}}>{sl.key}</div>
                  {sl.hdr&&<div style={{fontSize:7,opacity:.8,marginTop:1}}>{sl.hdr}</div>}
                </th>
              ))}
              <th style={{background:"#fef9c3",color:"#713f12",fontSize:9,fontWeight:700,minWidth:120,padding:"4px 6px"}}>Leave / Away</th>
            </tr>
          </thead>
          <tbody>
            {quarterDates.map(date=>{
              const we=isWeekend(date),isBH=!!BH[date],isToday=date===today;
              const dateSlots=getSlotsForDay(date);
              const dayLeave=leaveEntries[date]||[];
              const note=dayNotes[date];
              const conflicts=SLOTS.map(sl=>{const init=getAssigned(date,sl.key);return init&&hasConflict(init,date)?init:null;}).filter(Boolean);
              const td=tdMap[date];
              return (
                <tr key={date} className={we?"we-row":""} style={td?{background:td.type==="SpR"?"rgba(254,240,138,.25)":"rgba(243,232,255,.25)"}:undefined}>
                  <td className={`bld-date-col${we?" we-row":""}${isBH?" bh-row":""}${isToday?" td-row":""}`}
                    style={{cursor:"pointer"}} onClick={()=>{setNM(date);setNT(dayNotes[date]||"");}}>
                    <div style={{fontSize:12,fontWeight:700,color:isToday?"#065f46":we?"#6d28d9":"#0d1b2a"}}>{getDayName(date)} {new Date(date+"T00:00:00").getDate()}</div>
                    <div style={{fontSize:9.5,color:"#94a3b8"}}>{new Date(date+"T00:00:00").toLocaleDateString("en-GB",{month:"short",year:"numeric"})}</div>
                    {isBH&&<div style={{fontSize:8,background:"#fde047",color:"#713f12",padding:"1px 4px",borderRadius:2,marginTop:2}}>{BH[date]}</div>}
                    {td&&<div style={{fontSize:8,background:td.type==="SpR"?"#fef08a":"#e9d5ff",color:td.type==="SpR"?"#713f12":"#6b21a8",padding:"1px 4px",borderRadius:2,marginTop:2,fontWeight:700}}>{td.type} Training</div>}
                    {note&&<div style={{fontSize:8,color:"#92400e",marginTop:2}}>📌 {note.slice(0,20)}</div>}
                    {conflicts.length>0&&<div style={{fontSize:8,color:"#ef4444",fontWeight:700,marginTop:2}}>⚠️ Conflict</div>}
                  </td>
                  {SLOTS.map(sl=>{
                    const applicable=dateSlots.some(s=>s.key===sl.key);
                    const init=getAssigned(date,sl.key);
                    const av = init ? getAvail(init, date) : null;
                    const staffMember = init ? activeStaff.find(s=>s.init===init) : null;
                    const conflict = init && hasConflict(init, date);
                    const gradeWarn = !conflict && init && sysRules?.gradeMismatch?.enabled !== false && staffMember && genRules?.slotGrades?.[sl.key] && !genRules.slotGrades[sl.key].includes(staffMember.grade);
                    const ruleWarn = !conflict && !gradeWarn && hasRuleWarning(init, date, sl.key);
                    const pref = init && av?.base && !conflict
                      ? isSlotPreferred(availability, init, date, sl.key, staffMember?.grade)
                      : false;
                    const availCount = applicable ? activeStaff.filter(s=>isSlotPreferred(availability,s.init,date,sl.key,s.grade)).length : 0;
                    if(!applicable) return <td key={sl.key} className="slot-cell disabled"><span style={{fontSize:9,color:"#e2e8f0"}}>—</span></td>;
                    return (
                      <td key={sl.key} className="slot-cell" style={{border:conflict?"2px solid #ef4444":gradeWarn?"2px solid #f97316":ruleWarn?"2px solid #f59e0b":"",background:init?sl.bg+"80":"white"}}
                        onClick={()=>setAM({date,slotKey:sl.key})}>
                        {init?(
                          <span className="slot-chip" style={{background:sl.bg,color:conflict?"#ef4444":sl.fg,borderColor:conflict?"#ef4444":gradeWarn?"#f97316":ruleWarn?"#f59e0b":sl.bd,border:conflict?"2px solid #ef4444":gradeWarn?"2px solid #f97316":ruleWarn?"2px solid #f59e0b":"1px solid "+sl.bd}}>
                            {init.slice(0,4)}
                            {gradeWarn && <span className="avail-dot" style={{background:"#f97316"}} title="Grade mismatch"/>}
                            {ruleWarn && !gradeWarn && <span className="avail-dot" style={{background:"#f59e0b"}} title="Rule warning"/>}
                            {pref && !ruleWarn && !gradeWarn && <span className="avail-dot" style={{ background: sl.fg || "#94a3b8" }} title="preferred" />}
                          </span>
                        ):<span className="slot-empty"/>}
                        {availCount>0&&<div style={{fontSize:8,background:"#dcfce7",color:"#14532d",borderRadius:8,padding:"0 3px",marginTop:1,lineHeight:"12px"}}>{availCount}✓</div>}
                      </td>
                    );
                  })}
                  <td style={{padding:"4px 6px",minWidth:120,verticalAlign:"top"}}>
                    {dayLeave.map(e=>{const lt=LEAVE_T[e.type];return lt?(
                      <div key={e.id} className="leave-row" style={{background:lt.bg,color:lt.fg,marginBottom:2}}>
                        <span>{e.init}</span><span style={{fontSize:8.5}}>{lt.abbr}</span>
                        <span style={{cursor:"pointer",fontSize:10,opacity:.7}} onClick={()=>removeLeave(date,e.id)}>×</span>
                      </div>
                    ):null;})}
                    <button className="btn bs bsm" style={{fontSize:9.5,padding:"2px 7px",marginTop:dayLeave.length>0?3:0}} onClick={()=>{setLM({date});setLF({init:"",type:"SL",note:""});}}>+ Leave</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <StaffStatsSidebar
        staff={activeStaff}
        rota={rota}
        wteConfig={wteConfig}
        staffHours={staffHours}
        selQ={selQ}
        leaveEntries={leaveEntries}
        hoursCorrections={hoursCorrections}
        setHoursCorrections={setHoursCorrections}
        addAudit={addAudit}
        currentUser={currentUser}
        availability={availability}
        staffShiftOverrides={staffShiftOverrides}
      />
      </div>

      {/* Assign slot modal */}
      {assignModal&&(()=>{
        const sl=SLOTS.find(s=>s.key===assignModal.slotKey);
        const cur=getAssigned(assignModal.date,assignModal.slotKey);
        const daySlots=getSlotsForDay(assignModal.date);
        const alreadyAssigned=new Set(Object.values(rota[assignModal.date]||{}).filter(Boolean));
        return (
          <Modal title={`Assign — ${sl?.label} · ${getDayName(assignModal.date)} ${fmtDisp(assignModal.date)}`} onClose={()=>setAM(null)}
            footer={<><button className="btn bs" onClick={()=>setAM(null)}>Cancel</button>{cur&&<button className="btn bd" onClick={()=>assignSlot(assignModal.date,assignModal.slotKey,null)}>Clear</button>}</>}>
            {BH[assignModal.date]&&<div className="al al-w" style={{marginBottom:12}}>🎉 Bank Holiday: {BH[assignModal.date]}</div>}
            {cur&&<div className="al al-i" style={{marginBottom:12}}>Currently: <strong>{staff.find(s=>s.init===cur)?.name||cur}</strong></div>}
            {(()=>{
              const groups={avail:[],none:[],blocked:[]};
              activeStaff.forEach(s=>{
                const av = getAvail(s.init, assignModal.date);
                const avBase = av?.base;
                const isBlocked = avBase==="UNAVAILABLE"||avBase==="SL"||avBase==="MILITARY";
                const isPreferred = !isBlocked && isSlotPreferred(availability, s.init, assignModal.date, assignModal.slotKey, s.grade);
                if(isPreferred) groups.avail.push(s);
                else if(isBlocked) groups.blocked.push(s);
                else groups.none.push(s);
              });
              const sort=arr=>[...arr].sort((a,b)=>a.name.localeCompare(b.name));
              const renderStaff=(arr,groupLabel)=>{
                if(arr.length===0) return null;
                return (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:"#94a3b8",marginBottom:5}}>{groupLabel}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                      {arr.map(s=>{
                        const av = getAvail(s.init, assignModal.date);
                        const avBase = av?.base;
                        const isBlocked = avBase==="UNAVAILABLE"||avBase==="SL"||avBase==="MILITARY";
                        const isPreferred = !isBlocked && isSlotPreferred(availability, s.init, assignModal.date, assignModal.slotKey, s.grade);
                        const busy = alreadyAssigned.has(s.init) && s.init !== cur;
                        const isSelected = s.init === cur;
                        return (
                          <button key={s.id} onClick={()=>!busy&&assignSlot(assignModal.date,assignModal.slotKey,s.init)}
                            style={{
                              padding:"8px 10px",
                              border:`2px solid ${isSelected?"#10b981":isPreferred?"#86efac":isBlocked?"#fca5a5":"#e2e8f0"}`,
                              borderLeft:`4px solid ${isSelected?"#10b981":isPreferred?"#22c55e":isBlocked?"#ef4444":"#e2e8f0"}`,
                              borderRadius:8,
                              background:isSelected?"#f0fdf4":isPreferred?"#f0fdf4":isBlocked?"#fff5f5":busy?"#f9f9f9":"white",
                              cursor:busy?"not-allowed":"pointer",
                              opacity:isBlocked?0.65:busy?0.5:1,
                              textAlign:"left",
                              transition:"all .1s"
                            }}>
                            <div style={{fontSize:11.5,fontWeight:700,color:isSelected?"#065f46":"#0d1b2a"}}>{s.name.split(" ")[0]} <span style={{opacity:.6,fontSize:10}}>{s.name.split(" ")[1]?.[0]}.</span></div>
                            <div style={{fontSize:10,color:"#64748b",marginTop:2,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                              {s.grade}
                              {isPreferred&&<span style={{padding:"1px 4px",borderRadius:3,background:"#d1fae5",color:"#065f46",fontWeight:700,fontSize:9}}>✓ avail</span>}
                              {isBlocked&&avBase&&<span style={{padding:"1px 4px",borderRadius:3,background:"#fee2e2",color:"#7f1d1d",fontWeight:700,fontSize:9}}>{avBase}</span>}
                              {busy&&<span style={{fontSize:9,color:"#94a3b8"}}>on shift</span>}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              };
              return (
                <div>
                  {renderStaff(sort(groups.avail),"✓ Available for this slot")}
                  {renderStaff(sort(groups.none),"No preference set")}
                  {renderStaff(sort(groups.blocked),"Unavailable / Leave")}
                </div>
              );
            })()}
          </Modal>
        );
      })()}

      {/* Leave modal */}
      {leaveModal&&(
        <Modal title={`Add Leave — ${getDayName(leaveModal.date)} ${fmtDisp(leaveModal.date)}`} onClose={()=>setLM(null)}
          footer={<><button className="btn bs" onClick={()=>setLM(null)}>Cancel</button><button className="btn bp" onClick={addLeave}>Add</button></>}>
          <div className="fg"><label className="fl">Staff Member</label>
            <select className="fi" value={leaveForm.init} onChange={e=>setLF(f=>({...f,init:e.target.value}))}>
              <option value="">Select staff...</option>{activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Leave Type</label>
            <select className="fi" value={leaveForm.type} onChange={e=>setLF(f=>({...f,type:e.target.value}))}>
              {Object.entries(LEAVE_T).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Note (optional)</label><input className="fi" value={leaveForm.note} onChange={e=>setLF(f=>({...f,note:e.target.value}))}/></div>
        </Modal>
      )}

      {/* Note modal */}
      {noteModal&&(
        <Modal title={`📌 Day Note — ${fmtDisp(noteModal)}`} onClose={()=>setNM(null)}
          footer={<><button className="btn bs" onClick={()=>setNM(null)}>Cancel</button><button className="btn bp" onClick={saveNote}>Save</button></>}>
          <textarea className="fta" value={noteText} onChange={e=>setNT(e.target.value)} placeholder="e.g. Short staffed — cover needed" style={{minHeight:80}}/>
        </Modal>
      )}
    </div>
  );
}

function MyShifts({user,rota,leaveEntries,dayNotes}) {
  const today=fmtISO(new Date());
  const mySlots=useMemo(()=>{
    const res=[];
    Object.entries(rota).forEach(([d,slots])=>{
      Object.entries(slots).forEach(([sk,init])=>{if(init===user.init){const sl=SLOTS.find(s=>s.key===sk);if(sl)res.push({date:d,slot:sl});}});
    });
    Object.entries(leaveEntries).forEach(([d,entries])=>{
      entries.forEach(e=>{if(e.init===user.init){const lt=LEAVE_T[e.type];if(lt)res.push({date:d,slot:{...lt,key:e.type}});}});
    });
    return res.sort((a,b)=>a.date.localeCompare(b.date));
  },[rota,leaveEntries,user]);

  const upcoming=mySlots.filter(x=>x.date>=today), past=mySlots.filter(x=>x.date<today);
  const counts=mySlots.reduce((a,x)=>{a[x.slot.key]=(a[x.slot.key]||0)+1;return a;},{});

  return (
    <div>
      <div className="sg" style={{gridTemplateColumns:"repeat(3,1fr)",marginBottom:18}}>
        <div className="sc" style={{"--sc-bg":"linear-gradient(135deg,#10b981,#059669)"}}><span className="sc-icon">📅</span><div className="sv">{mySlots.length}</div><div className="sl">Total Shifts</div></div>
        <div className="sc" style={{"--sc-bg":"linear-gradient(135deg,#6366f1,#4f46e5)"}}><span className="sc-icon">⏩</span><div className="sv">{upcoming.length}</div><div className="sl">Upcoming</div></div>
        <div className="sc" style={{"--sc-bg":"linear-gradient(135deg,#f59e0b,#d97706)"}}><span className="sc-icon">✅</span><div className="sv">{past.length}</div><div className="sl">Completed</div></div>
      </div>
      <div className="dg2">
        <div className="card">
          <div className="ch"><span className="ct">Upcoming Shifts</span></div>
          <div className="cb" style={{maxHeight:380,overflowY:"auto"}}>
            {upcoming.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No upcoming shifts assigned.</p>
              :upcoming.map((x,i)=>{const dt=new Date(x.date+"T00:00:00"),note=dayNotes[x.date];return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:11,padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{textAlign:"center",width:36,flexShrink:0}}>
                    <div style={{fontSize:17,fontWeight:800,fontFamily:"'Plus Jakarta Sans',sans-serif",color:"#0d1b2a"}}>{dt.getDate()}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>{dt.toLocaleDateString("en-GB",{month:"short"})}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600}}>{dt.toLocaleDateString("en-GB",{weekday:"long"})}</div>
                    <span className="chip" style={{background:x.slot.bg,color:x.slot.fg,borderColor:x.slot.bd,fontSize:10.5}}>{x.slot.label}</span>
                    {note&&<div style={{fontSize:10,color:"#92400e",marginTop:2}}>📌 {note}</div>}
                  </div>
                </div>
              );})}
          </div>
        </div>
        <div className="card">
          <div className="ch"><span className="ct">Shift Breakdown</span></div>
          <div className="cb">
            {mySlots.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No shifts assigned yet.</p>
              :Object.entries(counts).map(([k,c])=>{const sl=SLOTS.find(s=>s.key===k)||LEAVE_T[k];if(!sl)return null;const tot=mySlots.length;return(
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span className="chip" style={{background:sl.bg,color:sl.fg,borderColor:sl.bd,fontSize:10,width:85,textAlign:"center"}}>{sl.label||k}</span>
                  <div className="rt"><div className="rf" style={{width:`${(c/tot)*100}%`,background:sl.fg}}/></div>
                  <span style={{fontSize:11,color:"#64748b",width:22,textAlign:"right"}}>{c}</span>
                </div>
              );})}
          </div>
        </div>
      </div>
    </div>
  );
}

const LEAVE_RECORD_TYPES=["SL","MILITARY","FELLOW","PHEM","RESEARCH"];

function MyLeaveRecords({user,leaveEntries,requests,availability}) {
  const init=user.init;
  // Collect all leave records from all sources, deduplicated by date+type
  const records=useMemo(()=>{
    const map=new Map(); // key = `${date}|${type}` → record object
    const add=(date,type,source,note)=>{
      const k=`${date}|${type}`;
      if(!map.has(k)) map.set(k,{date,type,source,note:note||""});
    };
    // From leaveEntries state
    Object.entries(leaveEntries||{}).forEach(([d,es])=>{
      es.filter(e=>e.init===init&&LEAVE_RECORD_TYPES.includes(e.type))
        .forEach(e=>add(d,e.type,"leave entry",e.note||""));
    });
    // From availability base entries (staff marked day in availability form)
    if(availability&&availability[init]){
      Object.entries(availability[init]).forEach(([d,raw])=>{
        const e=normaliseAvailEntry(raw);
        if(e&&LEAVE_RECORD_TYPES.includes(e.base)) add(d,e.base,"availability","");
      });
    }
    // From requests (all statuses — show request status)
    (requests||[]).filter(r=>(r.staffInitials===init||r.init===init)&&LEAVE_RECORD_TYPES.includes(r.type))
      .forEach(r=>{
        const ds=getDatesInRange(r.startDate,r.endDate);
        const src=`request (${r.status})`;
        ds.forEach(d=>add(d,r.type,src,r.reason||""));
      });
    return [...map.values()].sort((a,b)=>b.date.localeCompare(a.date));
  },[init,leaveEntries,availability,requests]);

  // Group by type for summary
  const summary=LEAVE_RECORD_TYPES.map(t=>({type:t,count:records.filter(r=>r.type===t).length})).filter(s=>s.count>0);
  const [filter,setFilter]=useState("all");
  const visible=filter==="all"?records:records.filter(r=>r.type===filter);

  const typeColor={
    SL:{bg:"#fef3c7",fg:"#92400e"},
    MILITARY:{bg:"#dcfce7",fg:"#14532d"},
    FELLOW:{bg:"#e0f2fe",fg:"#075985"},
    PHEM:{bg:"#fae8ff",fg:"#6b21a8"},
    RESEARCH:{bg:"#f0fdf4",fg:"#166534"},
  };
  const typeLabel=t=>(LEAVE_T[t]?.label||t);

  return (
    <div>
      {/* Summary stat cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:16}}>
        {LEAVE_RECORD_TYPES.map(t=>{
          const cnt=records.filter(r=>r.type===t).length;
          const col=typeColor[t]||{bg:"#f1f5f9",fg:"#475569"};
          return (
            <div key={t} className="card" style={{padding:"12px 14px",textAlign:"center",cursor:"pointer",border:`2px solid ${filter===t?"#6366f1":"transparent"}`,transition:"border .15s"}}
              onClick={()=>setFilter(f=>f===t?"all":t)}>
              <div style={{fontSize:28,fontWeight:800,color:col.fg,lineHeight:1}}>{cnt}</div>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginTop:4}}>{typeLabel(t)}</div>
              {user[t.toLowerCase()+"Days"]>0&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>of {user[t.toLowerCase()+"Days"]} days</div>}
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="ch">
          <span className="ct">📒 Leave Records — {user.name}</span>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>Filter:</span>
            <div className="mtog">
              <button className={`mtog-btn${filter==="all"?" act":""}`} onClick={()=>setFilter("all")}>All ({records.length})</button>
              {summary.map(s=>(
                <button key={s.type} className={`mtog-btn${filter===s.type?" act":""}`} onClick={()=>setFilter(s.type)}>
                  {typeLabel(s.type)} ({s.count})
                </button>
              ))}
            </div>
          </div>
        </div>
        <div className="cb" style={{padding:0}}>
          {visible.length===0
            ?<p style={{color:"#94a3b8",fontSize:12,padding:"18px 18px"}}>No leave records found.</p>
            :<table className="tbl" style={{width:"100%"}}>
              <thead>
                <tr>
                  <th style={{textAlign:"left",padding:"8px 14px",fontWeight:700,fontSize:11,color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>Date</th>
                  <th style={{textAlign:"left",padding:"8px 10px",fontWeight:700,fontSize:11,color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>Type</th>
                  <th style={{textAlign:"left",padding:"8px 10px",fontWeight:700,fontSize:11,color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>Source</th>
                  <th style={{textAlign:"left",padding:"8px 10px",fontWeight:700,fontSize:11,color:"#475569",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>Note</th>
                </tr>
              </thead>
              <tbody>{visible.map((r,i)=>{
                const col=typeColor[r.type]||{bg:"#f1f5f9",fg:"#475569"};
                return (
                  <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                    <td style={{padding:"7px 14px",fontWeight:600,fontSize:12.5,color:"#1e293b"}}>{fmtDisp(r.date)}</td>
                    <td style={{padding:"7px 10px"}}>
                      <span style={{display:"inline-block",padding:"2px 8px",borderRadius:5,fontSize:11,fontWeight:700,background:col.bg,color:col.fg}}>{typeLabel(r.type)}</span>
                    </td>
                    <td style={{padding:"7px 10px",fontSize:11.5,color:"#64748b",textTransform:"capitalize"}}>{r.source}</td>
                    <td style={{padding:"7px 10px",fontSize:11.5,color:"#64748b"}}>{r.note||<span style={{color:"#cbd5e1"}}>—</span>}</td>
                  </tr>
                );
              })}</tbody>
            </table>}
        </div>
        <div style={{padding:"7px 14px",borderTop:"1px solid #f1f5f9",fontSize:10.5,color:"#94a3b8"}}>
          Records combined from leave entries, availability form entries &amp; submitted requests · sorted newest first
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// REQUESTS
// ═══════════════════════════════════════════════════════════════

function RequestsView({user,requests,setRequests,addAudit,swaps,setSwaps,rota,setRota,staff}) {
  const isAdmin=user.role==="admin";
  const [tab,setTab]=useState("leave");

  // ── Leave state ──
  const [showForm,setSF]=useState(false);
  const [form,setForm]=useState({type:"SL",startDate:"",endDate:"",reason:""});
  const [actM,setActM]=useState(null); const [note,setNote]=useState("");
  const [filter,setFilter]=useState("all");

  // ── Swap state ──
  const [swapModal,setSwapModal]=useState(false);
  const [swapForm,setSwapForm]=useState({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});
  const [respondModal,setRespondModal]=useState(null); // swap being responded to by staff B
  const [respondNote,setRespondNote]=useState("");
  const [adminSwapM,setAdminSwapM]=useState(null); // swap admin is acting on
  const [adminSwapNote,setAdminSwapNote]=useState("");

  const today=fmtISO(new Date());

  // Badge counts
  const pendingLeaveCount = isAdmin ? requests.filter(r=>r.status==="pending").length : 0;
  const pendingSwapCount  = isAdmin
    ? (swaps||[]).filter(s=>s.status==="accepted_b").length
    : (swaps||[]).filter(s=>s.toInit===user.init&&s.status==="pending_b").length;

  // ── Leave helpers ──
  const submit=()=>{
    if(!form.startDate||!form.endDate) return;
    const r={id:Date.now(),staffInitials:user.init,staffName:user.name,type:form.type,startDate:form.startDate,endDate:form.endDate,reason:form.reason,status:"pending",adminNote:"",createdAt:fmtISO(new Date())};
    setRequests(p=>[...p,r]);addAudit(user.init,"Leave Request",`${user.name} submitted ${LEAVE_T[form.type]?.label}`);
    setForm({type:"SL",startDate:"",endDate:"",reason:""});setSF(false);
  };
  const act=action=>{setRequests(p=>p.map(r=>r.id===actM.id?{...r,status:action,adminNote:note}:r));addAudit(user.init,`Request ${action}`,`${LEAVE_T[actM.type]?.label} for ${actM.staffName}`);setActM(null);setNote("");};
  const visible=(isAdmin?requests:requests.filter(r=>r.staffInitials===user.init)).filter(r=>filter==="all"||r.status===filter);

  // ── Swap helpers ──
  // All future rota shifts for a given person
  const getMyShifts=init=>{
    const res=[];
    Object.entries(rota||{}).forEach(([date,slots])=>{
      if(date<today) return;
      Object.entries(slots).forEach(([slotKey,assigned])=>{
        if(assigned===init) res.push({date,slotKey,label:`${fmtDisp(date)} — ${slotKey}`});
      });
    });
    return res.sort((a,b)=>a.date.localeCompare(b.date));
  };

  const myShifts=useMemo(()=>getMyShifts(user.init),[rota,user.init,today]);
  const theirShifts=useMemo(()=>swapForm.targetInit?getMyShifts(swapForm.targetInit):[],[rota,swapForm.targetInit,today]);
  const activeStaff=(staff||[]).filter(s=>s.active&&s.role==="staff"&&s.init!==user.init);

  // Grade-mismatch warning
  const swapGradeWarning=useMemo(()=>{
    if(!swapForm.myShift||!swapForm.targetInit) return null;
    const me=(staff||[]).find(s=>s.init===user.init);
    const them=(staff||[]).find(s=>s.init===swapForm.targetInit);
    if(!me||!them) return null;
    if(me.grade!==them.grade) return `Grade mismatch: you are ${me.grade}, ${them.name} is ${them.grade}. Admin will need to approve this carefully.`;
    return null;
  },[swapForm.myShift,swapForm.targetInit,staff,user.init]);

  const submitSwap=()=>{
    const [myDate,mySlot]=(swapForm.myShift||"").split("|");
    if(!myDate||!mySlot||!swapForm.targetInit) return;
    const toStaff=(staff||[]).find(s=>s.init===swapForm.targetInit);
    if(!toStaff) return;
    let toDate=myDate,toSlot=null;
    if(swapForm.swapKind==="mutual"){
      const [td,ts]=(swapForm.theirShift||"").split("|");
      if(!td||!ts) return;
      toDate=td; toSlot=ts;
    }
    const sw={
      id:Date.now(),type:"swap",
      fromInit:user.init,fromName:user.name,fromDate:myDate,fromSlot:mySlot,
      toInit:toStaff.init,toName:toStaff.name,toDate,toSlot,
      swapKind:swapForm.swapKind,reason:swapForm.reason,
      status:"pending_b",bNote:"",adminNote:"",
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    };
    setSwaps(p=>[...p,sw]);
    addAudit(user.init,"Swap Request",`${user.name} requested swap with ${toStaff.name}`);
    setSwapModal(false);
    setSwapForm({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});
  };

  const respondToSwap=(sw,action)=>{
    setSwaps(p=>p.map(s=>s.id===sw.id?{...s,status:action,bNote:respondNote,updatedAt:new Date().toISOString()}:s));
    addAudit(user.init,`Swap ${action==="accepted_b"?"accepted":"declined"}`,
      `${user.name} ${action==="accepted_b"?"accepted":"declined"} swap request from ${sw.fromName}`);
    setRespondModal(null); setRespondNote("");
  };

  const applySwapToRota=(sw)=>{
    setRota(prev=>{
      const r=JSON.parse(JSON.stringify(prev));
      r[sw.fromDate]={...(r[sw.fromDate]||{})};
      if(sw.swapKind==="mutual"){
        r[sw.toDate]={...(r[sw.toDate]||{})};
        r[sw.fromDate][sw.fromSlot]=sw.toInit;
        r[sw.toDate][sw.toSlot]=sw.fromInit;
      } else {
        r[sw.fromDate][sw.fromSlot]=sw.toInit;
      }
      return r;
    });
  };

  const handleAdminSwap=(sw,action)=>{
    if(action==="approved") applySwapToRota(sw);
    setSwaps(p=>p.map(s=>s.id===sw.id?{...s,status:action,adminNote:adminSwapNote,updatedAt:new Date().toISOString()}:s));
    addAudit("ADM",`Swap ${action}`,`Swap between ${sw.fromName} and ${sw.toName} — ${action}`);
    setAdminSwapM(null); setAdminSwapNote("");
  };

  const SWAP_STATUS_LABEL={pending_b:"Awaiting peer",accepted_b:"Awaiting admin",declined_b:"Declined",approved:"Approved",rejected:"Rejected"};
  const SWAP_STATUS_CLS={pending_b:"b-pending",accepted_b:"b-pending",declined_b:"b-rejected",approved:"b-approved",rejected:"b-rejected"};

  const SwapRow=({sw,showFrom=true,showTo=true,actions=null})=>(
    <div style={{padding:"10px 0",borderBottom:"1px solid #f1f5f9",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
      <div style={{flex:"1 1 200px",minWidth:0}}>
        {showFrom&&<div style={{fontSize:12,fontWeight:600}}>{sw.fromName} <span style={{fontWeight:400,color:"#64748b"}}>→ {sw.toName}</span></div>}
        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
          {sw.swapKind==="mutual"
            ? <>{fmtDisp(sw.fromDate)} <strong>{sw.fromSlot}</strong> ⇄ {fmtDisp(sw.toDate)} <strong>{sw.toSlot}</strong></>
            : <>{fmtDisp(sw.fromDate)} <strong>{sw.fromSlot}</strong> → give away</>}
        </div>
        {sw.reason&&<div style={{fontSize:11,color:"#94a3b8",marginTop:1,fontStyle:"italic"}}>"{sw.reason}"</div>}
      </div>
      <span className={`badge ${SWAP_STATUS_CLS[sw.status]||"b-pending"}`}>{SWAP_STATUS_LABEL[sw.status]||sw.status}</span>
      {actions}
    </div>
  );

  return (
    <div>
      {/* ── Tab header ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #e2e8f0"}}>
          <button className={`btn${tab==="leave"?" bp":""}`} style={{borderRadius:0,borderRight:"1px solid #e2e8f0"}}
            onClick={()=>setTab("leave")}>
            📝 Leave Requests
            {pendingLeaveCount>0&&<span className="badge b-pending" style={{marginLeft:6}}>{pendingLeaveCount}</span>}
          </button>
          <button className={`btn${tab==="swaps"?" bp":""}`} style={{borderRadius:0}}
            onClick={()=>setTab("swaps")}>
            🔄 Shift Swaps
            {pendingSwapCount>0&&<span className="badge b-pending" style={{marginLeft:6}}>{pendingSwapCount}</span>}
          </button>
        </div>
        {tab==="swaps"&&!isAdmin&&(
          <button className="btn bp bsm" onClick={()=>setSwapModal(true)}>＋ Request Swap</button>
        )}
      </div>

      {/* ════════════════════ LEAVE TAB ════════════════════ */}
      {tab==="leave"&&(
        <div>
          {!isAdmin&&<div style={{marginBottom:14}}><button className="btn bp" onClick={()=>setSF(!showForm)}>{showForm?"✕ Cancel":"＋ New Request"}</button></div>}
          {showForm&&(
            <div className="card" style={{marginBottom:16}}>
              <div className="ch"><span className="ct">Submit Leave Request</span></div>
              <div className="cb">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">Type</label>
                    <select className="fi" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                      {Object.entries(LEAVE_T).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">Start</label><input type="date" className="fi" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/></div>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">End</label><input type="date" className="fi" value={form.endDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}/></div>
                </div>
                <div className="fg" style={{marginTop:12,marginBottom:0}}><label className="fl">Notes</label><textarea className="fta" value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}/></div>
                <div style={{marginTop:12}}><button className="btn bp" onClick={submit}>Submit</button></div>
              </div>
            </div>
          )}
          <div className="card">
            <div className="ch">
              <span className="ct">{isAdmin?"All Leave Requests":"My Requests"}</span>
              <div style={{display:"flex",gap:5}}>
                {["all","pending","approved","rejected"].map(f=><button key={f} className={`btn bsm${filter===f?" bp":""}`} onClick={()=>setFilter(f)} style={{textTransform:"capitalize"}}>{f}</button>)}
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
            <table className="tbl">
              <thead><tr>{isAdmin&&<th>Staff</th>}<th>Type</th><th>From</th><th>To</th><th>Reason</th><th>Status</th>{isAdmin&&<th>Actions</th>}</tr></thead>
              <tbody>
                {visible.length===0?<tr><td colSpan={isAdmin?7:6} style={{textAlign:"center",color:"#94a3b8",padding:24}}>No requests found.</td></tr>
                  :visible.map(r=>{const lt=LEAVE_T[r.type];return(
                    <tr key={r.id}>
                      {isAdmin&&<td style={{fontWeight:600}}>{r.staffName}</td>}
                      <td>{lt&&<span className="chip" style={{background:lt.bg,color:lt.fg,borderColor:lt.bd,fontSize:10.5}}>{lt.label}</span>}</td>
                      <td>{fmtDisp(r.startDate)}</td><td>{fmtDisp(r.endDate)}</td>
                      <td style={{maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"#64748b"}}>{r.reason||"—"}</td>
                      <td><span className={`badge b-${r.status}`}>{r.status}</span></td>
                      {isAdmin&&<td>{r.status==="pending"?<div style={{display:"flex",gap:5}}><button className="btn bp bsm" onClick={()=>{setActM(r);setNote("");}}>✓</button><button className="btn bd bsm" onClick={()=>{setActM({...r,_rej:true});setNote("");}}>✗</button></div>:<span style={{fontSize:11,color:"#94a3b8"}}>{r.adminNote||"—"}</span>}</td>}
                    </tr>
                  );})}
              </tbody>
            </table>
            </div>
          </div>
          {actM&&(
            <Modal title={actM._rej?"Reject Request":"Approve Request"} onClose={()=>setActM(null)}

            </Modal>
          )}

      )}

      {/* ════════════════════ SWAPS TAB — STAFF VIEW ════════════════════ */}
      {tab==="swaps"&&!isAdmin&&(
        <div>
          {/* Awaiting my response */}
          {(()=>{const awaiting=(swaps||[]).filter(s=>s.toInit===user.init&&s.status==="pending_b");return awaiting.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="ch"><span className="ct" style={{color:"#d97706"}}>⏳ Awaiting Your Response</span></div>

                {awaiting.map(sw=>(

                      <button className="btn bp bsm" onClick={()=>{setRespondModal({sw,action:"accepted_b"});setRespondNote("");}}>✓ Accept</button>
                      <button className="btn bd bsm" onClick={()=>{setRespondModal({sw,action:"declined_b"});setRespondNote("");}}>✗ Decline</button>

                ))}

          {/* My swap requests */}
          <div className="card">
            <div className="ch"><span className="ct">My Swap Requests</span></div>
            <div className="cb">
              {(swaps||[]).filter(s=>s.fromInit===user.init).length===0
                ?<p style={{fontSize:12,color:"#94a3b8"}}>No swap requests made yet. Click "＋ Request Swap" above to start one.</p>
                :(swaps||[]).filter(s=>s.fromInit===user.init).sort((a,b)=>b.id-a.id).map(sw=>(

              }
            </div>
          </div>
