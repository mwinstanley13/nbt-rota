// HOUR ADJUSTMENTS VIEW
// ═══════════════════════════════════════════════════════════════

function HoursAdjustView({staff,hoursCorrections,setHoursCorrections,addAudit,currentUser,wteConfig,staffHours,rota,leaveEntries}) {
  const [filterInit, setFilterInit] = useState("");
  const [targetInit, setTargetInit] = useState("");
  const [qid, setQid]               = useState("Q1");
  const [amount, setAmount]         = useState("");
  const [reason, setReason]         = useState("");
  const [isCarryFwd, setIsCarryFwd] = useState(false);

  const activeStaff = staff.filter(s => s.role==="staff" && s.active);
  const visible = [...(hoursCorrections||[])]
    .filter(c => !filterInit || c.init===filterInit)
    .sort((a,b) => b.id - a.id);

  const save = () => {
    const num = parseFloat(amount);
    if (isNaN(num) || !reason.trim() || !targetInit) return;
    const entry = {id:Date.now(),init:targetInit,qid,amount:num,reason:reason.trim(),createdBy:currentUser.init,createdAt:fmtISO(new Date()),carryForward:isCarryFwd};
    setHoursCorrections(p=>[...p,entry]);
    addAudit(currentUser.init,"Hours Correction",`${targetInit} ${qid} ${num>=0?"+":""}${num}h${isCarryFwd?" [CF]":""} — ${reason.trim()}`);
    setAmount(""); setReason(""); setIsCarryFwd(false);
  };

  const del = (id) => {
    if (!window.confirm("Delete this correction?")) return;
    setHoursCorrections(p=>p.filter(c=>c.id!==id));
    addAudit(currentUser.init,"Hours Correction Deleted",`id=${id}`);
  };

  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div className="ch"><span className="ct">Add Hours Adjustment</span></div>
        <div className="cb">
          <div className="al al-i" style={{marginBottom:14}}>
            Log a one-off hours adjustment for any staff member. Use negative values to deduct (e.g. −16 for sick cover), positive to add. A reason is required for audit purposes.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 100px 100px 1fr auto",gap:10,alignItems:"flex-end"}}>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Staff member</label>
              <select className="fi" value={targetInit} onChange={e=>setTargetInit(e.target.value)}>
                <option value="">— select —</option>
                {activeStaff.map(s=><option key={s.id} value={s.init}>{s.name} ({s.init})</option>)}
              </select>
            </div>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Quarter</label>
              <select className="fi" value={qid} onChange={e=>setQid(e.target.value)}>
                {QUARTERS.map(q=><option key={q.id} value={q.id}>{q.id}</option>)}
              </select>
            </div>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Hours (+/−)</label>
              <input type="number" className="fi" value={amount} onChange={e=>setAmount(e.target.value)} step="0.5" placeholder="e.g. −16"/>
            </div>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Reason</label>
              <input className="fi" value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Sick cover, study day"/>
            </div>
            <button className="btn bp" onClick={save} disabled={!amount||!reason.trim()||!targetInit} style={{whiteSpace:"nowrap"}}>
              Add
            </button>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:7,marginTop:12,fontSize:12.5,color:"#475569",cursor:"pointer"}}>
            <input type="checkbox" checked={isCarryFwd} onChange={e=>setIsCarryFwd(e.target.checked)} style={{width:14,height:14}}/>
            Mark as carry-forward from previous quarter
          </label>
        </div>
      </div>

      <div className="card">
        <div className="ch">
          <span className="ct">All Adjustments</span>
          <select className="fi" style={{width:180}} value={filterInit} onChange={e=>setFilterInit(e.target.value)}>
            <option value="">All staff</option>
            {activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
          </select>
        </div>
        <div style={{overflowX:"auto"}}>
          {visible.length===0
            ? <div style={{padding:24,textAlign:"center",color:"#94a3b8"}}>No adjustments recorded{filterInit ? " for this person" : ""}.</div>
            : <table className="tbl">
                <thead>
                  <tr><th>Staff</th><th>Q</th><th>Amount</th><th>Reason</th><th>Logged by</th><th>Date</th><th></th></tr>
                </thead>
                <tbody>
                  {visible.map(c=>{
                    const s = staff.find(x=>x.init===c.init);
                    return (
                      <tr key={c.id}>
                        <td style={{fontWeight:600}}>{s?.name||c.init}</td>
                        <td><span className="badge b-staff">{c.qid}</span></td>
                        <td style={{fontWeight:700,color:c.amount>=0?"#16a34a":"#ef4444"}}>{c.amount>=0?"+":""}{c.amount}h{c.carryForward&&<span style={{marginLeft:5,fontSize:9,fontWeight:700,background:"#ede9fe",color:"#4c1d95",padding:"1px 4px",borderRadius:3}}>CF</span>}</td>
                        <td>{c.reason}</td>
                        <td style={{color:"#64748b"}}>{c.createdBy}</td>
                        <td style={{color:"#94a3b8",fontSize:11}}>{c.createdAt}</td>
                        <td><button className="btn bd bsm" onClick={()=>del(c.id)}>Delete</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
          }
        </div>
      </div>
    </div>
  );
}

// YEAR SETUP VIEW
// ═══════════════════════════════════════════════════════════════

function YearSetupView({years,setYears,activeYearId,setActiveYearId,staff,
  rotaByYear,leaveByYear,availByYear,qStatusByYear,requestsByYear,notesByYear,corrsByYear,staffHoursByYear,
  swapsByYear,fixedDaysOff,wteConfig,
  setQStatusByYear,addAudit,currentUser}) {

  const addWeeks = (dateStr, weeks) => {
    const d = new Date(dateStr); d.setDate(d.getDate()+weeks*7); return fmtISO(d);
  };
  const addDays = (dateStr, n) => {
    const d = new Date(dateStr); d.setDate(d.getDate()+n); return fmtISO(d);
  };

  // Default new year: starts day after current year's Q4 end
  const latestYear = years.reduce((a,b)=>a.id>b.id?a:b, years[0]);
  const latestQ4End = latestYear?.quarters?.find(q=>q.id==="Q4")?.end || "2027-08-03";
  const defQ1Start = addDays(latestQ4End, 1);

  const defQuarters = (q1s) => [
    {id:"Q1",label:`Q1`,start:q1s,end:addDays(addWeeks(q1s,13),-1)},
    {id:"Q2",label:`Q2`,start:addWeeks(q1s,13),end:addDays(addWeeks(q1s,26),-1)},
    {id:"Q3",label:`Q3`,start:addWeeks(q1s,26),end:addDays(addWeeks(q1s,39),-1)},
    {id:"Q4",label:`Q4`,start:addWeeks(q1s,39),end:addDays(addWeeks(q1s,52),-1)},
  ];

  const [newLabel, setNewLabel] = useState("");
  const [newQ1Start, setNewQ1Start] = useState(defQ1Start);
  const [qs, setQs] = useState(() => defQuarters(defQ1Start));

  const updateQ1Start = (val) => {
    setNewQ1Start(val);
    if (val) setQs(defQuarters(val));
  };

  const createYear = () => {
    if (!newLabel.trim()) return;
    const yid = newLabel.trim().replace(/\s+/g,"-").replace(/[^a-zA-Z0-9\-]/g,"");
    if (years.find(y=>y.id===yid)) { alert("A year with this ID already exists."); return; }
    const newYear = {id:yid,label:newLabel.trim(),quarters:qs,active:true,archived:false};
    setYears(p=>[...p,newYear]);
    setQStatusByYear(p=>({...p,[yid]:{Q1:"open",Q2:"closed",Q3:"closed",Q4:"closed"}}));
    addAudit(currentUser.init,"Year Created",yid);
    setActiveYearId(yid);
    setNewLabel("");
    setNewQ1Start(defQ1Start);
  };

  const archiveYear = (yid) => {
    if (!window.confirm(`Archive "${yid}"? It will be read-only. You can still view and download it.`)) return;
    setYears(p=>p.map(y=>y.id===yid?{...y,archived:true}:y));
    if (activeYearId===yid) {
      const other = years.find(y=>y.id!==yid&&!y.archived);
      if (other) setActiveYearId(other.id);
    }
    addAudit(currentUser.init,"Year Archived",yid);
  };

  const downloadYear = (yid) => {
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Excel library not loaded yet — please wait a moment and try again."); return; }

    const yr       = years.find(y=>y.id===yid);
    const rota     = rotaByYear[yid]||{};
    const leave    = leaveByYear[yid]||{};
    const avail    = availByYear[yid]||{};
    const qStatus  = qStatusByYear[yid]||{};
    const reqs     = requestsByYear[yid]||[];
    const swaps    = swapsByYear?.[yid]||[];
    const qs       = yr?.quarters||QUARTERS;
    const allDates = Object.keys(rota).sort();
    const activeStaff = staff.filter(s=>s.role==="staff"&&s.active).sort((a,b)=>a.name.localeCompare(b.name));
    const allStaff    = staff.filter(s=>s.role==="staff").sort((a,b)=>a.name.localeCompare(b.name));
    const wte         = wteConfig||INIT_WTE_CONFIG;
    const sHours      = staffHoursByYear?.[yid]||{};
    const genDate     = new Date().toLocaleDateString("en-GB");
    const wb = XLSX.utils.book_new();
    const addSheet = (name,rows) => XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), name);

    // helpers
    const dow = d => new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short"});
    const GRP = {EARLY:"Early",MID:"Mid",LATE:"Late",WE_EARLY:"W/E Early",WE_LATE:"W/E Late",NIGHT1:"Night 1",NIGHT2:"Night 2",ST3_NIGHT:"Night ST3",ACP_NIGHT:"Night ACP"};
    const cellForStaff = (init,date) => {
      const sk = Object.entries(rota[date]||{}).find(([,v])=>v===init)?.[0];
      if(sk){const sl=SLOTS.find(x=>x.key===sk);return GRP[sl?.grp]||sk;}
      const lv=(leave[date]||[]).find(e=>e.init===init);
      return lv ? (LEAVE_T[lv.type]?.abbr||lv.type) : "";
    };
    const usedSlots = SLOTS.filter(sl=>allDates.some(d=>rota[d]?.[sl.key]));

    // ── 1. Rota (slot columns) ──────────────────────────────────────
    addSheet("Rota",[
      [`RotaFlow Export — ${yr?.label||yid}`,`Generated: ${genDate}`],
      [],
      ["Date","Day","BH",...usedSlots.map(s=>s.key)],
      ...allDates.map(d=>[d,dow(d),BH[d]||"",...usedSlots.map(s=>rota[d]?.[s.key]||"")]),
    ]);

    // ── 2. Staff View (staff as columns) ───────────────────────────
    addSheet("Staff View",[
      [`RotaFlow — Staff View — ${yr?.label||yid}`],
      [],
      ["Date","Day",...activeStaff.map(s=>s.name)],
      ["","Grade",...activeStaff.map(s=>s.grade)],
      ["","Init",...activeStaff.map(s=>s.init)],
      ...allDates.map(d=>[d,dow(d),...activeStaff.map(s=>cellForStaff(s.init,d))]),
    ]);

    // ── 3. Shift Summary (counts per type) ─────────────────────────
    const grpKeys = Object.keys(GRP);
    addSheet("Shift Summary",[
      [`RotaFlow — Shift Summary — ${yr?.label||yid}`],
      [],
      ["Name","Initials","Grade","Total",...grpKeys.map(g=>GRP[g])],
      ...activeStaff.map(s=>{
        const counts={};grpKeys.forEach(g=>{counts[g]=0;});
        allDates.forEach(d=>{const sk=Object.entries(rota[d]||{}).find(([,v])=>v===s.init)?.[0];if(sk){const sl=SLOTS.find(x=>x.key===sk);if(sl?.grp)counts[sl.grp]=(counts[sl.grp]||0)+1;}});
        const tot=Object.values(counts).reduce((a,b)=>a+b,0);
        return [s.name,s.init,s.grade,tot,...grpKeys.map(g=>counts[g]||"")];
      }),
    ]);

    // ── 4. Staff ────────────────────────────────────────────────────
    addSheet("Staff",[
      [`RotaFlow — Staff List — ${yr?.label||yid}`],
      [],
      ["Name","Initials","Grade","Role","Active","Q1 WTE","Q2 WTE","Q3 WTE","Q4 WTE"],
      ...allStaff.map(s=>[s.name,s.init,s.grade||"",s.role,s.active?"Yes":"No",
        sHours[s.init]?.Q1??1.0,sHours[s.init]?.Q2??1.0,sHours[s.init]?.Q3??1.0,sHours[s.init]?.Q4??1.0]),
    ]);

    // ── 5. Leave ────────────────────────────────────────────────────
    const leaveRows=[["Date","Day","Name","Initials","Grade","Type","Note"]];
    Object.entries(leave).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,entries])=>{
      (entries||[]).forEach(e=>{const s=staff.find(x=>x.init===e.init);leaveRows.push([date,dow(date),s?.name||e.init,e.init,s?.grade||"",e.type,e.note||""]);});
    });
    addSheet("Leave",[[`RotaFlow — Leave — ${yr?.label||yid}`],[],[...leaveRows[0]],...leaveRows.slice(1)]);

    // ── 6. Leave Requests ───────────────────────────────────────────
    const reqRows=[["Name","Initials","Type","From","To","Days","Reason","Status","Submitted"]];
    [...reqs].sort((a,b)=>(a.startDate||"").localeCompare(b.startDate||"")).forEach(r=>{
      reqRows.push([r.staffName||"",r.init||"",r.type||"",r.startDate||"",r.endDate||"",r.days||1,r.reason||"",r.status||"",r.createdAt||""]);
    });
    addSheet("Leave Requests",[[`RotaFlow — Leave Requests — ${yr?.label||yid}`],[],[...reqRows[0]],...reqRows.slice(1)]);

    // ── 7. Swaps ────────────────────────────────────────────────────
    const swapRows=[["Date","Slot","From Init","From Name","To Init","To Name","Status","Requested"]];
    [...swaps].sort((a,b)=>(a.date||"").localeCompare(b.date||"")).forEach(sw=>{
      const fS=staff.find(s=>s.init===sw.fromInit),tS=staff.find(s=>s.init===sw.toInit);
      swapRows.push([sw.date||"",sw.slotKey||"",sw.fromInit||"",fS?.name||"",sw.toInit||"",tS?.name||"",sw.status||"",sw.createdAt||""]);
    });
    addSheet("Swaps",[[`RotaFlow — Shift Swaps — ${yr?.label||yid}`],[],[...swapRows[0]],...swapRows.slice(1)]);

    // ── 8. Fixed Days Off ───────────────────────────────────────────
    const fdRows=[["Name","Initials","Day of Week","Reason"]];
    (fixedDaysOff||[]).forEach(f=>{fdRows.push([f.name||"",f.init||"",f.dayOfWeek||"",f.reason||""]);});
    addSheet("Fixed Days Off",[[`RotaFlow — Fixed Days Off`],[],[...fdRows[0]],...fdRows.slice(1)]);

    // ── 9. Availability ─────────────────────────────────────────────
    const qDates=qs.flatMap(q=>getDatesInRange(q.start,q.end));
    addSheet("Availability",[
      [`RotaFlow — Availability — ${yr?.label||yid}`],
      [],
      ["Date","Day","Quarter",...activeStaff.map(s=>s.name)],
      ["","","Init",...activeStaff.map(s=>s.init)],
      ...qDates.map(d=>{
        const q=qs.find(q=>d>=q.start&&d<=q.end);
        return [d,dow(d),q?.id||"",...activeStaff.map(s=>{
          const e=normaliseAvailEntry((avail[s.init]||{})[d]);
          return (e&&e.base&&e.base!=="ANY")?e.base:"";
        })];
      }),
    ]);

    // ── 10. Hour Adjustments ────────────────────────────────────────
    const corrections = corrsByYear?.[yid]||[];
    const corrRows=[["Quarter","Name","Initials","Amount (hrs)","Reason","Carry Forward","Created By","Date"]];
    [...corrections].sort((a,b)=>(a.qid||"").localeCompare(b.qid||"")).forEach(c=>{
      const s=staff.find(x=>x.init===c.init);
      corrRows.push([c.qid||"",s?.name||c.init||"",c.init||"",c.amount||0,c.reason||"",c.carryForward?"Yes":"No",c.createdBy||"",c.createdAt||""]);
    });
    addSheet("Hour Adjustments",[[`RotaFlow — Hour Adjustments — ${yr?.label||yid}`],[],[...corrRows[0]],...corrRows.slice(1)]);

    // ── 11. Day Notes ────────────────────────────────────────────────
    const notesData = notesByYear?.[yid]||{};
    const noteRows=[["Date","Day","Note"]];
    Object.entries(notesData).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,note])=>{
      if(note) noteRows.push([date,dow(date),note]);
    });
    addSheet("Day Notes",[[`RotaFlow — Day Notes — ${yr?.label||yid}`],[],[...noteRows[0]],...noteRows.slice(1)]);

    // ── 12. Config ──────────────────────────────────────────────────
    addSheet("Config",[
      ["RotaFlow Configuration","",`Year: ${yr?.label||yid}`,"",`Generated: ${genDate}`],
      [],
      ["=== QUARTERS ==="],
      ["Quarter","Start","End","Status"],
      ...qs.map(q=>[q.id,q.start,q.end,qStatus[q.id]||"open"]),
      [],
      ["=== WTE REFERENCE TARGETS (per quarter at 1.0 WTE) ==="],
      ["Grade","Nights","Weekends","Earlies","Mids","Lates","Hours/Q"],
      ...Object.entries(wte).map(([grade,cfg])=>[grade,cfg.nights||"",cfg.weekends||"",cfg.earlies||"",cfg.mids||"",cfg.lates||"",cfg.hoursPerQuarter||""]),
      [],
      ["=== SHIFT SLOTS ==="],
      ["Key","Label","Group","Weekday","Weekend"],
      ...SLOTS.map(s=>[s.key,s.label,s.grp,s.wd?"Yes":"No",s.we?"Yes":"No"]),
      [],
      ["=== LEAVE TYPES ==="],
      ["Code","Label"],
      ...Object.entries(LEAVE_T).map(([k,v])=>[k,v.label]),
    ]);

    XLSX.writeFile(wb,`RotaFlow-${yid}-${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  return (
    <div style={{maxWidth:780,margin:"0 auto"}}>
      <div className="card" style={{marginBottom:20}}>
        <div className="ch"><span className="ct">All Years</span></div>
        <div className="cb">
          {years.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No years configured.</p>
          :years.map(y=>(
            <div key={y.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13}}>{y.label} <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>({y.id})</span></div>
                <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
                  {y.quarters?.map(q=>`${q.id}: ${q.start}→${q.end}`).join(" · ")}
                </div>
              </div>
              {y.archived
                ? <span className="badge" style={{background:"#f1f5f9",color:"#64748b"}}>Archived</span>
                : <span className="badge b-open">{y.id===activeYearId?"Active":"Inactive"}</span>}
              {!y.archived&&y.id!==activeYearId&&<button className="btn bp bsm" onClick={()=>setActiveYearId(y.id)}>Switch to</button>}
              {!y.archived&&<button className="btn bw bsm" onClick={()=>archiveYear(y.id)}>Archive</button>}
              <button className="btn bd bsm" onClick={()=>downloadYear(y.id)}>⬇ Download</button>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="ch"><span className="ct">Create New Year</span></div>
        <div className="cb">
          <div className="al al-i" style={{marginBottom:16}}>
            Create a new rota year. Staff are shared across all years. Enter a label (e.g. "2027/28") and the Q1 start date — quarters will be calculated automatically at 13-week intervals.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Year label</label>
              <input className="fi" value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="e.g. 2027/28"/>
            </div>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Q1 start date</label>
              <input type="date" className="fi" value={newQ1Start} onChange={e=>updateQ1Start(e.target.value)}/>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:"#374151",marginBottom:8}}>Calculated quarters (edit Q1 start to adjust all):</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {qs.map((q,i)=>(
                <div key={q.id} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",fontSize:11}}>
                  <div style={{fontWeight:700,marginBottom:3}}>{q.id}</div>
                  <div style={{color:"#64748b"}}>{q.start}</div>
                  <div style={{color:"#94a3b8"}}>→ {q.end}</div>
                </div>
              ))}
            </div>
          </div>
          <button className="btn bp" onClick={createYear} disabled={!newLabel.trim()}>Create Year</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// AI ROTA BUILDER
// ═══════════════════════════════════════════════════════════════

function AIRotaView({user,staff,rota,setRota,availability,leaveEntries,quarterStatus,wteConfig,staffHours,genRules,setGenRules,shiftTimes,addAudit,quarters,activeYearId}) {
  const [tab,setTab]           = useState("rules");
  const [selQ,setSelQ]         = useState("Q1");
  const [slotFilter,setSF]     = useState("all");
  const [overwrite,setOW]      = useState("fill"); // "fill" | "overwrite" | "replace"
  const [generating,setGen]    = useState(false);
  const [genError,setErr]      = useState(null);
  const [rotaDraft,setDraft]   = useState(()=>lsGet('rotaDraft_'+activeYearId,null));
  const [conflicts,setCfls]    = useState(()=>lsGet('rotaDraftCfls_'+activeYearId,[]));
  const [accepted,setAccepted] = useState(false);
  useEffect(()=>{ rotaDraft ? lsSave('rotaDraft_'+activeYearId,rotaDraft) : localStorage.removeItem(LS_PFX+'rotaDraft_'+activeYearId); },[rotaDraft]);
  useEffect(()=>{ lsSave('rotaDraftCfls_'+activeYearId,conflicts); },[conflicts]);

  const activeStaff = staff.filter(s=>s.role==="staff"&&s.active);
  const GRADES = ["ST4+","ST3","ACP","tACP","Military"];
  const ALL_SLOTS = ["E1","E2","E3","E4","M1","M2","M3","L1","L2","L3","L4","WE1","WE2","WE3","WL1","WL2","N1","N2","SN","AN"];
  const DAYS_OF_WEEK = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

  // ── helpers ──
  const fmtDate = d => { const dt=new Date(d); return dt.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"}); };
  const isNightSl = sk => ["N1","N2","SN","AN"].includes(sk);
  const isWESl    = sk => ["WE1","WE2","WE3","WL1","WL2"].includes(sk);
  const dayTypeFn = d => {
    const dow = new Date(d).getDay(); // 0=Sun,6=Sat
    if (dow===0||dow===6) return "weekend";
    if (dow===1) return "monday";
    if (dow===5) return "friday";
    return "weekday_other";
  };

  const rules = genRules || INIT_GEN_RULES;

  const setSlotGrade = (slot, grade, checked) => {
    const current = (rules.slotGrades||{})[slot]||[];
    const updated  = checked ? [...new Set([...current,grade])] : current.filter(g=>g!==grade);
    setGenRules(prev=>({...prev, slotGrades:{...(prev.slotGrades||{}),[slot]:updated}}));
  };

  const setMinStaff = (dayType, slot, checked) => {
    const current = (rules.minStaffing||{})[dayType]||[];
    const updated  = checked ? [...new Set([...current,slot])] : current.filter(s=>s!==slot);
    setGenRules(prev=>({...prev, minStaffing:{...(prev.minStaffing||{}),[dayType]:updated}}));
  };

  const setRule = (field, val) => setGenRules(prev=>({...prev,[field]:val}));

  // ── generate ──
  const generate = async () => {
    setGen(true); setErr(null); setDraft(null); setCfls([]); setAccepted(false);
    try {
      const q = (quarters||QUARTERS).find(x=>x.id===selQ) || (quarters||QUARTERS)[0];
      if (!q) throw new Error("Quarter not found");

      // build dates array
      const dates = [];
      let cur = new Date(q.start);
      const end = new Date(q.end);
      while (cur <= end) { dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }

      // filter dates by slotFilter
      const filteredDates = slotFilter==="all" ? dates :
        slotFilter==="nights" ? dates : // nights are on all days; we'll filter slots in prompt
        dates.filter(d=>{ const dow=new Date(d).getDay(); return dow===0||dow===5||dow===6; }); // weekends

      // compact availability per person
      const avMap = {};
      activeStaff.forEach(s=>{
        const blocked=[],earlyOnly=[],midOnly=[],lateOnly=[],nightOnly=[];
        filteredDates.forEach(d=>{
          const raw = (availability[s.init]||{})[d];
          const e = normaliseAvailEntry(raw);
          const base = e?.base;
          if(!base||base==="ANY") return;
          if(["UNAVAILABLE","SL","MILITARY","PHEM"].includes(base)) blocked.push(d);
          else if(base==="EARLY") earlyOnly.push(d);
          else if(base==="MID")   midOnly.push(d);
          else if(base==="LATE")  lateOnly.push(d);
          else if(base==="NIGHT") nightOnly.push(d);
        });
        avMap[s.init]={blocked,earlyOnly,midOnly,lateOnly,nightOnly};
      });

      // build targets per person for this quarter
      // staffHours stores contracted HOURS (e.g. 419.85), not a 0–1 WTE fraction.
      // Convert to WTE by dividing by the grade's full-time quarterly hours.
      const targets = {};
      activeStaff.forEach(s=>{
        const cfg = wteConfig[s.grade] || wteConfig["ST4+"] || {};
        const fullHrs = cfg.hoursPerQuarter || Math.round((cfg.hoursPerWeek||45.25) * 13 * 10) / 10;
        const storedHrs = ((staffHours||{})[s.init]||{})[selQ];
        const wte = (storedHrs != null && fullHrs > 0) ? Math.min(2, Math.max(0, storedHrs / fullHrs)) : 1.0;
        targets[s.init]={
          nights:         Math.round((cfg.nights||0)*wte),
          weekends:       Math.round((cfg.weekends||0)*wte),
          earlies:        Math.round((cfg.earlies||0)*wte),
          mids:           Math.round((cfg.mids||0)*wte),
          lates:          Math.round((cfg.lates||0)*wte),
          hoursPerQuarter:Math.round(fullHrs * wte),
        };
      });

      const payload = {
        dates: filteredDates,
        dayTypes: Object.fromEntries(filteredDates.map(d=>[d,dayTypeFn(d)])),
        slots: rules.slotGrades||{},
        minStaffing: rules.minStaffing||{},
        staff: activeStaff.map(s=>({init:s.init,name:s.name,grade:s.grade,nightBlockPref:s.nightBlockPref||"any"})),
        availability: avMap,
        targets,
        contractRules: {
          maxShiftHours:         rules.maxShiftHours||13,
          minRestHours:          rules.minRestHours||11,
          maxConsecNights:       rules.maxConsecNights||4,
          maxConsecLongDays:     rules.maxConsecLongDays||5,
          maxConsecWorkingDays:  rules.maxConsecWorkingDays||7,
          postNightRestHours:    rules.postNightRestHours||46,
          maxConsecWeekends:     rules.maxConsecWeekends||4,
        },
        shiftTimes: shiftTimes||DEFAULT_SHIFT_TIMES,
        slotFilter,
      };

      const resp = await fetch("/.netlify/functions/generate-rota",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload),
      });
      if(!resp.ok) {
        const errData = await resp.json().catch(()=>({error:`HTTP ${resp.status}`}));
        const dbg = errData.debug ? ` | HTTP ${errData.debug.httpStatus} | type: ${errData.debug.errorType} | key: ${errData.debug.keyPrefix}` : "";
        throw new Error((errData.error||`HTTP ${resp.status}`) + dbg);
      }
      const {rota:draft,conflicts:cfls} = await resp.json();
      setDraft(draft||{}); setCfls(cfls||[]); setTab("draft");
    } catch(e) {
      setErr(e.message);
    } finally {
      setGen(false);
    }
  };

  // ── clear quarter ──
  const clearQuarter = () => {
    const q = (quarters||QUARTERS).find(x=>x.id===selQ);
    if (!q) return;
    if (!window.confirm(`Clear ALL existing rota assignments for ${selQ} (${q.label})? This cannot be undone.`)) return;
    const dates = [];
    let cur = new Date(q.start); const end = new Date(q.end);
    while (cur <= end) { dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
    setRota(prev=>{ const next={...prev}; dates.forEach(d=>{ delete next[d]; }); return next; });
    addAudit(user.init,"Rota Cleared",`All assignments cleared for ${selQ}`);
  };

  // ── accept ──
  const acceptDraft = () => {
    if(!rotaDraft) return;
    setRota(prev=>{
      const next={...prev};
      // "replace" mode: wipe the quarter's existing assignments first
      if(overwrite==="replace"){
        const q=(quarters||QUARTERS).find(x=>x.id===selQ);
        if(q){let c=new Date(q.start);const e=new Date(q.end);while(c<=e){delete next[c.toISOString().slice(0,10)];c.setDate(c.getDate()+1);}}
      }
      Object.entries(rotaDraft).forEach(([date,slots])=>{
        const existing = overwrite==="replace" ? {} : (prev[date]||{});
        if(overwrite==="overwrite"){
          // Generator wins per slot, but remove any OTHER existing slot for the same person
          // to prevent a double-booking when they already hold a different slot in the existing rota
          const merged={...existing};
          Object.entries(slots).forEach(([sk,init])=>{
            if(!init) return;
            Object.keys(merged).forEach(other=>{ if(merged[other]===init) delete merged[other]; });
            merged[sk]=init;
          });
          next[date]=merged;
        } else {
          // fill: existing takes priority; only add a generator slot if:
          // 1. that slot is empty in existing, AND
          // 2. the person isn't already assigned to any other slot that day
          const existingInits=new Set(Object.values(existing).filter(Boolean));
          const merged={...existing};
          Object.entries(slots).forEach(([sk,init])=>{
            if(!init||merged[sk]||existingInits.has(init)) return;
            merged[sk]=init;
            existingInits.add(init);
          });
          next[date]=merged;
        }
      });
      return next;
    });
    const filled=Object.values(rotaDraft).reduce((s,sl)=>s+Object.keys(sl).length,0);
    addAudit(user.init,"AI Rota",`Draft accepted: ${selQ}, ${Object.keys(rotaDraft).length} days, ${filled} assignments, ${conflicts.length} conflicts`);
    setDraft(null); setCfls([]); setAccepted(true); setTab("generate");
    localStorage.removeItem(LS_PFX+'rotaDraft_'+activeYearId); localStorage.removeItem(LS_PFX+'rotaDraftCfls_'+activeYearId);
  };

  const errCount   = conflicts.filter(c=>c.severity==="error").length;
  const warnCount  = conflicts.filter(c=>c.severity==="warning").length;

  // ── render ──
  return (
    <div>
      <div className="card" style={{marginBottom:18}}>
        <div className="ch">
          <span className="ct">⚙️ Auto Rota Builder</span>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Generates a draft rota from availability + your rules using the deterministic scheduler</span>
        </div>
        <div className="cb" style={{paddingBottom:0}}>
          <div className="ai-tab-bar">
            {[["rules","⚙️ Rules"],["generate","▶ Generate"],["draft",`📋 Draft${rotaDraft?` (${Object.keys(rotaDraft).length}d)`:""}`]].map(([k,lbl])=>(
              <button key={k} className={`ai-tab${tab===k?" act":""}`} onClick={()=>setTab(k)}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── RULES TAB ── */}
      {tab==="rules"&&(
        <div>
          {/* Slot grade requirements */}
          <div className="card" style={{marginBottom:14}}>
            <div className="ch">
              <span className="ct">Slot Grade Requirements</span>
              <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Which grades may be assigned to each slot</span>
              <button className="btn bsm" style={{marginLeft:"auto",fontSize:11,padding:"3px 10px"}}
                onClick={()=>{if(window.confirm("Reset all slot grades back to the system defaults?"))setGenRules(prev=>({...prev,slotGrades:{...INIT_GEN_RULES.slotGrades}}));}}>
                ↺ Reset to defaults
              </button>
            </div>
            <div className="cb" style={{overflowX:"auto"}}>
              <table className="tbl" style={{minWidth:520}}>
                <thead><tr><th style={{textAlign:"left"}}>Slot</th><th style={{textAlign:"left"}}>Group</th>{GRADES.map(g=><th key={g}>{g}</th>)}</tr></thead>
                <tbody>{ALL_SLOTS.map(sk=>{
                  const grp=SLOTS.find(s=>s.key===sk)?.grp||"";
                  const allowed=(rules.slotGrades||{})[sk]||[];
                  return (
                    <tr key={sk}>
                      <td style={{fontWeight:700,color:"#334155"}}>{sk}</td>
                      <td style={{fontSize:11,color:"#94a3b8"}}>{grp}</td>
                      {GRADES.map(g=>(
                        <td key={g} style={{textAlign:"center"}}>
                          <input type="checkbox" checked={allowed.includes(g)} onChange={e=>setSlotGrade(sk,g,e.target.checked)}/>
                        </td>
                      ))}
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>

          {/* Minimum daily staffing */}
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Minimum Daily Staffing</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Slots that must be filled each day (AI prioritises these)</span></div>
            <div className="cb">
              {[["monday","Monday"],["weekday_other","Tue – Thu"],["friday","Friday"],["weekend","Weekend / BH"]].map(([dt,lbl])=>{
                const req=(rules.minStaffing||{})[dt]||[];
                const relevant=dt==="weekend"?["WE1","WE2","WE3","WL1","WL2","N1","N2","SN","AN"]:["E1","E2","E3","E4","M1","M2","M3","L1","L2","L3","L4","N1","N2","SN","AN"];
                return (
                  <div key={dt} style={{marginBottom:12}}>
                    <div style={{fontWeight:700,fontSize:12.5,color:"#334155",marginBottom:6}}>{lbl}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {relevant.map(sk=>(
                        <label key={sk} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,cursor:"pointer",padding:"3px 8px",borderRadius:5,background:req.includes(sk)?"#dcfce7":"#f8fafc",border:`1px solid ${req.includes(sk)?"#86efac":"#e2e8f0"}`}}>
                          <input type="checkbox" checked={req.includes(sk)} onChange={e=>setMinStaff(dt,sk,e.target.checked)} style={{marginRight:2}}/>{sk}
                        </label>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* JD Contract rules */}
          <div className="card">
            <div className="ch"><span className="ct">JD Contract Rules</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Junior Doctors contract — used by AI and validation layer</span></div>
            <div className="cb">
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                {[
                  ["maxShiftHours","Max shift length (hrs)",1,24],
                  ["minRestHours","Min rest between shifts (hrs)",1,24],
                  ["maxConsecNights","Max consecutive nights",1,7],
                  ["postNightRestHours","Post-night rest required (hrs)",24,96],
                  ["maxConsecLongDays","Max consec long days (>10h)",1,10],
                  ["maxConsecWorkingDays","Max consecutive working days",1,14],
                  ["maxConsecWeekends","Max consecutive weekends",1,8],
                ].map(([field,label,mn,mx])=>(
                  <div key={field} className="fg" style={{margin:0}}>
                    <label className="fl">{label}</label>
                    <input type="number" className="fi" style={{padding:"5px 8px"}}
                      value={rules[field]??""} min={mn} max={mx} step="1"
                      onChange={e=>setRule(field,parseInt(e.target.value)||0)}/>
                  </div>
                ))}
              </div>
              <div style={{marginTop:14,padding:10,background:"#f8fafc",borderRadius:7,fontSize:11.5,color:"#64748b"}}>
                <strong>Fixed rules always applied:</strong> Each person works at most one slot per day. Night slots are grade-restricted (N1/N2: ST4+; SN: ST3; AN: ACP/tACP). Blocked days (SL, Military, PHEM, Unavailable) are never scheduled.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── GENERATE TAB ── */}
      {tab==="generate"&&(
        <div className="card">
          <div className="ch"><span className="ct">Generate Rota Draft</span></div>
          <div className="cb">
            {accepted&&<div className="al al-ok" style={{marginBottom:14}}>✓ Draft accepted and applied to the rota for {selQ}.</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14,marginBottom:18}}>
              <div className="fg" style={{margin:0}}>
                <label className="fl">Quarter</label>
                <select className="fi" style={{padding:"6px 10px"}} value={selQ} onChange={e=>{setSelQ(e.target.value);setAccepted(false);}}>
                  {(quarters||QUARTERS).map(q=><option key={q.id} value={q.id}>{q.label}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="fl">Slots to fill</label>
                <select className="fi" style={{padding:"6px 10px"}} value={slotFilter} onChange={e=>setSF(e.target.value)}>
                  <option value="all">All slots (Early, Mid, Late, Night, W/E)</option>
                  <option value="weekends">Weekends + Nights only</option>
                  <option value="nights">Nights only (N1, N2, SN, AN)</option>
                </select>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="fl">When accepting draft</label>
                <select className="fi" style={{padding:"6px 10px"}} value={overwrite} onChange={e=>setOW(e.target.value)}>
                  <option value="fill">Fill empty slots only (keep existing)</option>
                  <option value="overwrite">Overwrite — draft replaces conflicts</option>
                  <option value="replace">Replace all — clear quarter first</option>
                </select>
              </div>
            </div>

            <div style={{background:"#f8fafc",borderRadius:8,padding:14,marginBottom:14,fontSize:12.5,color:"#64748b"}}>
              <strong>How it works:</strong> The scheduler reads all staff availability for {selQ}, assigns night blocks first (hard-capped to individual WTE targets), then fills day shifts to balance hours. Review the Draft tab — conflicts are highlighted — then Accept to apply.
              {overwrite==="fill"&&<span> Existing slot assignments are preserved; AI only fills empty slots.</span>}
              {overwrite==="overwrite"&&<span style={{color:"#d97706"}}> ⚠ Draft takes priority over any existing assignments on the same slot.</span>}
              {overwrite==="replace"&&<span style={{color:"#dc2626"}}> ⛔ Replace mode: ALL existing {selQ} assignments are wiped before applying the draft.</span>}
            </div>

            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
              <button className="btn bp" style={{padding:"10px 24px",fontSize:14}} onClick={generate} disabled={generating}>
                {generating?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Generating…</>:"⚙️ Generate Draft"}
              </button>
              <button className="btn bs" style={{padding:"10px 16px",color:"#ef4444",borderColor:"#fca5a5"}} onClick={clearQuarter}
                title={`Clear all existing ${selQ} rota assignments`}>
                🗑 Clear {selQ} rota
              </button>
            </div>
            {generating&&<p style={{marginTop:10,fontSize:12,color:"#64748b"}}>Running deterministic scheduler — this usually takes a few seconds.</p>}
          </div>
        </div>
      )}

      {/* ── DRAFT TAB ── */}
      {tab==="draft"&&rotaDraft&&(
        <div>
          {/* Summary banner */}
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{flex:1,padding:12,borderRadius:8,background:errCount>0?"#fee2e2":"#dcfce7",border:`1px solid ${errCount>0?"#fca5a5":"#86efac"}`}}>
              <div style={{fontWeight:700,fontSize:13,color:errCount>0?"#7f1d1d":"#14532d"}}>{errCount>0?`⛔ ${errCount} Error${errCount>1?"s":""}`:warnCount>0?`⚠️ ${warnCount} Warning${warnCount>1?"s":""}`:errCount===0&&warnCount===0?"✅ No conflicts found":""}</div>
              <div style={{fontSize:11.5,color:errCount>0?"#991b1b":"#166534",marginTop:2}}>{errCount>0?"Review errors before accepting.":warnCount>0?"Warnings are preference mismatches — safe to accept.":"All assignments pass grade, availability, and contract checks."}</div>
            </div>
            <div style={{padding:12,borderRadius:8,background:"#f1f5f9",border:"1px solid #e2e8f0",minWidth:140}}>
              <div style={{fontWeight:700,fontSize:13,color:"#334155"}}>{Object.keys(rotaDraft).length} days</div>
              <div style={{fontSize:11.5,color:"#64748b"}}>{Object.values(rotaDraft).reduce((s,sl)=>s+Object.keys(sl).length,0)} total assignments</div>
            </div>
          </div>

          {/* Conflicts list */}
          {conflicts.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="ch"><span className="ct">Conflicts</span></div>
              <div className="cb" style={{overflowX:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Date</th><th>Slot</th><th>Person</th><th>Rule</th><th>Severity</th></tr></thead>
                  <tbody>{conflicts.map((c,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtDate(c.date)}</td>
                      <td><span style={{fontWeight:700}}>{c.slot}</span></td>
                      <td><span style={{background:"#e0e7ff",color:"#3730a3",padding:"1px 6px",borderRadius:4,fontWeight:700,fontSize:11}}>{c.init}</span></td>
                      <td style={{fontSize:12,color:"#64748b"}}>{c.rule}</td>
                      <td><span style={{padding:"2px 7px",borderRadius:4,fontWeight:700,fontSize:11,background:c.severity==="error"?"#fee2e2":"#fef3c7",color:c.severity==="error"?"#7f1d1d":"#78350f"}}>{c.severity}</span></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
          )}

          {/* Draft rota preview */}
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Draft Rota Preview</span>
              <div style={{display:"flex",gap:8,fontSize:11}}>
                <span style={{padding:"1px 6px",borderRadius:3,background:"#dcfce7",color:"#166534"}}>■</span><span style={{color:"#64748b"}}>New</span>
                <span style={{padding:"1px 6px",borderRadius:3,background:"#dbeafe",color:"#1e40af"}}>■</span><span style={{color:"#64748b"}}>Existing</span>
                <span style={{padding:"1px 6px",borderRadius:3,background:"#fee2e2",color:"#7f1d1d"}}>■</span><span style={{color:"#64748b"}}>Conflict</span>
              </div>
            </div>
            <div className="cb" style={{overflowX:"auto",maxHeight:520,overflowY:"auto"}}>
              <table style={{borderCollapse:"collapse",minWidth:600,fontSize:11.5}}>
                <thead style={{position:"sticky",top:0,zIndex:2,background:"#f8fafc"}}>
                  <tr>
                    <th style={{padding:"6px 10px",textAlign:"left",border:"1px solid #e2e8f0",fontWeight:700,fontSize:11,color:"#475569",minWidth:90}}>Date</th>
                    {ALL_SLOTS.map(sk=><th key={sk} style={{padding:"4px 6px",border:"1px solid #e2e8f0",fontWeight:700,fontSize:10,color:"#94a3b8",minWidth:36,textAlign:"center"}}>{sk}</th>)}
                  </tr>
                </thead>
                <tbody>{Object.keys(rotaDraft).sort().map(date=>{
                  const daySlots=rotaDraft[date]||{};
                  const existSlots=rota[date]||{};
                  const conflictSlots=new Set(conflicts.filter(c=>c.date===date).map(c=>c.slot));
                  return (
                    <tr key={date} style={{background:"white"}}>
                      <td style={{padding:"4px 8px",border:"1px solid #f1f5f9",fontWeight:600,fontSize:11,whiteSpace:"nowrap",color:"#374151"}}>{fmtDate(date)}</td>
                      {ALL_SLOTS.map(sk=>{
                        const init=daySlots[sk];
                        const wasExisting=existSlots[sk]&&overwrite==="fill";
                        const isCfl=conflictSlots.has(sk);
                        return (
                          <td key={sk} style={{padding:"3px 4px",border:"1px solid #f1f5f9",textAlign:"center"}}>
                            {init&&<span className={isCfl?"draft-cell-conflict":wasExisting?"draft-cell-exist":"draft-cell-new"}>{init}</span>}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>

          {/* Accept / Discard */}
          <div style={{display:"flex",gap:10}}>
            <button className="btn bp" style={{padding:"10px 22px"}} onClick={acceptDraft}>✓ Accept Draft</button>
            <button className="btn bs" style={{padding:"10px 22px"}} onClick={()=>{setDraft(null);setCfls([]);setTab("generate");}}>✗ Discard</button>
            {errCount>0&&<span style={{fontSize:12,color:"#94a3b8",alignSelf:"center"}}>You can still accept with errors — review and fix in Rota Builder after.</span>}
          </div>
        </div>
      )}

      {tab==="draft"&&!rotaDraft&&(
        <div className="card"><div className="cb" style={{textAlign:"center",padding:40,color:"#94a3b8"}}>No draft generated yet. Go to the Generate tab to create one.</div></div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════

function App() {
  // fsReady: true once Firestore has returned the first snapshot (or errored)
  const [fsReady,setFsReady]   = useState(false);
  const [user,setUser]         = useState(()=>lsGet('session',null));
  const [view,setView]         = useState("dashboard");
  const [viewMonth,setVM]      = useState(new Date(2026,7,1));
  const [menuOpen,setMenuOpen] = useState(false);
  const [sbCollapsed,setSbCollapsed] = useState(false);

  // Global (shared across all years)
  const ADMIN_ONLY = INIT_STAFF.filter(s=>s.role==="admin");
  const [staff,setStaff]           = useState(()=>lsGet('staff',ADMIN_ONLY));
  const [wteConfig,setWteConfig]   = useState(()=>lsGet('wteConfig',INIT_WTE_CONFIG));
  const [auditLog,setAudit]        = useState(()=>lsGet('audit',[{id:1,ts:"2026-08-05 09:00",user:"ADM",action:"System Init",details:"RotaFlow 2026/27 initialised"}]));
  const [fixedDaysOff,setFixedDaysOff] = useState(()=>lsGet('fixedDaysOff',[]));
  const [genRules,setGenRules]             = useState(()=>lsGet('genRules',INIT_GEN_RULES));
  const [shiftTimes,setShiftTimes]         = useState(()=>lsGet('shiftTimes',DEFAULT_SHIFT_TIMES));
  const [staffShiftTimes,setSST]           = useState(()=>lsGet('staffShiftTimes',{}));
  const [trainingDays,setTrainingDays]     = useState(()=>lsGet('trainingDays',[])); // [{id,date,type:"SpR"|"ACP",note}]
  const [demoMode,setDemoMode]             = useState(()=>lsGet('demoMode',false));
  const [constraintRules,setConstraintRules] = useState(()=>lsGet('constraintRules',[])); // global, not per-year
  const [sysRules,setSysRules]               = useState(()=>lsGet('sysRules',DEFAULT_SYS_RULES)); // global toggleable system rules
  const [rotaRulesText,setRotaRulesText]     = useState(()=>lsGet('rotaRulesText',''));

  // Year management
  const [years,setYears]           = useState(()=>lsGet('years',[{id:"2026-27",label:"2026/27",quarters:QUARTERS,active:true,archived:false}]));
  const [activeYearId,setActiveYearId] = useState(()=>lsGet('activeYearId',"2026-27"));

  // Per-year data (keyed by year id)
  const [rotaByYear,setRotaByYear]         = useState(()=>lsGet('rotaByYear',{}));
  const [leaveByYear,setLeaveByYear]       = useState(()=>lsGet('leaveByYear',{}));
  const [availByYear,setAvailByYear]       = useState(()=>lsGet('availByYear',{}));
  const [qStatusByYear,setQStatusByYear]   = useState(()=>lsGet('qstatusByYear',{}));
  const [requestsByYear,setReqsByYear]     = useState(()=>lsGet('requestsByYear',{}));
  const [notesByYear,setNotesByYear]       = useState(()=>lsGet('notesByYear',{}));
  const [corrsByYear,setCorrsByYear]       = useState(()=>lsGet('corrsByYear',{}));
  const [staffHoursByYear,setSHByYear]     = useState(()=>lsGet('staffHoursByYear',{}));
  const [swapsByYear,setSwapsByYear]       = useState(()=>lsGet('swapsByYear',{}));
  const [shiftOverridesByYear,setSOByYear] = useState(()=>lsGet('shiftOverridesByYear',{}));

  // Active-year flat accessors (derived from above)
  const activeYearQuarters = useMemo(()=>(years.find(y=>y.id===activeYearId)||years[0])?.quarters||QUARTERS,[years,activeYearId]);
  const rota          = rotaByYear[activeYearId]           || {};
  const leaveEntries  = leaveByYear[activeYearId]          || {};
  const availability  = availByYear[activeYearId]          || {};
  const quarterStatus = qStatusByYear[activeYearId]        || {Q1:"open",Q2:"closed",Q3:"closed",Q4:"closed"};
  const requests      = requestsByYear[activeYearId]       || [];
  const dayNotes      = notesByYear[activeYearId]          || {};
  const hoursCorrections = corrsByYear[activeYearId]       || [];
  const staffHours    = staffHoursByYear[activeYearId]     || {};
  const swaps              = swapsByYear[activeYearId]          || [];
  const staffShiftOverrides = shiftOverridesByYear[activeYearId] || {};

  // Year-aware setters (same interface as the old flat setters)
  const yw = (setter, key) => v => setter(p=>({...p,[activeYearId]:typeof v==="function"?v(p[activeYearId]||(key==="arr"?[]:{})):v}));
  const setRota        = yw(setRotaByYear);
  const setLE          = yw(setLeaveByYear);
  const setAvail       = yw(setAvailByYear);
  const setQS          = yw(setQStatusByYear);
  const setReqs        = yw(setReqsByYear,"arr");
  const setNotes       = yw(setNotesByYear);
  const setHoursCorrections = yw(setCorrsByYear,"arr");
  const setStaffHours    = yw(setSHByYear);
  const setSwaps         = yw(setSwapsByYear,"arr");
  const setShiftOverrides = yw(setSOByYear);

  // ── Subscribe to Firestore on mount (gated behind Anonymous Auth) ────────────
  // onAuthStateChanged fires immediately; if no user, we sign in anonymously.
  // Once authenticated, the Firestore onSnapshot listener is set up.
  // upd() only calls the setter when the value has actually changed (avoids
  // write→snapshot→write loops by keeping the same object reference when equal).
  useEffect(() => {
    const upd = setter => val => {
      if (val !== undefined) setter(prev => JSON.stringify(prev) === JSON.stringify(val) ? prev : val);
    };
    let unsubFirestore = null;
    const unsubAuth = firebase.auth().onAuthStateChanged(firebaseUser => {
      if (firebaseUser) {
        // If a reset was requested (flag set in localStorage), write clean state first
        const RESET_KEY = LS_PFX + 'pendingReset';
        const pendingReset = localStorage.getItem(RESET_KEY) === 'true';
        if (pendingReset) {
          localStorage.removeItem(RESET_KEY);
          const freshPayload = {staff:INIT_STAFF.filter(s=>s.role==="admin"),auditLog:[],wteConfig:INIT_WTE_CONFIG,years:[{id:"2026-27",label:"2026/27",quarters:QUARTERS,active:true,archived:false}],activeYearId:"2026-27",rotaByYear:{},leaveByYear:{},availByYear:{},qStatusByYear:{},requestsByYear:{},notesByYear:{},corrsByYear:{},staffHoursByYear:{},swapsByYear:{},fixedDaysOff:[],genRules:INIT_GEN_RULES,shiftTimes:DEFAULT_SHIFT_TIMES,staffShiftTimes:{},trainingDays:[],demoMode:false};
          appDoc().set(freshPayload).catch(console.error);
        }
        // Authenticated — connect to Firestore
        unsubFirestore = appDoc().onSnapshot(snap => {
          if (!snap.exists && IS_DEMO) {
            // Demo doc doesn't exist yet — seed it with all staff + demo availability
            const demoStaff = INIT_STAFF.map(s=>({...s,pw:s.role==='admin'?'demo2026':'rota2026'}));
            const demoAvail = generateDemoAvailability(demoStaff,[...QUARTERS]);
            const seed={staff:demoStaff,auditLog:[],wteConfig:INIT_WTE_CONFIG,years:[{id:"2026-27",label:"2026/27",quarters:QUARTERS,active:true,archived:false}],activeYearId:"2026-27",rotaByYear:{},leaveByYear:{},availByYear:{"2026-27":demoAvail},qStatusByYear:{"2026-27":{Q1:"open",Q2:"closed",Q3:"closed",Q4:"closed"}},requestsByYear:{},notesByYear:{},corrsByYear:{},staffHoursByYear:{},swapsByYear:{},fixedDaysOff:[],genRules:INIT_GEN_RULES,shiftTimes:DEFAULT_SHIFT_TIMES,staffShiftTimes:{},trainingDays:[],demoMode:true};
            appDoc().set(seed).catch(console.error);
            // Set state directly so login works immediately (don't wait for snapshot round-trip)
            setStaff(demoStaff);
            setWteConfig(INIT_WTE_CONFIG);
            setYears([{id:"2026-27",label:"2026/27",quarters:QUARTERS,active:true,archived:false}]);
            setActiveYearId("2026-27");
            setAvailByYear({"2026-27":demoAvail});
            setQStatusByYear({"2026-27":{Q1:"open",Q2:"closed",Q3:"closed",Q4:"closed"}});
            setFsReady(true); return;
          }
          if (snap.exists) {
            const d = snap.data();
            // Migration: if old flat data exists but no year-namespaced data, migrate to "2026-27"
            const patchStaffPw = arr => Array.isArray(arr) ? arr.map(s=>{
              if(IS_DEMO) return {...s,pw:s.role==='admin'?'demo2026':'rota2026'};
              if(s.pw) return s; const def=INIT_STAFF.find(i=>i.init===s.init); return {...s,pw:def?.pw||(s.role==='admin'?'admin2026':'rota2026')};}) : arr;
            // Re-validate & refresh the in-memory session user from the loaded staff list
            setUser(prev => {
              if (!prev) return prev;
              const fresh = (IS_DEMO
                ? (d.staff||[]).map(s=>({...s,pw:s.role==='admin'?'demo2026':'rota2026'}))
                : (d.staff||[])
              ).find(s=>s.init===prev.init);
              if (!fresh) return prev; // keep old session if not found yet (still loading)
              const updated = {...fresh};
              lsSave('session', updated);
              return updated;
            });
            if (d.rota && !d.rotaByYear) {
              const yid = "2026-27";
              upd(setStaff)(patchStaffPw(d.staff));
              upd(setWteConfig)(d.wteConfig);
              upd(setAudit)(d.auditLog);
              upd(setYears)([{id:yid,label:"2026/27",quarters:QUARTERS,active:true,archived:false}]);
              upd(setActiveYearId)(yid);
              upd(setRotaByYear)({[yid]:d.rota||{}});
              upd(setLeaveByYear)({[yid]:d.leaveEntries||{}});
              upd(setAvailByYear)({[yid]:d.availability||{}});
              upd(setQStatusByYear)({[yid]:d.quarterStatus||{Q1:"open",Q2:"closed",Q3:"closed",Q4:"closed"}});
              upd(setReqsByYear)({[yid]:d.requests||[]});
              upd(setNotesByYear)({[yid]:d.dayNotes||{}});
              upd(setCorrsByYear)({[yid]:d.hoursCorrections||[]});
              upd(setSHByYear)({[yid]:d.staffHours||{}});
            } else {
              // Normal multi-year load
              upd(setStaff)(patchStaffPw(d.staff));
              upd(setWteConfig)(d.wteConfig);
              upd(setAudit)(d.auditLog);
              upd(setYears)(d.years);
              upd(setActiveYearId)(d.activeYearId);
              upd(setRotaByYear)(d.rotaByYear);
              upd(setLeaveByYear)(d.leaveByYear);
              upd(setAvailByYear)(d.availByYear);
              upd(setQStatusByYear)(d.qStatusByYear);
              upd(setReqsByYear)(d.requestsByYearV2 || {});
              upd(setNotesByYear)(d.notesByYear);
              upd(setCorrsByYear)(d.corrsByYear);
              upd(setSHByYear)(d.staffHoursByYear);
              upd(setSwapsByYear)(d.swapsByYearV2 || {});
              upd(setSOByYear)(d.shiftOverridesByYear || {});
              upd(setFixedDaysOff)(d.fixedDaysOff);
              upd(setGenRules)(d.genRules);
              upd(setShiftTimes)(d.shiftTimes);
              upd(setSST)(d.staffShiftTimes);
              upd(setTrainingDays)(d.trainingDays);
              upd(setConstraintRules)(d.constraintRules || []);
              if (d.sysRules) upd(setSysRules)({...DEFAULT_SYS_RULES, ...d.sysRules});
              upd(setRotaRulesText)(d.rotaRulesText || '');
            }
          }
          setFsReady(true);
        }, err => { console.error('Firestore:', err); setFsReady(true); });
      } else {
        // Not signed in — sign in anonymously (triggers onAuthStateChanged again)
        firebase.auth().signInAnonymously().catch(err => {
          console.error('Anonymous auth failed:', err);
          setFsReady(true); // fall back so the app still loads
        });
      }
    });
    return () => { unsubAuth(); if (unsubFirestore) unsubFirestore(); };
  }, []);

  // ── Write all state to Firestore whenever anything changes (after load) ──────
  // Also mirrors to localStorage as an offline / fast-reload cache
  useEffect(() => {
    if (!fsReady) return;
    const payload = {staff,auditLog,wteConfig,years,activeYearId,rotaByYear,leaveByYear:leaveByYear,availByYear,qStatusByYear,requestsByYear,notesByYear,corrsByYear,staffHoursByYear,swapsByYear,shiftOverridesByYear,fixedDaysOff,genRules,shiftTimes,staffShiftTimes,trainingDays,constraintRules,sysRules,demoMode,rotaRulesText};
    appDoc().set(payload).catch(console.error);
    Object.entries({staff:staff,audit:auditLog,wteConfig:wteConfig,years:years,activeYearId:activeYearId,rotaByYear:rotaByYear,leaveByYear:leaveByYear,availByYear:availByYear,qstatusByYear:qStatusByYear,requestsByYear:requestsByYear,notesByYear:notesByYear,corrsByYear:corrsByYear,staffHoursByYear:staffHoursByYear,swapsByYear:swapsByYear,shiftOverridesByYear:shiftOverridesByYear,fixedDaysOff:fixedDaysOff,genRules:genRules,shiftTimes:shiftTimes,staffShiftTimes:staffShiftTimes,trainingDays:trainingDays,constraintRules:constraintRules,sysRules:sysRules,demoMode:demoMode,rotaRulesText:rotaRulesText})
      .forEach(([k,v])=>lsSave(k,v));
  },[fsReady,staff,auditLog,wteConfig,years,activeYearId,rotaByYear,leaveByYear,availByYear,qStatusByYear,requestsByYear,notesByYear,corrsByYear,staffHoursByYear,swapsByYear,shiftOverridesByYear,fixedDaysOff,genRules,shiftTimes,staffShiftTimes,trainingDays,constraintRules,sysRules,demoMode,rotaRulesText]);

  const addAudit=(u,action,details)=>{
    const now=new Date(), ts=`${now.toLocaleDateString("en-GB")} ${now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}`;
    setAudit(p=>[...p,{id:Date.now(),ts,user:u,action,details}]);
  };

  const loadDemoData = () => {
    if (!confirm("Load demo data? This loads all default staff and realistic Q1 availability so you can test the AI rota builder. Any existing staff or Q1 availability will be overwritten.")) return;
    const baseStaff = (staff.length && staff.some(s=>s.role==="staff")) ? staff : INIT_STAFF;
    if (!staff.length || staff.every(s=>s.role==="admin")) setStaff(INIT_STAFF);
    const demoAvail = generateDemoAvailability(baseStaff, activeYearQuarters);
    setAvail(demoAvail);
    setDemoMode(true);
    addAudit("ADM","Demo Mode","Demo availability loaded");
  };

  const resetToFresh = () => {
    if (!confirm("Reset to Fresh Start?\n\nThis will:\n• Remove ALL staff\n• Clear ALL rota, availability, leave, requests and corrections\n• Keep year/quarter structure and all config\n\nThis cannot be undone. Continue?")) return;
    // Set flag so clean state is written to Firestore on next load (before snapshot)
    localStorage.setItem(LS_PFX+'pendingReset','true');
    ['staff','audit','wteConfig','years','activeYearId','rotaByYear','leaveByYear','availByYear','qstatusByYear','requestsByYear','notesByYear','corrsByYear','staffHoursByYear','swapsByYear','fixedDaysOff','genRules','shiftTimes','staffShiftTimes','trainingDays','demoMode']
      .forEach(k=>localStorage.removeItem(LS_PFX+k));
    window.location.reload();
  };

  const applyCarryForward = (closingQid) => {
    const qIdx = activeYearQuarters.findIndex(q=>q.id===closingQid);
    const nextQ = activeYearQuarters[qIdx+1];
    if (!nextQ) return;
    const activeStaff = staff.filter(s=>s.role==="staff"&&s.active);
    const newCorr = [];
    activeStaff.forEach(s => {
      const hrs = getHoursRemaining(s.init, s.grade, closingQid, wteConfig, staffHours, rota, leaveEntries, hoursCorrections);
      if (hrs===null || hrs===0) return;
      newCorr.push({id:Date.now()+Math.random(),init:s.init,qid:nextQ.id,amount:Math.round(hrs*10)/10,reason:`Carry-forward from ${closingQid} (${hrs>0?"unworked":"overworked"} hours)`,createdBy:user.init,createdAt:fmtISO(new Date()),carryForward:true,sourceQid:closingQid});
    });
    if (newCorr.length) {
      setHoursCorrections(prev=>[...prev,...newCorr]);
      addAudit(user.init,"Carry-Forward Applied",`${closingQid}→${nextQ.id}: ${newCorr.length} staff`);
    }
  };

  const pendingCount=requests.filter(r=>r.status==="pending").length;
  const hasOpenQ=activeYearQuarters.some(q=>quarterStatus[q.id]==="open");
  const isAdmin=user?.role==="admin";

  const titles={dashboard:"Dashboard",calendar:"Rota Calendar",myshifts:"My Shifts",myrecords:"My Leave Records",availability:"Availability",requests:isAdmin?"Leave Requests":"My Requests",builder:"Rota Builder",adjustments:"Hour Adjustments",staff:"Staff Management",reports:isAdmin?"Reports":"My Summary",rotaconfig:"Rota Config",audit:"Audit Log",yearsetup:"Year Setup",airota:"AI Rota Builder",fixeddays:"Fixed Days Off",conflicts:"Conflicts & Rules",rotarules:"Rota Rules"};

  if(!fsReady) return(
    <><style>{CSS}</style>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14,background:"#f0f4f8"}}>
        <div className="fs-spinner"/>
        <p style={{color:"#64748b",fontSize:14,fontFamily:"'Inter',sans-serif",margin:0}}>Loading rota data…</p>
      </div>
    </>
  );

  const handleLogin = u => { setUser(u); lsSave('session', u); };
  const handleLogout = () => { setUser(null); localStorage.removeItem(LS_PFX+'session'); };

  if(!user) return <><style>{CSS}</style><Login staff={staff} onLogin={handleLogin}/></>;

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <Sidebar user={user} view={view} setView={setView} onLogout={handleLogout} pendingCount={pendingCount} hasOpenQ={hasOpenQ} isOpen={menuOpen} onClose={()=>setMenuOpen(false)} collapsed={sbCollapsed} onToggleCollapse={()=>setSbCollapsed(c=>!c)}/>
        {menuOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:499}} onClick={()=>setMenuOpen(false)}/>}
        <div className="main">
          <div className="hdr" style={{position:"relative"}}>
            <button className="mob-hbg" onClick={()=>setMenuOpen(m=>!m)}>☰</button>
            <h2>{titles[view]||""}</h2>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {isAdmin&&<span className="badge b-admin">Admin</span>}
              <select value={activeYearId}
                onChange={e=>e.target.value==="__new"?setView("yearsetup"):setActiveYearId(e.target.value)}
                style={{fontSize:12.5,padding:"3px 8px",borderRadius:6,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
                {years.filter(y=>!y.archived).map(y=><option key={y.id} value={y.id}>{y.label}</option>)}
                {isAdmin&&<option value="__new">+ New Year</option>}
              </select>
            </div>
          </div>
          {isAdmin&&demoMode&&(
            <div style={{background:"#fef08a",borderBottom:"2px solid #facc15",padding:"7px 20px",fontSize:12.5,fontWeight:600,color:"#713f12",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <span>⚠️ DEMO MODE — Sample availability loaded. The AI Rota Builder is ready to test.</span>
              <button onClick={()=>setDemoMode(false)} style={{background:"none",border:"1px solid #ca8a04",borderRadius:5,padding:"2px 10px",fontSize:11,color:"#713f12",cursor:"pointer",fontWeight:600}}>Dismiss</button>
            </div>
          )}
          <div className="body">
            {view==="dashboard"  &&<Dashboard user={user} staff={staff} rota={rota} requests={requests} dayNotes={dayNotes} availability={availability} quarterStatus={quarterStatus} quarters={activeYearQuarters} demoMode={demoMode} loadDemoData={loadDemoData} resetToFresh={resetToFresh} isAdmin={isAdmin} swaps={swaps} setView={setView}/>}
            {view==="calendar"   &&<CalendarView rota={rota} leaveEntries={leaveEntries} dayNotes={dayNotes} staff={staff} viewMonth={viewMonth} setViewMonth={setVM} viewMode="month" setViewMode={()=>{}} trainingDays={trainingDays} quarters={activeYearQuarters}/>}
            {view==="myshifts"   &&!isAdmin&&<MyShifts user={user} rota={rota} leaveEntries={leaveEntries} dayNotes={dayNotes}/>}
            {view==="myrecords"  &&!isAdmin&&<MyLeaveRecords user={user} leaveEntries={leaveEntries} requests={requests} availability={availability}/>}
            {view==="availability"&&(<AvailabilityView
                  user={user}
                  staff={staff}
                  setStaff={setStaff}
                  availability={availability}
                  setAvailability={setAvail}
                  quarterStatus={quarterStatus}
                  setQuarterStatus={setQS}
                  addAudit={addAudit}
                  leaveEntries={leaveEntries}
                  setLeaveEntries={setLE}
                  rota={rota}
                  requests={requests}
                  setRequests={setReqs}
                  applyCarryForward={applyCarryForward}
                  quarters={activeYearQuarters}
                  fixedDaysOff={fixedDaysOff}
                  setFixedDaysOff={setFixedDaysOff}
                />
              )}
            {view==="requests"   &&<RequestsView user={user} requests={requests} setRequests={setReqs} addAudit={addAudit} swaps={swaps} setSwaps={setSwaps} rota={rota} setRota={setRota} staff={staff}/>}
            {view==="builder"    &&isAdmin&&<RotaBuilder rota={rota} setRota={setRota} leaveEntries={leaveEntries} setLeaveEntries={setLE} staff={staff} dayNotes={dayNotes} setDayNotes={setNotes} availability={availability} addAudit={addAudit} currentUser={user} wteConfig={wteConfig} staffHours={staffHours} hoursCorrections={hoursCorrections} setHoursCorrections={setHoursCorrections} trainingDays={trainingDays} staffShiftOverrides={staffShiftOverrides} constraintRules={constraintRules} sysRules={sysRules} genRules={genRules}/>}
            {view==="staff"      &&isAdmin&&<StaffMgmt staff={staff} setStaff={setStaff} addAudit={addAudit} currentUser={user}/>}
            {view==="reports"    &&<Reports user={user} staff={staff} rota={rota} leaveEntries={leaveEntries} requests={requests} quarters={activeYearQuarters} availability={availability}/>}
            {view==="conflicts"  &&isAdmin&&<ConflictsView rota={rota} leaveEntries={leaveEntries} availability={availability} staff={staff} quarters={activeYearQuarters} addAudit={addAudit} currentUser={user} constraintRules={constraintRules} setConstraintRules={setConstraintRules} sysRules={sysRules} setSysRules={setSysRules} genRules={genRules}/>}
            {view==="fixeddays"  &&isAdmin&&<FixedDaysView fixedDaysOff={fixedDaysOff} setFixedDaysOff={setFixedDaysOff} staff={staff} addAudit={addAudit} currentUser={user}/>}
            {view==="rotaconfig" &&isAdmin&&<RotaConfig wteConfig={wteConfig} setWteConfig={setWteConfig} staffHours={staffHours} setStaffHours={setStaffHours} staff={staff} addAudit={addAudit} shiftTimes={shiftTimes} setShiftTimes={setShiftTimes} staffShiftTimes={staffShiftTimes} setStaffShiftTimes={setSST} trainingDays={trainingDays} setTrainingDays={setTrainingDays} staffShiftOverrides={staffShiftOverrides} setShiftOverrides={setShiftOverrides}/>}
{view==="airota"     &&isAdmin&&<AIRotaView user={user} staff={staff} rota={rota} setRota={setRota} availability={availability} leaveEntries={leaveEntries} quarterStatus={quarterStatus} wteConfig={wteConfig} staffHours={staffHours} genRules={genRules} setGenRules={setGenRules} shiftTimes={shiftTimes} addAudit={addAudit} quarters={activeYearQuarters} activeYearId={activeYearId}/>}
            {view==="adjustments"&&isAdmin&&<HoursAdjustView staff={staff} hoursCorrections={hoursCorrections} setHoursCorrections={setHoursCorrections} addAudit={addAudit} currentUser={user} wteConfig={wteConfig} staffHours={staffHours} rota={rota} leaveEntries={leaveEntries}/>}
            {view==="rotarules"  &&<RotaRulesView rotaRulesText={rotaRulesText} setRotaRulesText={setRotaRulesText} addAudit={addAudit} currentUser={user} isAdmin={isAdmin}/>}
            {view==="audit"      &&isAdmin&&<AuditLog log={auditLog}/>}
            {view==="yearsetup"  &&isAdmin&&<YearSetupView years={years} setYears={setYears} activeYearId={activeYearId} setActiveYearId={setActiveYearId} staff={staff} rotaByYear={rotaByYear} leaveByYear={leaveByYear} availByYear={availByYear} qStatusByYear={qStatusByYear} requestsByYear={requestsByYear} notesByYear={notesByYear} corrsByYear={corrsByYear} staffHoursByYear={staffHoursByYear} swapsByYear={swapsByYear} fixedDaysOff={fixedDaysOff} wteConfig={wteConfig} setQStatusByYear={setQStatusByYear} addAudit={addAudit} currentUser={user}/>}
          </div>
          <div style={{flexShrink:0,padding:"8px 28px",borderTop:"1px solid #edf0f7",background:"white",fontSize:11,color:"#94a3b8",textAlign:"center",letterSpacing:".2px"}}>
            © 2026 RotaFlow Ltd. All rights reserved.
          </div>
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
