// MY SHIFTS
// ═══════════════════════════════════════════════════════════════

function MyShifts({user,rota,leaveEntries,dayNotes}) {
  const today=fmtISO(new Date());
  const mySlots=useMemo(()=>{
    const res=[];
    Object.entries(rota).forEach(([d,slots])=>{
      Object.entries(slots).forEach(([sk,init])=>{if(init===user.init){const sl=SLOTS.find(s=>s.key===sk);if(sl)res.push({date:d,slot:sl});}});
    });
    Object.entries(leaveEntries).forEach(([d,entries])=>{
      entries.forEach(e=>{if(e.init===user.init){const lt=LEAVE_T[e.type];if(lt)res.push({date:d,slot:{...lt,key:e.type}});}});
    });
    return res.sort((a,b)=>a.date.localeCompare(b.date));
  },[rota,leaveEntries,user]);

  const upcoming=mySlots.filter(x=>x.date>=today), past=mySlots.filter(x=>x.date<today);
  const counts=mySlots.reduce((a,x)=>{a[x.slot.key]=(a[x.slot.key]||0)+1;return a;},{});

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:13,marginBottom:18}}>
        <div className="sc" style={{"--ac":"#10b981"}}><div className="sv">{mySlots.length}</div><div className="sl">Total Shifts</div></div>
        <div className="sc" style={{"--ac":"#6366f1"}}><div className="sv">{upcoming.length}</div><div className="sl">Upcoming</div></div>
        <div className="sc" style={{"--ac":"#f59e0b"}}><div className="sv">{past.length}</div><div className="sl">Completed</div></div>
      </div>
      <div className="dg2">
        <div className="card">
          <div className="ch"><span className="ct">Upcoming Shifts</span></div>
          <div className="cb" style={{maxHeight:380,overflowY:"auto"}}>
            {upcoming.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No upcoming shifts assigned.</p>
              :upcoming.map((x,i)=>{const dt=new Date(x.date+"T00:00:00"),note=dayNotes[x.date];return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:11,padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{textAlign:"center",width:36,flexShrink:0}}>
                    <div style={{fontSize:17,fontWeight:800,fontFamily:"Syne,sans-serif",color:"#0d1b2a"}}>{dt.getDate()}</div>
                    <div style={{fontSize:9,color:"#64748b"}}>{dt.toLocaleDateString("en-GB",{month:"short"})}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600}}>{dt.toLocaleDateString("en-GB",{weekday:"long"})}</div>
                    <span className="chip" style={{background:x.slot.bg,color:x.slot.fg,borderColor:x.slot.bd,fontSize:10.5}}>{x.slot.label}</span>
                    {note&&<div style={{fontSize:10,color:"#92400e",marginTop:2}}>📌 {note}</div>}
                  </div>
                </div>
              );})}
          </div>
        </div>
        <div className="card">
          <div className="ch"><span className="ct">Shift Breakdown</span></div>
          <div className="cb">
            {mySlots.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No shifts assigned yet.</p>
              :Object.entries(counts).map(([k,c])=>{const sl=SLOTS.find(s=>s.key===k)||LEAVE_T[k];if(!sl)return null;const tot=mySlots.length;return(
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span className="chip" style={{background:sl.bg,color:sl.fg,borderColor:sl.bd,fontSize:10,width:85,textAlign:"center"}}>{sl.label||k}</span>
                  <div className="rt"><div className="rf" style={{width:`${(c/tot)*100}%`,background:sl.fg}}/></div>
                  <span style={{fontSize:11,color:"#64748b",width:22,textAlign:"right"}}>{c}</span>
                </div>
              );})}
          </div>
        </div>
      </div>
    </div>
  );
}

// REQUESTS
// ═══════════════════════════════════════════════════════════════

function RequestsView({user,requests,setRequests,addAudit,swaps,setSwaps,rota,setRota,staff}) {
  const isAdmin=user.role==="admin";
  const [tab,setTab]=useState("leave");

  // ── Leave state ──
  const [showForm,setSF]=useState(false);
  const [form,setForm]=useState({type:"SL",startDate:"",endDate:"",reason:""});
  const [actM,setActM]=useState(null); const [note,setNote]=useState("");
  const [filter,setFilter]=useState("all");

  // ── Swap state ──
  const [swapModal,setSwapModal]=useState(false);
  const [swapForm,setSwapForm]=useState({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});
  const [respondModal,setRespondModal]=useState(null); // swap being responded to by staff B
  const [respondNote,setRespondNote]=useState("");
  const [adminSwapM,setAdminSwapM]=useState(null); // swap admin is acting on
  const [adminSwapNote,setAdminSwapNote]=useState("");

  const today=fmtISO(new Date());

  // Badge counts
  const pendingLeaveCount = isAdmin ? requests.filter(r=>r.status==="pending").length : 0;
  const pendingSwapCount  = isAdmin
    ? (swaps||[]).filter(s=>s.status==="accepted_b").length
    : (swaps||[]).filter(s=>s.toInit===user.init&&s.status==="pending_b").length;

  // ── Leave helpers ──
  const submit=()=>{
    if(!form.startDate||!form.endDate) return;
    const r={id:Date.now(),staffInitials:user.init,staffName:user.name,type:form.type,startDate:form.startDate,endDate:form.endDate,reason:form.reason,status:"pending",adminNote:"",createdAt:fmtISO(new Date())};
    setRequests(p=>[...p,r]);addAudit(user.init,"Leave Request",`${user.name} submitted ${LEAVE_T[form.type]?.label}`);
    setForm({type:"SL",startDate:"",endDate:"",reason:""});setSF(false);
  };
  const act=action=>{setRequests(p=>p.map(r=>r.id===actM.id?{...r,status:action,adminNote:note}:r));addAudit(user.init,`Request ${action}`,`${LEAVE_T[actM.type]?.label} for ${actM.staffName}`);setActM(null);setNote("");};
  const visible=(isAdmin?requests:requests.filter(r=>r.staffInitials===user.init)).filter(r=>filter==="all"||r.status===filter);

  // ── Swap helpers ──
  // All future rota shifts for a given person
  const getMyShifts=init=>{
    const res=[];
    Object.entries(rota||{}).forEach(([date,slots])=>{
      if(date<today) return;
      Object.entries(slots).forEach(([slotKey,assigned])=>{
        if(assigned===init) res.push({date,slotKey,label:`${fmtDisp(date)} — ${slotKey}`});
      });
    });
    return res.sort((a,b)=>a.date.localeCompare(b.date));
  };

  const myShifts=useMemo(()=>getMyShifts(user.init),[rota,user.init,today]);
  const theirShifts=useMemo(()=>swapForm.targetInit?getMyShifts(swapForm.targetInit):[],[rota,swapForm.targetInit,today]);
  const activeStaff=(staff||[]).filter(s=>s.active&&s.role==="staff"&&s.init!==user.init);

  // Grade-mismatch warning
  const swapGradeWarning=useMemo(()=>{
    if(!swapForm.myShift||!swapForm.targetInit) return null;
    const me=(staff||[]).find(s=>s.init===user.init);
    const them=(staff||[]).find(s=>s.init===swapForm.targetInit);
    if(!me||!them) return null;
    if(me.grade!==them.grade) return `Grade mismatch: you are ${me.grade}, ${them.name} is ${them.grade}. Admin will need to approve this carefully.`;
    return null;
  },[swapForm.myShift,swapForm.targetInit,staff,user.init]);

  const submitSwap=()=>{
    const [myDate,mySlot]=(swapForm.myShift||"").split("|");
    if(!myDate||!mySlot||!swapForm.targetInit) return;
    const toStaff=(staff||[]).find(s=>s.init===swapForm.targetInit);
    if(!toStaff) return;
    let toDate=myDate,toSlot=null;
    if(swapForm.swapKind==="mutual"){
      const [td,ts]=(swapForm.theirShift||"").split("|");
      if(!td||!ts) return;
      toDate=td; toSlot=ts;
    }
    const sw={
      id:Date.now(),type:"swap",
      fromInit:user.init,fromName:user.name,fromDate:myDate,fromSlot:mySlot,
      toInit:toStaff.init,toName:toStaff.name,toDate,toSlot,
      swapKind:swapForm.swapKind,reason:swapForm.reason,
      status:"pending_b",bNote:"",adminNote:"",
      createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    };
    setSwaps(p=>[...p,sw]);
    addAudit(user.init,"Swap Request",`${user.name} requested swap with ${toStaff.name}`);
    setSwapModal(false);
    setSwapForm({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});
  };

  const respondToSwap=(sw,action)=>{
    setSwaps(p=>p.map(s=>s.id===sw.id?{...s,status:action,bNote:respondNote,updatedAt:new Date().toISOString()}:s));
    addAudit(user.init,`Swap ${action==="accepted_b"?"accepted":"declined"}`,
      `${user.name} ${action==="accepted_b"?"accepted":"declined"} swap request from ${sw.fromName}`);
    setRespondModal(null); setRespondNote("");
  };

  const applySwapToRota=(sw)=>{
    setRota(prev=>{
      const r=JSON.parse(JSON.stringify(prev));
      r[sw.fromDate]={...(r[sw.fromDate]||{})};
      if(sw.swapKind==="mutual"){
        r[sw.toDate]={...(r[sw.toDate]||{})};
        r[sw.fromDate][sw.fromSlot]=sw.toInit;
        r[sw.toDate][sw.toSlot]=sw.fromInit;
      } else {
        r[sw.fromDate][sw.fromSlot]=sw.toInit;
      }
      return r;
    });
  };

  const handleAdminSwap=(sw,action)=>{
    if(action==="approved") applySwapToRota(sw);
    setSwaps(p=>p.map(s=>s.id===sw.id?{...s,status:action,adminNote:adminSwapNote,updatedAt:new Date().toISOString()}:s));
    addAudit("ADM",`Swap ${action}`,`Swap between ${sw.fromName} and ${sw.toName} — ${action}`);
    setAdminSwapM(null); setAdminSwapNote("");
  };

  const SWAP_STATUS_LABEL={pending_b:"Awaiting peer",accepted_b:"Awaiting admin",declined_b:"Declined",approved:"Approved",rejected:"Rejected"};
  const SWAP_STATUS_CLS={pending_b:"b-pending",accepted_b:"b-pending",declined_b:"b-rejected",approved:"b-approved",rejected:"b-rejected"};

  const SwapRow=({sw,showFrom=true,showTo=true,actions=null})=>(
    <div style={{padding:"10px 0",borderBottom:"1px solid #f1f5f9",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
      <div style={{flex:"1 1 200px",minWidth:0}}>
        {showFrom&&<div style={{fontSize:12,fontWeight:600}}>{sw.fromName} <span style={{fontWeight:400,color:"#64748b"}}>→ {sw.toName}</span></div>}
        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
          {sw.swapKind==="mutual"
            ? <>{fmtDisp(sw.fromDate)} <strong>{sw.fromSlot}</strong> ⇄ {fmtDisp(sw.toDate)} <strong>{sw.toSlot}</strong></>
            : <>{fmtDisp(sw.fromDate)} <strong>{sw.fromSlot}</strong> → give away</>}
        </div>
        {sw.reason&&<div style={{fontSize:11,color:"#94a3b8",marginTop:1,fontStyle:"italic"}}>"{sw.reason}"</div>}
      </div>
      <span className={`badge ${SWAP_STATUS_CLS[sw.status]||"b-pending"}`}>{SWAP_STATUS_LABEL[sw.status]||sw.status}</span>
      {actions}
    </div>
  );

  return (
    <div>
      {/* ── Tab header ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #e2e8f0"}}>
          <button className={`btn${tab==="leave"?" bp":""}`} style={{borderRadius:0,borderRight:"1px solid #e2e8f0"}}
            onClick={()=>setTab("leave")}>
            📝 Leave Requests
            {pendingLeaveCount>0&&<span className="badge b-pending" style={{marginLeft:6}}>{pendingLeaveCount}</span>}
          </button>
          <button className={`btn${tab==="swaps"?" bp":""}`} style={{borderRadius:0}}
            onClick={()=>setTab("swaps")}>
            🔄 Shift Swaps
            {pendingSwapCount>0&&<span className="badge b-pending" style={{marginLeft:6}}>{pendingSwapCount}</span>}
          </button>
        </div>
        {tab==="swaps"&&!isAdmin&&(
          <button className="btn bp bsm" onClick={()=>setSwapModal(true)}>＋ Request Swap</button>
        )}
      </div>

      {/* ════════════════════ LEAVE TAB ════════════════════ */}
      {tab==="leave"&&(
        <div>
          {!isAdmin&&<div style={{marginBottom:14}}><button className="btn bp" onClick={()=>setSF(!showForm)}>{showForm?"✕ Cancel":"＋ New Request"}</button></div>}
          {showForm&&(
            <div className="card" style={{marginBottom:16}}>
              <div className="ch"><span className="ct">Submit Leave Request</span></div>
              <div className="cb">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">Type</label>
                    <select className="fi" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                      {Object.entries(LEAVE_T).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                    </select>
                  </div>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">Start</label><input type="date" className="fi" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/></div>
                  <div className="fg" style={{marginBottom:0}}><label className="fl">End</label><input type="date" className="fi" value={form.endDate} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}/></div>
                </div>
                <div className="fg" style={{marginTop:12,marginBottom:0}}><label className="fl">Notes</label><textarea className="fta" value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}/></div>
                <div style={{marginTop:12}}><button className="btn bp" onClick={submit}>Submit</button></div>
              </div>
            </div>
          )}
          <div className="card">
            <div className="ch">
              <span className="ct">{isAdmin?"All Leave Requests":"My Requests"}</span>
              <div style={{display:"flex",gap:5}}>

            <tr key={s.id}>

          <div className="fg"><label className="fl">Full Name</label><input className="fi" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Initials</label><input className="fi" value={form.init||""} onChange={e=>setForm(f=>({...f,init:e.target.value.toUpperCase()}))}/></div>

  const sorted=[...filtered].sort((a,b)=>DAY_ORDER.indexOf(a.dayOfWeek)-DAY_ORDER.indexOf(b.dayOfWeek)||a.name?.localeCompare(b.name));

    <div>
      <div className="card">
        <div className="ch">
          <span className="ct">Fixed Days Off</span>
          <select className="fi" style={{width:180,padding:"4px 8px",marginLeft:"auto"}} value={filterInit} onChange={e=>setFilterInit(e.target.value)}>

        <div className="cb">

                <tr key={f.id}>
                  <td style={{fontWeight:600}}>{f.name||f.init}</td>
                  <td>{sm?.grade||"—"}</td>
                  <td>{f.dayOfWeek}</td>
                  <td><span style={{padding:"2px 8px",borderRadius:4,background:"#eff6ff",color:"#1d4ed8",fontSize:11,fontWeight:600}}>{f.reason}</span></td>
                  <td style={{fontSize:11,color:"#94a3b8"}}>{f.addedDate||"—"}</td>
                  <td><button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>{setFixedDaysOff(prev=>prev.filter(x=>x.id!==f.id));addAudit(currentUser.init,"Fixed Day Off",`Admin removed ${f.name||f.init} fixed ${f.reason}: ${f.dayOfWeek}`);}}>Remove</button></td>
                </tr>
              );

        </div>

    </div>
  );

// REPORTS
// ═══════════════════════════════════════════════════════════════

function Reports({user,staff,rota,leaveEntries}) {
  const isAdmin=user.role==="admin";
  const target=isAdmin?staff.filter(s=>s.role==="staff"&&s.active):staff.filter(s=>s.init===user.init);

  // ISO-week key (Monday-anchored) for grouping weekend units
  const weekKey=d=>{const dt=new Date(d);const mon=new Date(dt);mon.setDate(dt.getDate()-((dt.getDay()+6)%7));return mon.toISOString().slice(0,10);};

  const stats=useMemo(()=>target.map(s=>{
    const mySlots=Object.entries(rota).flatMap(([d,slots])=>Object.entries(slots).filter(([,v])=>v===s.init).map(([sk])=>({d,sk})));
    const myLeave=Object.entries(leaveEntries).flatMap(([d,es])=>es.filter(e=>e.init===s.init).map(e=>({d,type:e.type})));

    const total=mySlots.length;
    const nights=mySlots.filter(x=>["N1","N2","SN","AN"].includes(x.sk)).length;

    // Weekends worked: unique ISO weeks where person worked Fri-night, Sat any, or Sun any
    const weWeeks=new Set();
    mySlots.forEach(({d,sk})=>{
      const day=new Date(d).getDay(); // 0=Sun,1=Mon...5=Fri,6=Sat
      const isFriNight=day===5&&["N1","N2","SN","AN"].includes(sk);
      const isSat=day===6;
      const isSun=day===0;
      if(isFriNight||isSat||isSun) weWeeks.add(weekKey(d));
    });
    const weWorked=weWeeks.size;

    // Shift type breakdowns (early/mid/late across week and weekend)
    const earlySlots=["E1","E2","E3","E4","WE1","WE2","WE3"];
    const midSlots  =["M1","M2","M3"];
    const lateSlots =["L1","L2","L3","L4","WL1","WL2"];
    const earlies=mySlots.filter(x=>earlySlots.includes(x.sk)).length;
    const mids   =mySlots.filter(x=>midSlots.includes(x.sk)).length;
    const lates  =mySlots.filter(x=>lateSlots.includes(x.sk)).length;

    const pct=(n)=>total>0?Math.round((n/total)*100):0;

    // Leave taken (unique dates to avoid double-counting auto entries)
    const slDates  =new Set(myLeave.filter(x=>x.type==="SL").map(x=>x.d));
    const milDates =new Set(myLeave.filter(x=>x.type==="MILITARY").map(x=>x.d));

    return{
      ...s, total, nights, weWorked,
      earlies,mids,lates,
      pctEarly:pct(earlies), pctMid:pct(mids), pctLate:pct(lates),
      slTaken:slDates.size,   slEntitlement:s.slDays??30,
      milTaken:milDates.size, milEntitlement:s.militaryDays??0,
    };
  }),[target,rota,leaveEntries]);

  const thStyle={background:"#f8fafc",fontWeight:700,fontSize:11,color:"#475569",padding:"8px 10px",textAlign:"center",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap"};
  const tdStyle={padding:"7px 10px",textAlign:"center",fontSize:12.5,borderBottom:"1px solid #f1f5f9"};
  const pctCell=(pct)=>{
    const bg=pct>=30?"#eff6ff":pct>=20?"#f0fdf4":"#fafafa";
    const fg=pct>=30?"#1d4ed8":pct>=20?"#15803d":"#64748b";
    return <span style={{padding:"2px 7px",borderRadius:4,background:bg,color:fg,fontWeight:700,fontSize:11}}>{pct}%</span>;
  };

  return (
    <div className="card">
      <div className="ch"><span className="ct">Shift Summary</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>All assigned shifts in this year's rota</span></div>
      <div style={{overflowX:"auto"}}>
        <table className="tbl" style={{minWidth:760}}>
          <thead>
            <tr>
              <th style={{...thStyle,textAlign:"left"}}>Staff</th>
              <th style={thStyle}>Grade</th>
              <th style={thStyle}>Total Shifts</th>
              <th style={thStyle}>W/E Worked</th>
              <th style={thStyle}>Nights</th>
              <th style={thStyle}>% Early</th>
              <th style={thStyle}>% Mid</th>
              <th style={thStyle}>% Late</th>
              <th style={thStyle}>SL Taken</th>
              <th style={thStyle}>Military</th>
            </tr>
          </thead>
          <tbody>{stats.map(s=>(
            <tr key={s.id} style={{transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <td style={{...tdStyle,textAlign:"left",fontWeight:600}}>{s.name}</td>
              <td style={tdStyle}><span style={{padding:"2px 7px",borderRadius:4,background:"#f1f5f9",color:"#475569",fontSize:11,fontWeight:600}}>{s.grade}</span></td>
              <td style={{...tdStyle,fontWeight:700,color:"#0f172a"}}>{s.total}</td>
              <td style={tdStyle}>{s.weWorked}</td>
              <td style={tdStyle}>
                <span style={{padding:"2px 7px",borderRadius:4,background:"#ede9fe",color:"#4c1d95",fontWeight:700,fontSize:11}}>{s.nights}</span>
              </td>
              <td style={tdStyle}>{pctCell(s.pctEarly)}</td>
              <td style={tdStyle}>{pctCell(s.pctMid)}</td>
              <td style={tdStyle}>{pctCell(s.pctLate)}</td>
              <td style={tdStyle}>
                <span style={{padding:"2px 7px",borderRadius:4,fontWeight:700,fontSize:11,
                  background:s.slTaken>s.slEntitlement?"#fee2e2":s.slTaken===s.slEntitlement?"#fef9c3":"#f1f5f9",
                  color:s.slTaken>s.slEntitlement?"#7f1d1d":s.slTaken===s.slEntitlement?"#713f12":"#334155"}}>
                  {s.slTaken}/{s.slEntitlement}
                </span>
              </td>
              <td style={tdStyle}>
                {s.milEntitlement>0
                  ? <span style={{padding:"2px 7px",borderRadius:4,fontWeight:700,fontSize:11,
                      background:s.milTaken>s.milEntitlement?"#fee2e2":"#f0fdf4",
                      color:s.milTaken>s.milEntitlement?"#7f1d1d":"#166534"}}>
                      {s.milTaken}/{s.milEntitlement}
                    </span>
                  : <span style={{fontSize:11,color:"#cbd5e1"}}>—</span>}
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROTA CONFIG — FTE references + per-staff WTE
// ═══════════════════════════════════════════════════════════════

const GRADE_KEYS = ["ST4+","ST3","ACP","tACP","Military"];
const SHIFT_FIELDS = [
  {key:"nights",   label:"Nights"},
  {key:"weekends", label:"Weekends"},
  {key:"earlies",  label:"Earlies"},
  {key:"mids",     label:"Mids"},
  {key:"lates",    label:"Lates"},
];

function RotaConfig({wteConfig, setWteConfig, staffHours, setStaffHours, staff, addAudit, shiftTimes, setShiftTimes, staffShiftTimes, setStaffShiftTimes, trainingDays, setTrainingDays}) {
  const [tab, setTab] = useState("fte"); // "fte" | "hours" | "shifttimes" | "training"
  const activeStaff = staff.filter(s => s.role==="staff" && s.active);
  const [tdDate,setTdDate]  = useState("");
  const [tdType,setTdType]  = useState("SpR");
  const [tdNote,setTdNote]  = useState("");
  const [stStaff,setStStaff] = useState(""); // for per-staff shift time overrides
  const [stSlot,setStSlot]   = useState("E1");

  const setFTE = (grade, field, val) => {
    const num = parseFloat(val);
    if (isNaN(num) || num < 0) return;
    setWteConfig(prev => ({ ...prev, [grade]: { ...(prev[grade]||{}), [field]: num } }));
  };

  const setFTEHours = (grade, val) => {
    const num = parseFloat(val);
    if (isNaN(num) || num <= 0) return;
    setWteConfig(prev => ({ ...prev, [grade]: { ...(prev[grade]||{}), hoursPerWeek: num } }));
  };

  const setStaffHoursVal = (init, qid, val) => {
    const num = val === "" ? null : parseFloat(val);
    if (num !== null && (isNaN(num) || num < 0)) return;
    setStaffHours(prev => ({ ...prev, [init]: { ...(prev[init]||{}), [qid]: num } }));
    if (num !== null) addAudit("ADM", "Hours Override", `${init} ${qid} → ${num}h`);
  };

  const SLOT_KEYS_ALL = ["E1","E2","E3","E4","M1","M2","M3","L1","L2","L3","L4","WE1","WE2","WE3","WL1","WL2","N1","N2","SN","AN","SL","RESEARCH","FELLOW","MILITARY"];

  return (
    <div>
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {[["fte","FTE Targets"],["hours","Staff Hours"],["shifttimes","Shift Times"],["training","Training Days"]].map(([k,lbl])=>(
          <button key={k} className={`btn${tab===k?" bp":" bs"}`} onClick={()=>setTab(k)}>{lbl}</button>
        ))}
      </div>

      {tab==="fte"&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>
            Set the <strong>full-time equivalent</strong> targets for each grade. Individual targets are scaled by each person's effective hours.
          </div>
          <div className="card">
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Grade</th><th>hrs/wk</th><th>Net hrs/qtr</th>
                    {SHIFT_FIELDS.map(f=><th key={f.key}>{f.label}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {GRADE_KEYS.map(grade=>{
                    const cfg = wteConfig[grade] || {};
                    return (
                      <tr key={grade}>
                        <td style={{fontWeight:700}}>{grade}</td>
                        <td><input type="number" className="fi" style={{width:65,padding:"3px 6px"}} value={cfg.hoursPerWeek||""} onChange={e=>setFTEHours(grade,e.target.value)} step="0.25" min="0"/></td>
                        <td><input type="number" className="fi" style={{width:75,padding:"3px 6px"}} value={cfg.hoursPerQuarter||""} onChange={e=>setFTE(grade,"hoursPerQuarter",e.target.value)} step="0.5" min="0"/></td>
                        {SHIFT_FIELDS.map(f=>(
                          <td key={f.key}><input type="number" className="fi" style={{width:55,padding:"3px 6px",textAlign:"center"}} value={cfg[f.key]??""} onChange={e=>setFTE(grade,f.key,e.target.value)} min="0" step="1"/></td>
                        ))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==="hours"&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>
            Set each person's contracted hours per quarter. Leave blank to use the grade default (net hrs/qtr from FTE config).
          </div>
          <div className="card">
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Grade</th>
                    <th style={{color:"#64748b",fontSize:11}}>Default/Qtr</th>
                    {QUARTERS.map(q=><th key={q.id}>{q.id} (hrs)</th>)}
                    <th style={{color:"#6366f1"}}>Annual</th>
                  </tr>
                </thead>
                <tbody>
                  {activeStaff.map(s=>{
                    const sh = staffHours[s.init] || {};
                    const cfg = wteConfig[s.grade] || wteConfig["ST4+"] || {};
                    const defaultQtr = cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek || 0) * 13 * 10) / 10;
                    const annual = QUARTERS.reduce((sum,q)=>{
                      const v = sh[q.id] != null ? sh[q.id] : defaultQtr;
                      return sum + v;
                    }, 0);
                    return (
                      <tr key={s.id}>
                        <td style={{fontWeight:600}}>{s.name}</td>
                        <td style={{color:"#64748b"}}>{s.grade}</td>
                        <td style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>{defaultQtr}</td>
                        {QUARTERS.map(q=>{
                          const val = sh[q.id];
                          return (
                            <td key={q.id} style={{padding:"4px 6px"}}>
                              <input type="number" className="fi"
                                style={{width:68,padding:"4px 7px",textAlign:"center",
                                  color: val != null ? "#1e293b" : "#94a3b8"}}
                                value={val ?? ""}
                                placeholder={String(defaultQtr)}
                                step="0.5" min="0"
                                onChange={e=>setStaffHoursVal(s.init,q.id,e.target.value)}/>
                            </td>
                          );
                        })}
                        <td style={{textAlign:"center",fontWeight:700,color:"#6366f1",fontSize:12}}>
                          {Math.round(annual * 10) / 10}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==="shifttimes"&&shiftTimes&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>Default shift start/end times used for rest-rule calculations in the AI rota generator. <strong>All times in 24hr format.</strong></div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Default Slot Times</span></div>
            <div className="cb">
              <table className="tbl">
                <thead><tr><th>Slot</th><th>Start</th><th>End</th><th style={{color:"#94a3b8"}}>Duration</th></tr></thead>
                <tbody>{SLOT_KEYS_ALL.map(sk=>{
                  const t = shiftTimes[sk] || DEFAULT_SHIFT_TIMES[sk] || {start:"",end:""};
                  const dur = getShiftDuration(sk,null,shiftTimes,{});
                  return (
                    <tr key={sk}>
                      <td style={{fontWeight:700,color:"#475569"}}>{sk}</td>
                      <td><input className="fi" style={{width:80,padding:"3px 7px"}} value={t.start} onChange={e=>setShiftTimes(p=>({...p,[sk]:{...(p[sk]||{}),start:e.target.value,end:(p[sk]||{}).end||t.end}}))} placeholder="HH:MM"/></td>
                      <td><input className="fi" style={{width:80,padding:"3px 7px"}} value={t.end}   onChange={e=>setShiftTimes(p=>({...p,[sk]:{...(p[sk]||{}),end:e.target.value,start:(p[sk]||{}).start||t.start}}))} placeholder="HH:MM"/></td>
                      <td style={{color:"#94a3b8",fontSize:12}}>{dur>0?`${dur}h`:""}</td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>
          {staffShiftTimes&&setStaffShiftTimes&&(
            <div className="card">
              <div className="ch"><span className="ct">Per-Staff Time Overrides</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Override individual timings for a specific person</span></div>
              <div className="cb">
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end",marginBottom:16}}>
                  <div className="fg" style={{margin:0}}>
                    <label className="fl">Staff</label>
                    <select className="fi" style={{padding:"5px 8px",minWidth:160}} value={stStaff} onChange={e=>setStStaff(e.target.value)}>
                      <option value="">Select…</option>
                      {activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
                    </select>
                  </div>
                  <div className="fg" style={{margin:0}}>
                    <label className="fl">Slot</label>
                    <select className="fi" style={{padding:"5px 8px"}} value={stSlot} onChange={e=>setStSlot(e.target.value)}>
                      {SLOT_KEYS_ALL.map(sk=><option key={sk}>{sk}</option>)}
                    </select>
                  </div>
                </div>
                {stStaff&&(()=>{
                  const overrides = staffShiftTimes[stStaff]||{};
                  const existingKeys = Object.keys(overrides);
                  return (
                    <div>
                      {existingKeys.length===0&&<p style={{fontSize:12.5,color:"#94a3b8"}}>No overrides set for {staff.find(s=>s.init===stStaff)?.name||stStaff}.</p>}
                      {existingKeys.map(sk=>{
                        const t=overrides[sk];
                        return (
                          <div key={sk} style={{display:"flex",gap:10,alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                            <span style={{width:50,fontWeight:700,fontSize:13}}>{sk}</span>
                            <input className="fi" style={{width:75,padding:"3px 7px"}} value={t.start} onChange={e=>setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[sk]:{...t,start:e.target.value}}}))} placeholder="HH:MM"/>
                            <span style={{color:"#94a3b8"}}>→</span>
                            <input className="fi" style={{width:75,padding:"3px 7px"}} value={t.end}   onChange={e=>setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[sk]:{...t,end:e.target.value}}}))} placeholder="HH:MM"/>
                            <button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>setStaffShiftTimes(p=>{const copy={...p};const sc={...(copy[stStaff]||{})};delete sc[sk];return{...copy,[stStaff]:sc};})}>✕</button>
                          </div>
                        );
                      })}
                      <button className="btn bs bsm" style={{marginTop:10}} onClick={()=>{
                        const defaults=shiftTimes[stSlot]||DEFAULT_SHIFT_TIMES[stSlot]||{start:"08:00",end:"16:30"};
                        setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[stSlot]:{...defaults}}}));
                      }}>＋ Add {stSlot} override for {staff.find(s=>s.init===stStaff)?.name||stStaff}</button>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="training"&&trainingDays!==undefined&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>Add SpR regional training days or ACP training days. These highlight the whole day on the rota calendar and availability calendar.</div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Add Training Day</span></div>
            <div className="cb">
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div className="fg" style={{margin:0}}><label className="fl">Date</label><input type="date" className="fi" style={{padding:"5px 8px"}} value={tdDate} onChange={e=>setTdDate(e.target.value)}/></div>
                <div className="fg" style={{margin:0}}><label className="fl">Type</label>
                  <select className="fi" style={{padding:"5px 8px"}} value={tdType} onChange={e=>setTdType(e.target.value)}>
                    <option value="SpR">SpR Regional Training</option>
                    <option value="ACP">ACP Training Day</option>
                  </select>
                </div>
                <div className="fg" style={{margin:0,flex:1,minWidth:160}}><label className="fl">Note (optional)</label><input className="fi" style={{padding:"5px 8px"}} value={tdNote} onChange={e=>setTdNote(e.target.value)} placeholder="e.g. Bristol Royal Infirmary"/></div>
                <button className="btn bp" style={{height:34,alignSelf:"flex-end"}} disabled={!tdDate} onClick={()=>{
                  if(!tdDate) return;
                  setTrainingDays(p=>[...p,{id:Date.now(),date:tdDate,type:tdType,note:tdNote}]);
                  setTdDate(""); setTdNote("");
                }}>＋ Add</button>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="ch"><span className="ct">All Training Days</span></div>
            <div className="cb">
              {trainingDays.length===0&&<p style={{fontSize:12.5,color:"#94a3b8"}}>No training days added yet.</p>}
              <table className="tbl">
                <thead><tr><th>Date</th><th>Day</th><th>Type</th><th>Note</th><th>Action</th></tr></thead>
                <tbody>{[...trainingDays].sort((a,b)=>a.date.localeCompare(b.date)).map(td=>(
                  <tr key={td.id}>
                    <td style={{fontWeight:600}}>{td.date}</td>
                    <td style={{color:"#64748b"}}>{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(td.date).getDay()]}</td>
                    <td><span style={{padding:"2px 8px",borderRadius:4,fontWeight:700,fontSize:11,background:td.type==="SpR"?"#fef9c3":"#f3e8ff",color:td.type==="SpR"?"#713f12":"#6b21a8"}}>{td.type}</span></td>
                    <td style={{fontSize:12,color:"#64748b"}}>{td.note||"—"}</td>
                    <td><button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>setTrainingDays(p=>p.filter(x=>x.id!==td.id))}>Remove</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}
