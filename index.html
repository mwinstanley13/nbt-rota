      )}

      {/* ════════════════════ SWAPS TAB — ADMIN VIEW ════════════════════ */}
      {tab==="swaps"&&isAdmin&&(
        <div>
          {/* Awaiting admin approval */}
          {(()=>{const pending=(swaps||[]).filter(s=>s.status==="accepted_b");return pending.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="ch"><span className="ct" style={{color:"#d97706"}}>⏳ Awaiting Approval</span></div>
              <div className="cb">
                {pending.map(sw=>(
                  <SwapRow key={sw.id} sw={sw} actions={
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn bp bsm" onClick={()=>{setAdminSwapM({sw,action:"approved"});setAdminSwapNote("");}}>✓ Approve</button>
                      <button className="btn bd bsm" onClick={()=>{setAdminSwapM({sw,action:"rejected"});setAdminSwapNote("");}}>✗ Reject</button>
                    </div>
                  }/>
                ))}
              </div>
            </div>
          );})()}

          {/* All swaps */}
          <div className="card">
            <div className="ch"><span className="ct">All Swap Requests</span></div>
            <div className="cb">
              {!(swaps||[]).length
                ?<p style={{fontSize:12,color:"#94a3b8"}}>No swap requests yet.</p>
                :(swaps||[]).slice().sort((a,b)=>b.id-a.id).map(sw=>(
                  <SwapRow key={sw.id} sw={sw}/>
                ))
              }
            </div>
          </div>
        </div>
      )}

      {/* ════ NEW SWAP MODAL ════ */}
      {swapModal&&(
        <Modal title="Request Shift Swap" onClose={()=>{setSwapModal(false);setSwapForm({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});}}
          footer={<>
            <button className="btn bs" onClick={()=>{setSwapModal(false);setSwapForm({myShift:"",swapKind:"mutual",targetInit:"",theirShift:"",reason:""});}}>Cancel</button>
            <button className="btn bp" onClick={submitSwap}
              disabled={!swapForm.myShift||!swapForm.targetInit||(swapForm.swapKind==="mutual"&&!swapForm.theirShift)}>
              Send Request →
            </button>
          </>}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Your shift to swap</label>
              <select className="fi" value={swapForm.myShift} onChange={e=>setSwapForm(f=>({...f,myShift:e.target.value,theirShift:""}))}>
                <option value="">— select your shift —</option>
                {myShifts.map(s=><option key={s.date+s.slotKey} value={`${s.date}|${s.slotKey}`}>{s.label}</option>)}
              </select>
              {myShifts.length===0&&<div className="al al-i" style={{marginTop:6,fontSize:11}}>No upcoming shifts found on the published rota.</div>}
            </div>

            <div>
              <label className="fl">Swap type</label>
              <div style={{display:"flex",gap:12,marginTop:4}}>
                {[["mutual","🔄 Mutual swap (trade shifts)"],["giveaway","➡️ Give away (someone covers my shift)"]].map(([v,lbl])=>(
                  <label key={v} style={{display:"flex",alignItems:"center",gap:6,fontSize:12.5,cursor:"pointer"}}>
                    <input type="radio" name="swapKind" value={v} checked={swapForm.swapKind===v} onChange={()=>setSwapForm(f=>({...f,swapKind:v,theirShift:""}))}/>
                    {lbl}
                  </label>
                ))}
              </div>
            </div>

            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">{swapForm.swapKind==="mutual"?"Swap with (staff member)":"Cover by (staff member)"}</label>
              <select className="fi" value={swapForm.targetInit} onChange={e=>setSwapForm(f=>({...f,targetInit:e.target.value,theirShift:""}))}>
                <option value="">— select staff member —</option>
                {activeStaff.map(s=><option key={s.init} value={s.init}>{s.name} ({s.grade})</option>)}
              </select>
            </div>

            {swapForm.swapKind==="mutual"&&swapForm.targetInit&&(
              <div className="fg" style={{marginBottom:0}}>
                <label className="fl">Their shift to swap with</label>
                <select className="fi" value={swapForm.theirShift} onChange={e=>setSwapForm(f=>({...f,theirShift:e.target.value}))}>
                  <option value="">— select their shift —</option>
                  {theirShifts.map(s=><option key={s.date+s.slotKey} value={`${s.date}|${s.slotKey}`}>{s.label}</option>)}
                </select>
                {theirShifts.length===0&&<div className="al al-i" style={{marginTop:6,fontSize:11}}>This person has no upcoming shifts on the rota.</div>}
              </div>
            )}

            {swapGradeWarning&&<div className="al al-w" style={{fontSize:11.5}}>⚠️ {swapGradeWarning}</div>}

            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Reason / note (optional)</label>
              <textarea className="fta" value={swapForm.reason} onChange={e=>setSwapForm(f=>({...f,reason:e.target.value}))} placeholder="e.g. family event, course, prefer this date…"/>
            </div>
          </div>
        </Modal>
      )}

      {/* ════ STAFF B RESPOND MODAL ════ */}
      {respondModal&&(
        <Modal title={respondModal.action==="accepted_b"?"Accept Swap":"Decline Swap"}
          onClose={()=>{setRespondModal(null);setRespondNote("");}}
          footer={<>
            <button className="btn bs" onClick={()=>{setRespondModal(null);setRespondNote("");}}>Cancel</button>
            <button className={`btn ${respondModal.action==="accepted_b"?"bp":"bd"}`}
              onClick={()=>respondToSwap(respondModal.sw,respondModal.action)}>
              {respondModal.action==="accepted_b"?"✓ Accept Swap":"✗ Decline Swap"}
            </button>
          </>}>
          <div style={{marginBottom:12,padding:12,background:"#f8fafc",borderRadius:8,fontSize:12.5}}>
            <strong>{respondModal.sw.fromName}</strong> wants to swap:<br/>
            <span style={{color:"#64748b"}}>
              {respondModal.sw.swapKind==="mutual"
                ?<>Their {fmtDisp(respondModal.sw.fromDate)} <strong>{respondModal.sw.fromSlot}</strong> ⇄ your {fmtDisp(respondModal.sw.toDate)} <strong>{respondModal.sw.toSlot}</strong></>
                :<>They want you to cover their {fmtDisp(respondModal.sw.fromDate)} <strong>{respondModal.sw.fromSlot}</strong></>}
            </span>
            {respondModal.sw.reason&&<div style={{marginTop:6,fontStyle:"italic",color:"#94a3b8"}}>"{respondModal.sw.reason}"</div>}
          </div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Your note (optional)</label>
            <textarea className="fta" value={respondNote} onChange={e=>setRespondNote(e.target.value)} placeholder="Optional message…"/>
          </div>
        </Modal>
      )}

      {/* ════ ADMIN APPROVE/REJECT MODAL ════ */}
      {adminSwapM&&(
        <Modal title={adminSwapM.action==="approved"?"Approve Swap":"Reject Swap"}
          onClose={()=>{setAdminSwapM(null);setAdminSwapNote("");}}
          footer={<>
            <button className="btn bs" onClick={()=>{setAdminSwapM(null);setAdminSwapNote("");}}>Cancel</button>
            <button className={`btn ${adminSwapM.action==="approved"?"bp":"bd"}`}
              onClick={()=>handleAdminSwap(adminSwapM.sw,adminSwapM.action)}>
              {adminSwapM.action==="approved"?"✓ Approve & apply to rota":"✗ Reject"}
            </button>
          </>}>
          <div style={{marginBottom:12,padding:12,background:"#f8fafc",borderRadius:8,fontSize:12.5}}>
            <strong>{adminSwapM.sw.fromName}</strong> ⇄ <strong>{adminSwapM.sw.toName}</strong><br/>
            <span style={{color:"#64748b",fontSize:11.5}}>
              {adminSwapM.sw.swapKind==="mutual"
                ?<>{fmtDisp(adminSwapM.sw.fromDate)} <strong>{adminSwapM.sw.fromSlot}</strong> ⇄ {fmtDisp(adminSwapM.sw.toDate)} <strong>{adminSwapM.sw.toSlot}</strong></>
                :<>{fmtDisp(adminSwapM.sw.fromDate)} <strong>{adminSwapM.sw.fromSlot}</strong> → {adminSwapM.sw.toName} covers</>}
            </span>
            {adminSwapM.sw.bNote&&<div style={{marginTop:6,fontSize:11,color:"#64748b"}}>Note from {adminSwapM.sw.toName}: "{adminSwapM.sw.bNote}"</div>}
            {adminSwapM.action==="approved"&&<div className="al al-s" style={{marginTop:10,fontSize:11.5}}>✓ The rota will be updated automatically on approval.</div>}
          </div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Admin note (optional)</label>
            <textarea className="fta" value={adminSwapNote} onChange={e=>setAdminSwapNote(e.target.value)} placeholder="Optional note for both staff…"/>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROTA RULES
// ═══════════════════════════════════════════════════════════════

function RotaRulesView({rotaRulesText,setRotaRulesText,addAudit,currentUser,isAdmin}) {
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(rotaRulesText||"");

  const save=()=>{
    setRotaRulesText(draft);
    addAudit(currentUser.init,"Rota Rules","Rota rules text updated");
    setEditing(false);
  };
  const cancel=()=>{setDraft(rotaRulesText||"");setEditing(false);};

  // Render plain text with line-breaks preserved
  const renderText=txt=>{
    if(!txt||!txt.trim()) return <p style={{color:"#94a3b8",fontStyle:"italic",margin:0}}>No rota rules have been published yet.</p>;
    return txt.split("\n").map((line,i)=>{
      // Render lines starting with # as headings
      if(line.startsWith("### ")) return <h4 key={i} style={{margin:"18px 0 6px",fontSize:14,fontWeight:700,color:"#1e293b"}}>{line.slice(4)}</h4>;
      if(line.startsWith("## "))  return <h3 key={i} style={{margin:"22px 0 8px",fontSize:16,fontWeight:700,color:"#0f172a",borderBottom:"1px solid #e2e8f0",paddingBottom:6}}>{line.slice(3)}</h3>;
      if(line.startsWith("# "))   return <h2 key={i} style={{margin:"24px 0 10px",fontSize:19,fontWeight:800,color:"#0f172a"}}>{line.slice(2)}</h2>;
      if(line.startsWith("- ")||line.startsWith("• ")) return <div key={i} style={{display:"flex",gap:8,padding:"2px 0",fontSize:13.5,color:"#374151"}}><span style={{color:"#6366f1",flexShrink:0,marginTop:2}}>•</span><span>{line.slice(2)}</span></div>;
      if(line.trim()==="") return <div key={i} style={{height:10}}/>;
      return <p key={i} style={{margin:"4px 0",fontSize:13.5,color:"#374151",lineHeight:1.65}}>{line}</p>;
    });
  };

  return (
    <div style={{maxWidth:800}}>
      <div className="card">
        <div className="ch" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span className="ct">📜 Rota Rules</span>
          {isAdmin&&!editing&&<button className="btn bp bsm" onClick={()=>{setDraft(rotaRulesText||"");setEditing(true);}}>✏️ Edit</button>}
        </div>
        <div className="cb">
          {isAdmin&&editing?(
            <>
              <div className="al al-i" style={{marginBottom:12,fontSize:12.5}}>
                Use <strong># Heading</strong>, <strong>## Section</strong>, <strong>### Sub-section</strong> for headings. Use <strong>- item</strong> for bullet points. Blank lines create spacing.
              </div>
              <textarea
                value={draft}
                onChange={e=>setDraft(e.target.value)}
                rows={20}
                style={{width:"100%",fontFamily:"'DM Sans',sans-serif",fontSize:13.5,lineHeight:1.6,padding:"12px 14px",border:"1px solid #e2e8f0",borderRadius:8,resize:"vertical",color:"#374151",background:"#f8fafc",boxSizing:"border-box"}}
                placeholder={"# Rota Rules 2026/27\n\n## Overview\nWrite an overview of how the rota works...\n\n## Shift Types\n- Early: 08:00–16:00\n- Mid: 12:00–20:00\n- Late: 14:00–22:00\n\n## Night Blocks\n..."}
              />
              <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
                <button className="btn bs" onClick={cancel}>Cancel</button>
                <button className="btn bp" onClick={save}>Save Rules</button>
              </div>
            </>
          ):(
            <div style={{fontFamily:"'DM Sans',sans-serif",lineHeight:1.65}}>
              {renderText(rotaRulesText||"")}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// STAFF MANAGEMENT
// ═══════════════════════════════════════════════════════════════

function StaffMgmt({staff,setStaff,addAudit,currentUser}) {
  const [modal,setModal]=useState(null); const [form,setForm]=useState({});
  const [pwModal,setPwM]=useState(null); const [newPw,setNPw]=useState("");
  const isOwner=!!currentUser.isOwner;

  const save=()=>{
    const rec={...form,slDays:parseInt(form.slDays)||0,militaryDays:parseInt(form.militaryDays)||0};
    modal==="add"?setStaff(p=>[...p,{...rec,id:Date.now()}]):setStaff(p=>p.map(s=>s.id===modal.id?{...s,...rec}:s));
    addAudit(currentUser.init,"Staff",`${form.name} ${modal==="add"?"added":"updated"}`);setModal(null);
  };

  const promoteToAdmin = s => {
    if(!confirm(`Promote ${s.name} to Admin? They will gain full administrative access.`)) return;
    setStaff(p=>p.map(x=>x.id===s.id?{...x,role:"admin"}:x));
    addAudit(currentUser.init,"Staff Role","Promoted "+s.name+" to Admin");
  };
  const demoteToStaff = s => {
    if(!confirm(`Remove admin access from ${s.name}? They will become a regular staff member.`)) return;
    setStaff(p=>p.map(x=>x.id===s.id?{...x,role:"staff"}:x));
    addAudit(currentUser.init,"Staff Role","Demoted "+s.name+" to Staff");
  };

  // Staff table: all non-admin, plus non-owner admins if viewer is owner
  const staffMembers = staff.filter(s=>s.role==="staff");
  const adminMembers = isOwner ? staff.filter(s=>s.role==="admin"&&!s.isOwner) : [];
  const allShow = staffMembers; // main table always shows staff
  const demoLoadable = allShow.length===0&&IS_DEMO;

  const StaffRow = ({s, showRole=false}) => (
    <tr key={s.id}>
      <td style={{fontWeight:600}}>{s.name}</td>
      <td><code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:4,fontSize:11}}>{s.init}</code></td>
      <td>{s.grade}{s.military&&<span className="badge b-admin" style={{marginLeft:4,fontSize:9,padding:"1px 5px"}}>MIL</span>}</td>
      <td>{s.hrs}</td>
      {showRole&&<td><span className={`badge ${s.role==="admin"?"b-admin":"b-approved"}`}>{s.role==="admin"?"Admin":"Staff"}</span></td>}
      <td><span className={`badge ${s.active?"b-approved":"b-rejected"}`}>{s.active?"Active":"Inactive"}</span></td>
      <td><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <button className="btn bs bsm" onClick={()=>{setForm({...s});setModal(s);}}>Edit</button>
        <button className="btn bs bsm" onClick={()=>{setPwM(s);setNPw("");}}>🔑</button>
        {isOwner&&s.role==="staff"&&<button className="btn bsm" style={{background:"#ede9fe",color:"#5b21b6",border:"1px solid #c4b5fd"}} onClick={()=>promoteToAdmin(s)}>Make Admin</button>}
        {isOwner&&s.role==="admin"&&<button className="btn bsm" style={{background:"#fef3c7",color:"#92400e",border:"1px solid #fcd34d"}} onClick={()=>demoteToStaff(s)}>Make Staff</button>}
        <button className={`btn bsm ${s.active?"bd":"bp"}`} onClick={()=>{setStaff(p=>p.map(x=>x.id===s.id?{...x,active:!x.active}:x));addAudit(currentUser.init,"Staff",`${s.name} ${s.active?"deactivated":"activated"}`);}}>
          {s.active?"Deactivate":"Activate"}
        </button>
      </div></td>
    </tr>
  );

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <button className="btn bp" onClick={()=>{setForm({name:"",init:"",grade:"ST4+",hrs:45.25,pw:"rota2026",role:"staff",active:true,slDays:30,militaryDays:0,nightBlockPref:"any",military:false});setModal("add");}}>＋ Add Staff</button>
        {isOwner&&<button className="btn" style={{background:"#ede9fe",color:"#5b21b6",border:"1px solid #c4b5fd"}} onClick={()=>{setForm({name:"",init:"",grade:"Admin",hrs:0,pw:"admin2026",role:"admin",active:true,slDays:0,militaryDays:0,nightBlockPref:"any",military:false});setModal("add");}}>＋ Add Admin</button>}
        {demoLoadable&&<button className="btn" style={{background:"#f0f9ff",color:"#0369a1",border:"1px solid #bae6fd"}} onClick={()=>{if(!confirm("Load all 32 default NBT staff? This will add them with password rota2026.")) return; const existing=staff.map(s=>s.init); const toAdd=INIT_STAFF.filter(s=>s.role==="staff"&&!existing.includes(s.init)); setStaff(p=>[...p,...toAdd]);}}>📋 Load Default Staff</button>}
      </div>

      {/* Main staff table */}
      <div className="card" style={{marginBottom:16}}>
        <div className="ch"><span className="ct">Staff Members</span><span style={{fontSize:12,color:"#6b7280",fontWeight:400}}>{staffMembers.length} members</span></div>
        <table className="tbl">
          <thead><tr><th>Name</th><th>Init</th><th>Grade</th><th>Hrs</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>{allShow.map(s=><StaffRow key={s.id} s={s} showRole={false}/>)}</tbody>
        </table>
      </div>

      {/* Admin members table — owner only */}
      {isOwner&&(
        <div className="card">
          <div className="ch"><span className="ct">Admin Users</span><span style={{fontSize:12,color:"#6b7280",fontWeight:400}}>{adminMembers.length+1} admins (incl. you)</span></div>
          <div className="cb" style={{paddingTop:0,paddingBottom:0}}>
            {/* Owner row — read only */}
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:adminMembers.length?"1px solid #f1f5f9":"none"}}>
              <div style={{flex:1,fontWeight:600,fontSize:13.5}}>{currentUser.name}</div>
              <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:4,fontSize:11}}>{currentUser.init}</code>
              <span className="badge b-admin" style={{fontSize:10}}>Owner</span>
              <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>Cannot be changed</span>
            </div>
            {adminMembers.map((s,i)=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<adminMembers.length-1?"1px solid #f1f5f9":"none",flexWrap:"wrap"}}>
                <div style={{flex:1,fontWeight:600,fontSize:13.5}}>{s.name}</div>
                <code style={{background:"#f1f5f9",padding:"1px 5px",borderRadius:4,fontSize:11}}>{s.init}</code>
                <span className={`badge ${s.active?"b-approved":"b-rejected"}`}>{s.active?"Active":"Inactive"}</span>
                <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
                  <button className="btn bs bsm" onClick={()=>{setForm({...s});setModal(s);}}>Edit</button>
                  <button className="btn bs bsm" onClick={()=>{setPwM(s);setNPw("");}}>🔑</button>
                  <button className="btn bsm" style={{background:"#fef3c7",color:"#92400e",border:"1px solid #fcd34d"}} onClick={()=>demoteToStaff(s)}>Make Staff</button>
                  <button className={`btn bsm ${s.active?"bd":"bp"}`} onClick={()=>{setStaff(p=>p.map(x=>x.id===s.id?{...x,active:!x.active}:x));addAudit(currentUser.init,"Staff",`${s.name} ${s.active?"deactivated":"activated"}`);}}>
                    {s.active?"Deactivate":"Activate"}
                  </button>
                </div>
              </div>
            ))}
            {adminMembers.length===0&&<div style={{padding:"12px 0",color:"#94a3b8",fontSize:13,fontStyle:"italic"}}>No additional admin users. Use "Add Admin" above to grant admin access.</div>}
          </div>
        </div>
      )}

      {modal&&<Modal title={modal==="add"?"Add Staff":"Edit Staff"} onClose={()=>setModal(null)}
        footer={<><button className="btn bs" onClick={()=>setModal(null)}>Cancel</button><button className="btn bp" onClick={save}>Save</button></>}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="fg"><label className="fl">Full Name</label><input className="fi" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Initials</label><input className="fi" value={form.init||""} onChange={e=>setForm(f=>({...f,init:e.target.value.toUpperCase()}))}/></div>
          {form.role!=="admin"&&<><div className="fg"><label className="fl">Grade</label><select className="fi" value={form.grade||"ST4+"} onChange={e=>setForm(f=>({...f,grade:e.target.value}))}>
            <option>ST4+</option><option>ST3</option><option>ACP</option><option>tACP</option><option>PHEM Fellow</option><option>Research Fellow</option>
          </select></div>
          <div className="fg"><label className="fl">Hours/Week</label><input type="number" className="fi" value={form.hrs||45.25} onChange={e=>setForm(f=>({...f,hrs:parseFloat(e.target.value)||0}))}/></div>
          <div className="fg"><label className="fl">SL Days Entitlement / yr</label><input type="number" className="fi" value={form.slDays??30} onChange={e=>setForm(f=>({...f,slDays:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Military Days / yr</label><input type="number" className="fi" value={form.militaryDays??0} onChange={e=>setForm(f=>({...f,militaryDays:e.target.value}))}/></div>
          <div className="fg"><label className="fl">Night Block Preference</label>
            <select className="fi" value={form.nightBlockPref||"any"} onChange={e=>setForm(f=>({...f,nightBlockPref:e.target.value}))}>
              <option value="any">No preference</option>
              <option value="4">4 nights (Mon–Thu)</option>
              <option value="2">2 nights</option>
            </select>
          </div>
          <div className="fg" style={{gridColumn:"1/-1"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12.5,fontWeight:500,color:"#374151"}}>
              <input type="checkbox" checked={!!form.military} onChange={e=>setForm(f=>({...f,military:e.target.checked}))} style={{width:16,height:16,accentColor:"#10b981"}}/>
              Military contract — uses Military hours targets but keeps grade for shift eligibility
            </label>
          </div></>}
          {modal==="add"&&<div className="fg"><label className="fl">Password</label><input className="fi" value={form.pw||(form.role==="admin"?"admin2026":"rota2026")} onChange={e=>setForm(f=>({...f,pw:e.target.value}))}/></div>}
        </div>
      </Modal>}
      {pwModal&&<Modal title={`Reset Password — ${pwModal.name}`} onClose={()=>setPwM(null)}
        footer={<><button className="btn bs" onClick={()=>setPwM(null)}>Cancel</button><button className="btn bp" disabled={!newPw} onClick={()=>{setStaff(p=>p.map(s=>s.id===pwModal.id?{...s,pw:newPw}:s));addAudit(currentUser.init,"Password Reset",pwModal.name);setPwM(null);}}>Reset</button></>}>
        <div className="fg" style={{marginBottom:0}}><label className="fl">New Password</label><input className="fi" value={newPw} onChange={e=>setNPw(e.target.value)} placeholder="Enter new password"/></div>
      </Modal>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CONFLICTS & RULES
// ═══════════════════════════════════════════════════════════════

const DOW_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const GRP_LABELS = {EARLY:"Early",MID:"Mid",LATE:"Late",WE_EARLY:"W/E Early",WE_LATE:"W/E Late",NIGHT1:"Night (N1)",NIGHT2:"Night (N2)",ST3_NIGHT:"Night (ST3)",ACP_NIGHT:"Night (ACP)"};

function ConflictsView({rota, leaveEntries, availability, staff, quarters, addAudit, currentUser, constraintRules, setConstraintRules, sysRules, setSysRules, genRules}) {
  const [tab, setTab] = useState("conflicts");
  const [addForm, setAddForm] = useState(null); // null | "new"
  const [form, setForm] = useState({init:"",type:"avoid_day",dayOfWeek:"Monday",slotGroup:"EARLY",note:"",severity:"warn"});
  const [selQ, setSelQ] = useState("Q1");

  const qs = quarters || QUARTERS;
  const activeStaff = staff.filter(s=>s.role==="staff"&&s.active);
  const selQDef = qs.find(q=>q.id===selQ)||qs[0];
  const rotaDates = selQDef ? getDatesInRange(selQDef.start, selQDef.end) : [];

  // Detect live conflicts across all enabled system rules
  const conflicts = useMemo(() => {
    const out = [];
    // Precompute double books per date
    const doubleBookMap = {};
    rotaDates.forEach(date => {
      const vals = Object.values(rota[date]||{}).filter(Boolean);
      const seen = {};
      vals.forEach(init => { seen[init] = (seen[init]||0) + 1; });
      const dupes = new Set(Object.entries(seen).filter(([,c])=>c>1).map(([i])=>i));
      if (dupes.size) doubleBookMap[date] = dupes;
    });

    rotaDates.forEach(date => {
      const dayRota = rota[date] || {};
      Object.entries(dayRota).forEach(([slotKey, init]) => {
        if (!init) return;
        const avEntry = getAvailEntry(availability, init, date);
        const base = avEntry?.base;
        const lv = (leaveEntries[date]||[]).find(e=>e.init===init);
        const sm = activeStaff.find(s=>s.init===init);
        const sl = SLOTS.find(s=>s.key===slotKey);

        const addConflict = (reason, severity) => {
          out.push({date, slotKey, init, name:sm?.name||init, grade:sm?.grade||"", slotLabel:sl?.label||slotKey, bg:sl?.bg||"#f1f5f9", fg:sl?.fg||"#374151", reason, severity:severity||"error"});
        };

        if (sysRules?.unavailConflict?.enabled !== false) {
          if (base === "UNAVAILABLE") addConflict("Marked unavailable");
          else if (base === "SL") addConflict("Availability: Study Leave");
          else if (base === "MILITARY") addConflict("Availability: Military");
          else if (base === "PHEM") addConflict("Availability: PHEM");
        }
        const availBlocked = base==="UNAVAILABLE"||base==="SL"||base==="MILITARY"||base==="PHEM";
        if (sysRules?.leaveEntryClash?.enabled !== false && lv && !availBlocked) {
          addConflict(`Leave entry: ${LEAVE_T[lv.type]?.label || lv.type}`, "warn");
        }
        if (sysRules?.gradeMismatch?.enabled !== false && sm && genRules?.slotGrades?.[slotKey] && !genRules.slotGrades[slotKey].includes(sm.grade)) {
          addConflict(`Grade mismatch: ${sm.grade} in ${sl?.label||slotKey}`, "warn");
        }
        if (sysRules?.doubleBook?.enabled !== false && doubleBookMap[date]?.has(init)) {
          addConflict("Double booked (multiple slots same day)");
        }
      });
    });
    out.sort((a,b)=>a.date.localeCompare(b.date)||a.slotKey.localeCompare(b.slotKey));
    return out;
  }, [rotaDates, rota, leaveEntries, availability, sysRules, genRules]);

  // Rule violations: constraint rule + actual assignment
  const ruleViolations = useMemo(() => {
    const out = [];
    rotaDates.forEach(date => {
      const dayRota = rota[date] || {};
      const dow = new Date(date+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long"});
      Object.entries(dayRota).forEach(([slotKey, init]) => {
        if (!init) return;
        const sl = SLOTS.find(s=>s.key===slotKey);
        constraintRules.filter(r=>r.active&&r.init===init).forEach(r => {
          let triggered = false;
          if (r.type==="avoid_day" && r.dayOfWeek===dow) triggered=true;
          if (r.type==="avoid_slot_group" && sl && r.slotGroup===sl.grp) triggered=true;
          if (triggered) {
            const sm = activeStaff.find(s=>s.init===init);
            out.push({date, slotKey, init, name:sm?.name||init, rule:r, slotLabel:sl?.label||slotKey, bg:sl?.bg||"#f1f5f9", fg:sl?.fg||"#374151"});
          }
        });
      });
    });
    out.sort((a,b)=>a.date.localeCompare(b.date));
    return out;
  }, [rotaDates, rota, constraintRules]);

  const addRule = () => {
    if (!form.init || !form.note.trim()) return;
    const sm = activeStaff.find(s=>s.init===form.init);
    const rule = {...form, id:Date.now(), name:sm?.name||form.init, active:true, createdDate:fmtISO(new Date()), createdBy:currentUser.init};
    setConstraintRules(p=>[...p, rule]);
    addAudit(currentUser.init,"Constraint Added",`${rule.name}: ${rule.note}`);
    setAddForm(null);
    setForm({init:"",type:"avoid_day",dayOfWeek:"Monday",slotGroup:"EARLY",note:"",severity:"warn"});
  };

  const toggleRule = id => setConstraintRules(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r));
  const deleteRule = id => { setConstraintRules(p=>p.filter(r=>r.id!==id)); addAudit(currentUser.init,"Constraint Removed","Rule deleted"); };

  const CONF_SEVERITY = {warn:{bg:"#fef3c7",fg:"#92400e",label:"Warning"},info:{bg:"#eff6ff",fg:"#1d4ed8",label:"Info"}};

  return (
    <div>
      <div style={{display:"flex",gap:7,marginBottom:16}}>
        <button className={`btn${tab==="conflicts"?" bp":" bs"}`} onClick={()=>setTab("conflicts")}>⚠️ Active Conflicts</button>
        <button className={`btn${tab==="rules"?" bp":" bs"}`} onClick={()=>setTab("rules")}>📏 Rules & Constraints</button>
      </div>

      {tab==="conflicts"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <span style={{fontSize:12.5,color:"#64748b",fontWeight:500}}>Quarter:</span>
            <div className="mtog">
              {qs.map(q=><button key={q.id} className={`mtog-btn${selQ===q.id?" act":""}`} onClick={()=>setSelQ(q.id)}>{q.id}</button>)}
            </div>
            {conflicts.length===0&&ruleViolations.length===0
              ?<span style={{fontSize:12,color:"#10b981",fontWeight:600,marginLeft:4}}>✓ No conflicts in {selQ}</span>
              :<span style={{fontSize:12,color:"#ef4444",fontWeight:600,marginLeft:4}}>{conflicts.length+ruleViolations.length} issue{conflicts.length+ruleViolations.length!==1?"s":""} in {selQ}</span>}
          </div>

          {conflicts.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="ch"><span className="ct">Availability / Leave Conflicts</span><span style={{fontSize:11.5,color:"#ef4444",fontWeight:700}}>{conflicts.length}</span></div>
              <div style={{overflowX:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Date</th><th>Day</th><th>Slot</th><th>Staff</th><th>Grade</th><th>Reason</th></tr></thead>
                  <tbody>{conflicts.map((c,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtShort(c.date)}</td>
                      <td style={{color:"#64748b"}}>{getDayName(c.date)}</td>
                      <td><span style={{background:c.bg,color:c.fg,padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:700,whiteSpace:"nowrap"}}>{c.slotLabel}</span></td>
                      <td style={{fontWeight:600}}>{c.name}</td>
                      <td style={{color:"#64748b",fontSize:11}}>{c.grade}</td>
                      <td><span style={{background:c.severity==="warn"?"#fff7ed":"#fee2e2",color:c.severity==="warn"?"#92400e":"#7f1d1d",padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:600}}>{c.reason}</span></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </div>
          )}

          {ruleViolations.length>0&&(
            <div className="card">
              <div className="ch"><span className="ct">Rule Violations</span><span style={{fontSize:11.5,color:"#f59e0b",fontWeight:700}}>{ruleViolations.length}</span></div>
              <div style={{overflowX:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Date</th><th>Day</th><th>Slot</th><th>Staff</th><th>Rule</th></tr></thead>
                  <tbody>{ruleViolations.map((v,i)=>{
                    const sev=CONF_SEVERITY[v.rule.severity]||CONF_SEVERITY.warn;
                    return (
                      <tr key={i}>
                        <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtShort(v.date)}</td>
                        <td style={{color:"#64748b"}}>{getDayName(v.date)}</td>
                        <td><span style={{background:v.bg,color:v.fg,padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:700,whiteSpace:"nowrap"}}>{v.slotLabel}</span></td>
                        <td style={{fontWeight:600}}>{v.name}</td>
                        <td><span style={{background:sev.bg,color:sev.fg,padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:600}}>{v.rule.note}</span></td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              </div>
            </div>
          )}

          {conflicts.length===0&&ruleViolations.length===0&&(
            <div className="card"><div className="cb" style={{textAlign:"center",padding:40}}>
              <div style={{fontSize:32,marginBottom:8}}>✅</div>
              <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>No conflicts found in {selQ}</div>
              <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>All assigned staff are available on their scheduled dates.</div>
            </div></div>
          )}
        </div>
      )}

      {tab==="rules"&&(
        <div>
          {/* ── System Rules ── */}
          <div className="card" style={{marginBottom:16}}>
            <div className="ch">
              <span className="ct">System Rules</span>
              <span style={{fontSize:11.5,color:"#64748b"}}>Built-in checks — disable to suppress a category</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead><tr><th>Check</th><th>Description</th><th>Severity</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>{Object.entries(sysRules||DEFAULT_SYS_RULES).map(([key,rule])=>{
                  const sevBg = rule.severity==="error"?"#fee2e2":rule.severity==="warn"?"#fff7ed":"#eff6ff";
                  const sevFg = rule.severity==="error"?"#7f1d1d":rule.severity==="warn"?"#92400e":"#1d4ed8";
                  return (
                    <tr key={key} style={{opacity:rule.enabled?1:.45}}>
                      <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{rule.label}</td>
                      <td style={{fontSize:12,color:"#64748b"}}>{rule.desc}</td>
                      <td><span style={{background:sevBg,color:sevFg,padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:600,textTransform:"capitalize"}}>{rule.severity}</span></td>
                      <td><span className={`badge ${rule.enabled?"b-approved":"b-rejected"}`}>{rule.enabled?"Active":"Disabled"}</span></td>
                      <td><button className="btn bs bsm" onClick={()=>setSysRules(p=>({...p,[key]:{...p[key],enabled:!p[key].enabled}}))}>{rule.enabled?"Disable":"Enable"}</button></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>

          {/* ── Custom Rules ── */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>Custom per-staff rules</div>
            <button className="btn bp" onClick={()=>setAddForm("new")}>＋ Add Rule</button>
          </div>

          <div className="card">
            {constraintRules.length===0&&!addForm&&(
              <div className="cb" style={{textAlign:"center",padding:32,color:"#94a3b8"}}>
                <div style={{fontSize:28,marginBottom:6}}>📏</div>
                <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>No custom rules yet</div>
                <div style={{fontSize:12,marginTop:4}}>Add per-staff rules such as "MW should not do Monday nights". Violations show as amber warnings in the Rota Builder.</div>
              </div>
            )}
            {constraintRules.length>0&&(
              <div style={{overflowX:"auto"}}>
                <table className="tbl">
                  <thead><tr><th>Staff</th><th>Grade</th><th>Rule</th><th>Note</th><th>Severity</th><th>Status</th><th>Actions</th></tr></thead>
                  <tbody>{constraintRules.map(r=>{
                    const sm=activeStaff.find(s=>s.init===r.init);
                    const sev=CONF_SEVERITY[r.severity]||CONF_SEVERITY.warn;
                    const ruleDesc = r.type==="avoid_day"
                      ? `Avoid ${r.dayOfWeek}s`
                      : r.type==="avoid_slot_group"
                      ? `Avoid ${GRP_LABELS[r.slotGroup]||r.slotGroup} shifts`
                      : "Note";
                    return (
                      <tr key={r.id} style={{opacity:r.active?1:.5}}>
                        <td style={{fontWeight:600}}>{r.name||r.init}</td>
                        <td style={{color:"#64748b",fontSize:11}}>{sm?.grade||"—"}</td>
                        <td><span style={{background:"#f1f5f9",color:"#475569",padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:600}}>{ruleDesc}</span></td>
                        <td style={{color:"#374151",fontSize:12}}>{r.note}</td>
                        <td><span style={{background:sev.bg,color:sev.fg,padding:"2px 7px",borderRadius:4,fontSize:10.5,fontWeight:600}}>{sev.label}</span></td>
                        <td><span className={`badge ${r.active?"b-approved":"b-rejected"}`}>{r.active?"Active":"Inactive"}</span></td>
                        <td>
                          <div style={{display:"flex",gap:5}}>
                            <button className="btn bs bsm" onClick={()=>toggleRule(r.id)}>{r.active?"Disable":"Enable"}</button>
                            <button className="btn bsm" style={{color:"#ef4444",border:"1px solid #fca5a5"}} onClick={()=>deleteRule(r.id)}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              </div>
            )}
          </div>

          {addForm&&(
            <Modal title="Add Constraint Rule" onClose={()=>setAddForm(null)}
              footer={<><button className="btn bs" onClick={()=>setAddForm(null)}>Cancel</button><button className="btn bp" disabled={!form.init||!form.note.trim()} onClick={addRule}>Add Rule</button></>}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div className="fg" style={{gridColumn:"1/-1"}}>
                  <label className="fl">Staff Member</label>
                  <select className="fi" value={form.init} onChange={e=>setForm(f=>({...f,init:e.target.value}))}>
                    <option value="">Select staff…</option>
                    {activeStaff.sort((a,b)=>a.name.localeCompare(b.name)).map(s=><option key={s.id} value={s.init}>{s.name} ({s.grade})</option>)}
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">Rule Type</label>
                  <select className="fi" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    <option value="avoid_day">Avoid day of week</option>
                    <option value="avoid_slot_group">Avoid shift type</option>
                    <option value="note">Note only</option>
                  </select>
                </div>
                <div className="fg">
                  <label className="fl">Severity</label>
                  <select className="fi" value={form.severity} onChange={e=>setForm(f=>({...f,severity:e.target.value}))}>
                    <option value="warn">Warning</option>
                    <option value="info">Info</option>
                  </select>
                </div>
                {form.type==="avoid_day"&&(
                  <div className="fg" style={{gridColumn:"1/-1"}}>
                    <label className="fl">Day of Week</label>
                    <select className="fi" value={form.dayOfWeek} onChange={e=>setForm(f=>({...f,dayOfWeek:e.target.value}))}>
                      {DOW_FULL.map(d=><option key={d}>{d}</option>)}
                    </select>
                  </div>
                )}
                {form.type==="avoid_slot_group"&&(
                  <div className="fg" style={{gridColumn:"1/-1"}}>
                    <label className="fl">Shift Type</label>
                    <select className="fi" value={form.slotGroup} onChange={e=>setForm(f=>({...f,slotGroup:e.target.value}))}>
                      {Object.entries(GRP_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </select>
                  </div>
                )}
                <div className="fg" style={{gridColumn:"1/-1"}}>
                  <label className="fl">Note / Reason</label>
                  <input className="fi" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="e.g. Childcare on Mondays, cannot do night shifts…"/>
                </div>
              </div>
            </Modal>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// FIXED DAYS OFF — Admin view
// ═══════════════════════════════════════════════════════════════

function FixedDaysView({fixedDaysOff,setFixedDaysOff,staff,addAudit,currentUser}) {
  const [filterInit,setFilterInit]=useState("");
  const filtered=fixedDaysOff.filter(f=>!filterInit||f.init===filterInit);
  const DAY_ORDER=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const sorted=[...filtered].sort((a,b)=>DAY_ORDER.indexOf(a.dayOfWeek)-DAY_ORDER.indexOf(b.dayOfWeek)||a.name?.localeCompare(b.name));
  return (
    <div>
      <div className="card">
        <div className="ch">
          <span className="ct">Fixed Days Off</span>
          <select className="fi" style={{width:180,padding:"4px 8px",marginLeft:"auto"}} value={filterInit} onChange={e=>setFilterInit(e.target.value)}>
            <option value="">All Staff</option>
            {staff.filter(s=>s.role==="staff"&&s.active).sort((a,b)=>a.name.localeCompare(b.name)).map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
          </select>
        </div>
        <div className="cb">
          {sorted.length===0&&<p style={{fontSize:12.5,color:"#94a3b8",padding:"8px 0"}}>No fixed days off recorded.</p>}
          <table className="tbl">
            <thead><tr><th>Staff</th><th>Grade</th><th>Day</th><th>Reason</th><th>Added</th><th>Action</th></tr></thead>
            <tbody>{sorted.map(f=>{
              const sm=staff.find(s=>s.init===f.init);
              return (
                <tr key={f.id}>
                  <td style={{fontWeight:600}}>{f.name||f.init}</td>
                  <td>{sm?.grade||"—"}</td>
                  <td>{f.dayOfWeek}</td>
                  <td><span style={{padding:"2px 8px",borderRadius:4,background:"#eff6ff",color:"#1d4ed8",fontSize:11,fontWeight:600}}>{f.reason}</span></td>
                  <td style={{fontSize:11,color:"#94a3b8"}}>{f.addedDate||"—"}</td>
                  <td><button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>{setFixedDaysOff(prev=>prev.filter(x=>x.id!==f.id));addAudit(currentUser.init,"Fixed Day Off",`Admin removed ${f.name||f.init} fixed ${f.reason}: ${f.dayOfWeek}`);}}>Remove</button></td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════════

function Reports({user,staff,rota,leaveEntries,requests,quarters,availability}) {
  const isAdmin=user.role==="admin";
  const qs=quarters||QUARTERS;
  const target=isAdmin?staff.filter(s=>s.role==="staff"&&s.active):staff.filter(s=>s.init===user.init);

  // Quarter selector — default to the current/most recent quarter
  const todayStr=fmtISO(new Date());
  const defaultQ=(qs.find(q=>todayStr>=q.start&&todayStr<=q.end)||qs.find(q=>todayStr<q.start)||qs[qs.length-1])?.id||"Q1";
  const [selQ,setSelQ]=useState(defaultQ);
  const selQDef=qs.find(q=>q.id===selQ)||qs[0];

  const earlySlots=["E1","E2","E3","E4","WE1","WE2","WE3"];
  const midSlots  =["M1","M2","M3"];
  const lateSlots =["L1","L2","L3","L4","WL1","WL2"];
  const nightSlots=["N1","N2","SN","AN"];
  const weekKey=d=>{const dt=new Date(d);const mon=new Date(dt);mon.setDate(dt.getDate()-((dt.getDay()+6)%7));return mon.toISOString().slice(0,10);};

  // Build leave date sets: leaveEntries + approved requests + availability entries
  const getLeaveTypeDates=(init,filterFn,types)=>{
    const dates=new Set();
    const typeSet=new Set(Array.isArray(types)?types:[types]);
    // From leaveEntries state
    Object.entries(leaveEntries).forEach(([d,es])=>{
      if(!filterFn||filterFn(d)) es.filter(e=>e.init===init&&typeSet.has(e.type)).forEach(()=>dates.add(d));
    });
    // From availability base entries (e.g. staff marked day as SL/MILITARY in availability)
    if(availability&&availability[init]){
      Object.entries(availability[init]).forEach(([d,raw])=>{
        if(!filterFn||filterFn(d)){
          const e=normaliseAvailEntry(raw);
          if(e&&typeSet.has(e.base)) dates.add(d);
        }
      });
    }
    // From approved requests (expand date range)
    (requests||[]).filter(r=>(r.staffInitials===init||r.init===init)&&typeSet.has(r.type)&&r.status==="approved").forEach(r=>{
      const ds=getDatesInRange(r.startDate,r.endDate);
      ds.forEach(d=>{if(!filterFn||filterFn(d))dates.add(d);});
    });
    return dates;
  };
  const getSLDates =(init,filterFn)=>getLeaveTypeDates(init,filterFn,"SL");
  const getMilDates=(init,filterFn)=>getLeaveTypeDates(init,filterFn,"MILITARY");

  const calcStats=(init,dateFn)=>{
    const mySlots=Object.entries(rota).filter(([d])=>!dateFn||dateFn(d)).flatMap(([d,slots])=>Object.entries(slots).filter(([,v])=>v===init).map(([sk])=>({d,sk})));
    const total=mySlots.length;
    const nights=mySlots.filter(x=>nightSlots.includes(x.sk)).length;
    const weWeeks=new Set();
    mySlots.forEach(({d,sk})=>{const day=new Date(d).getDay();if(day===6||day===0||(day===5&&nightSlots.includes(sk)))weWeeks.add(weekKey(d));});
    return{total,nights,weWorked:weWeeks.size,earlies:mySlots.filter(x=>earlySlots.includes(x.sk)).length,mids:mySlots.filter(x=>midSlots.includes(x.sk)).length,lates:mySlots.filter(x=>lateSlots.includes(x.sk)).length};
  };

  const qFilter=d=>selQDef&&d>=selQDef.start&&d<=selQDef.end;

  const stats=useMemo(()=>target.map(s=>{
    const yr=calcStats(s.init,null);
    const q=calcStats(s.init,qFilter);
    const slYr=getSLDates(s.init,null).size;
    const slQ=getSLDates(s.init,qFilter).size;
    const milYr=getMilDates(s.init,null).size;
    const milQ=getMilDates(s.init,qFilter).size;
    return{...s,yr,q,slYr,slQ,milYr,milQ,slEntitlement:s.slDays??30,milEntitlement:s.militaryDays??0};
  }),[target,rota,leaveEntries,requests,selQ]);

  const th=(label,sub)=>(
    <th style={{background:"#f8fafc",fontWeight:700,fontSize:10.5,color:"#475569",padding:"7px 8px",textAlign:"center",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap",borderLeft:"1px solid #e2e8f0"}}>
      {label}{sub&&<div style={{fontSize:9,fontWeight:500,color:"#94a3b8",marginTop:1}}>{sub}</div>}
    </th>
  );
  const QYCell=({q,yr,bold,bg,fg})=>(
    <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f1f5f9",borderLeft:"1px solid #f4f6fb"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
        <span style={{fontWeight:700,fontSize:12.5,color:bold?"#0f172a":fg||"#374151",background:bg,padding:bg?"1px 6px":"0",borderRadius:bg?4:0}}>{q}</span>
        <span style={{color:"#cbd5e1",fontSize:10}}>/</span>
        <span style={{fontSize:11,color:"#64748b"}}>{yr}</span>
      </div>
    </td>
  );

  const qSel = (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,color:"#94a3b8"}}>Quarter:</span>
      <div className="mtog">
        {qs.map(q=>(
          <button key={q.id} className={`mtog-btn${selQ===q.id?" act":""}`} onClick={()=>setSelQ(q.id)}>{q.id}</button>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <div className="card">
        <div className="ch">
          <span className="ct">Shift &amp; Leave Summary</span>
          {qSel}
        </div>

        {/* ── Vertical (transposed) layout — shown on mobile, and always for single-person staff view ── */}
        {!isAdmin&&stats.length===1&&stats.map(s=>(
          <div key={s.id} className="rpt-vertical">
            <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10}}>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:"#0d1b2a"}}>{s.name}</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:2}}><span style={{padding:"2px 6px",borderRadius:4,background:"#f1f5f9",color:"#475569",fontSize:11,fontWeight:600}}>{s.grade}</span></div>
              </div>
              <div style={{marginLeft:"auto",textAlign:"right",fontSize:10,color:"#94a3b8",lineHeight:1.5}}><strong style={{color:"#374151"}}>{selQ}</strong> / Year</div>
            </div>
            {[
              {label:"Total Shifts",     qv:s.q.total,    yv:s.yr.total,    bg:"#f1f5f9", fg:"#0f172a"},
              {label:"Weekends",         qv:s.q.weWorked, yv:s.yr.weWorked, bg:"#f1f5f9", fg:"#0f172a"},
              {label:"Night Shifts",     qv:s.q.nights,   yv:s.yr.nights,   bg:"#ede9fe", fg:"#4c1d95"},
              {label:"Early Shifts",     qv:s.q.earlies,  yv:s.yr.earlies,  bg:"#dcfce7", fg:"#14532d"},
              {label:"Mid Shifts",       qv:s.q.mids,     yv:s.yr.mids,     bg:"#dbeafe", fg:"#1e3a8a"},
              {label:"Late Shifts",      qv:s.q.lates,    yv:s.yr.lates,    bg:"#fef3c7", fg:"#78350f"},
            ].map(row=>(
              <div key={row.label} className="rpt-vert-row">
                <div className="rpt-vert-label">{row.label}</div>
                <div className="rpt-vert-vals">
                  <span className="rpt-vert-q" style={{background:row.bg,color:row.fg}}>{row.qv}</span>
                  <span className="rpt-vert-yr">/ {row.yv}</span>
                </div>
              </div>
            ))}
            <div className="rpt-vert-row">
              <div className="rpt-vert-label">Study Leave<div className="rpt-vert-sub">year total</div></div>
              <div className="rpt-vert-vals">
                <span className="rpt-vert-q" style={{background:s.slYr>0?"#fef3c7":"#f1f5f9",color:s.slYr>0?"#92400e":"#94a3b8"}}>{s.slYr}</span>
                {s.slEntitlement>0&&<span className="rpt-vert-yr">/ {s.slEntitlement} days</span>}
              </div>
            </div>
            {s.milEntitlement>0&&(
              <div className="rpt-vert-row">
                <div className="rpt-vert-label">Military Leave<div className="rpt-vert-sub">year total</div></div>
                <div className="rpt-vert-vals">
                  <span className="rpt-vert-q" style={{background:s.milYr>0?"#dcfce7":"#f1f5f9",color:s.milYr>0?"#166534":"#94a3b8"}}>{s.milYr}</span>
                  <span className="rpt-vert-yr">/ {s.milEntitlement} days</span>
                </div>
              </div>
            )}
          </div>
        ))}

        {/* ── Horizontal table — shown on desktop for admin, hidden on mobile for staff ── */}
        <div className={isAdmin?"":"rpt-wide"}>
          <div style={{overflowX:"auto"}}>
            <table className="tbl" style={{minWidth:820}}>
              <thead>
                <tr>
                  <th style={{background:"#f8fafc",fontWeight:700,fontSize:10.5,color:"#475569",padding:"7px 10px",textAlign:"left",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap"}}>Staff</th>
                  <th style={{background:"#f8fafc",fontWeight:700,fontSize:10.5,color:"#475569",padding:"7px 8px",textAlign:"center",borderBottom:"2px solid #e2e8f0",whiteSpace:"nowrap"}}>Grade</th>
                  {th("Total","shifts")}
                  {th("W/E","wknds")}
                  {th("Nights","")}
                  {th("Earlies","")}
                  {th("Mids","")}
                  {th("Lates","")}
                  {th("SL Days","year total")}
                  {th("Military","year total")}
                </tr>
              </thead>
              <tbody>{stats.map(s=>(
                <tr key={s.id} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                  <td style={{padding:"6px 10px",fontWeight:600,fontSize:12.5,borderBottom:"1px solid #f1f5f9"}}>{s.name}</td>
                  <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                    <span style={{padding:"2px 6px",borderRadius:4,background:"#f1f5f9",color:"#475569",fontSize:10.5,fontWeight:600}}>{s.grade}</span>
                  </td>
                  <QYCell q={s.q.total} yr={s.yr.total} bold/>
                  <QYCell q={s.q.weWorked} yr={s.yr.weWorked}/>
                  <QYCell q={s.q.nights}   yr={s.yr.nights}   bg="#ede9fe" fg="#4c1d95"/>
                  <QYCell q={s.q.earlies}  yr={s.yr.earlies}  bg="#dcfce7" fg="#14532d"/>
                  <QYCell q={s.q.mids}     yr={s.yr.mids}     bg="#dbeafe" fg="#1e3a8a"/>
                  <QYCell q={s.q.lates}    yr={s.yr.lates}    bg="#fef3c7" fg="#78350f"/>
                  <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f1f5f9",borderLeft:"1px solid #f4f6fb"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                      <span style={{fontWeight:700,fontSize:13,padding:"2px 8px",borderRadius:4,
                        background:s.slYr>0?"#fef3c7":"#f1f5f9",
                        color:s.slYr>0?"#92400e":"#94a3b8"}}>{s.slYr}</span>
                      {s.slEntitlement>0&&<span style={{fontSize:10,color:"#94a3b8"}}>/ {s.slEntitlement}</span>}
                    </div>
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f1f5f9",borderLeft:"1px solid #f4f6fb"}}>
                    {s.milEntitlement>0
                      ?<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                          <span style={{fontWeight:700,fontSize:13,padding:"2px 8px",borderRadius:4,background:s.milYr>0?"#dcfce7":"#f1f5f9",color:s.milYr>0?"#166534":"#94a3b8"}}>{s.milYr}</span>
                          <span style={{fontSize:10,color:"#94a3b8"}}>/ {s.milEntitlement}</span>
                        </div>
                      :<span style={{fontSize:11,color:"#cbd5e1"}}>—</span>}
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{padding:"8px 18px",borderTop:"1px solid #f1f5f9",fontSize:10.5,color:"#94a3b8"}}>
            Shifts show <strong style={{color:"#374151"}}>{selQ} count</strong> / <strong style={{color:"#374151"}}>Year total</strong> · SL &amp; Military show year totals only · includes leave entries, availability entries &amp; approved requests
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROTA CONFIG — FTE references + per-staff WTE
// ═══════════════════════════════════════════════════════════════

const GRADE_KEYS = ["ST4+","ST3","ACP","tACP","Military"];
const SHIFT_FIELDS = [
  {key:"nights",   label:"Nights"},
  {key:"weekends", label:"Weekends"},
  {key:"earlies",  label:"Earlies"},
  {key:"mids",     label:"Mids"},
  {key:"lates",    label:"Lates"},
];

function RotaConfig({wteConfig, setWteConfig, staffHours, setStaffHours, staff, addAudit, shiftTimes, setShiftTimes, staffShiftTimes, setStaffShiftTimes, trainingDays, setTrainingDays, staffShiftOverrides, setShiftOverrides}) {
  const [tab, setTab] = useState("fte"); // "fte" | "hours" | "targets" | "shifttimes" | "training"
  const [targetModal, setTargetModal] = useState(null); // {init, name, grade, qid}
  const activeStaff = staff.filter(s => s.role==="staff" && s.active);
  const [tdDate,setTdDate]  = useState("");
  const [tdType,setTdType]  = useState("SpR");
  const [tdNote,setTdNote]  = useState("");
  const [stStaff,setStStaff] = useState(""); // for per-staff shift time overrides
  const [stSlot,setStSlot]   = useState("E1");

  const setFTE = (grade, field, val) => {
    const num = parseFloat(val);
    if (isNaN(num) || num < 0) return;
    setWteConfig(prev => ({ ...prev, [grade]: { ...(prev[grade]||{}), [field]: num } }));
  };

  const setFTEHours = (grade, val) => {
    const num = parseFloat(val);
    if (isNaN(num) || num <= 0) return;
    setWteConfig(prev => ({ ...prev, [grade]: { ...(prev[grade]||{}), hoursPerWeek: num } }));
  };

  // Store WTE (0.0–1.0) as actual hours = wte × grade full-time hours per quarter
  const setStaffWTEVal = (init, grade, qid, wteVal) => {
    if (wteVal === "") {
      setStaffHours(prev => { const n={...prev,[init]:{...(prev[init]||{})}}; delete n[init][qid]; return n; });
      return;
    }
    const wte = parseFloat(wteVal);
    if (isNaN(wte) || wte < 0 || wte > 2) return;
    const cfg = wteConfig[effGrade({grade})] || wteConfig["ST4+"] || {};
    const full = cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek || 0) * 13 * 10) / 10;
    const hours = Math.round(wte * full * 10) / 10;
    setStaffHours(prev => ({ ...prev, [init]: { ...(prev[init]||{}), [qid]: hours } }));
    addAudit("ADM", "WTE Override", `${init} ${qid} → ${wte} WTE (${hours}h)`);
  };

  const SLOT_KEYS_ALL = ["E1","E2","E3","E4","M1","M2","M3","L1","L2","L3","L4","WE1","WE2","WE3","WL1","WL2","N1","N2","SN","AN","SL","RESEARCH","FELLOW","MILITARY"];

  return (
    <div>
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {[["fte","FTE Targets"],["hours","Staff WTE"],["targets","Shift Targets"],["shifttimes","Shift Times"],["training","Training Days"]].map(([k,lbl])=>(
          <button key={k} className={`btn${tab===k?" bp":" bs"}`} onClick={()=>setTab(k)}>{lbl}</button>
        ))}
      </div>

      {tab==="fte"&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>
            Set the <strong>full-time equivalent</strong> targets for each grade. Individual targets are scaled by each person's effective hours.
          </div>
          <div className="card">
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Grade</th><th>hrs/wk</th><th>Net hrs/qtr</th>
                    {SHIFT_FIELDS.map(f=><th key={f.key}>{f.label}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {GRADE_KEYS.map(grade=>{
                    const cfg = wteConfig[grade] || {};
                    return (
                      <tr key={grade}>
                        <td style={{fontWeight:700}}>{grade}</td>
                        <td><input type="number" className="fi" style={{width:65,padding:"3px 6px"}} value={cfg.hoursPerWeek||""} onChange={e=>setFTEHours(grade,e.target.value)} step="0.25" min="0"/></td>
                        <td><input type="number" className="fi" style={{width:75,padding:"3px 6px"}} value={cfg.hoursPerQuarter||""} onChange={e=>setFTE(grade,"hoursPerQuarter",e.target.value)} step="0.5" min="0"/></td>
                        {SHIFT_FIELDS.map(f=>(
                          <td key={f.key}><input type="number" className="fi" style={{width:55,padding:"3px 6px",textAlign:"center"}} value={cfg[f.key]??""} onChange={e=>setFTE(grade,f.key,e.target.value)} min="0" step="1"/></td>
                        ))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==="hours"&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>
            Set each person's WTE (whole-time equivalent) per quarter. <strong>1.0 = full-time</strong>, 0.5 = half-time, etc. Targets are scaled proportionally from the FTE config. Leave blank to use 1.0 (full-time).
          </div>
          <div className="card">
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Grade</th>
                    <th style={{color:"#64748b",fontSize:11}}>FT hrs/qtr</th>
                    {QUARTERS.map(q=><th key={q.id}>{q.id} WTE</th>)}
                    <th style={{color:"#6366f1"}}>Annual hrs</th>
                  </tr>
                </thead>
                <tbody>
                  {activeStaff.map(s=>{
                    const sh = staffHours[s.init] || {};
                    const cfg = wteConfig[effGrade(s)] || wteConfig["ST4+"] || {};
                    const fullQtr = cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek || 0) * 13 * 10) / 10;
                    const annual = QUARTERS.reduce((sum,q)=>{
                      const storedHrs = sh[q.id] != null ? sh[q.id] : fullQtr;
                      return sum + storedHrs;
                    }, 0);
                    return (
                      <tr key={s.id}>
                        <td style={{fontWeight:600}}>{s.name}{s.military&&<span className="badge b-admin" style={{marginLeft:4,fontSize:9,padding:"1px 4px"}}>MIL</span>}</td>
                        <td style={{color:"#64748b"}}>{s.grade}</td>
                        <td style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>{fullQtr}</td>
                        {QUARTERS.map(q=>{
                          const storedHrs = sh[q.id];
                          const displayWTE = storedHrs != null && fullQtr > 0 ? Math.round(storedHrs / fullQtr * 100) / 100 : "";
                          return (
                            <td key={q.id} style={{padding:"4px 6px"}}>
                              <input type="number" className="fi"
                                style={{width:68,padding:"4px 7px",textAlign:"center",
                                  color: storedHrs != null ? "#1e293b" : "#94a3b8"}}
                                value={displayWTE}
                                placeholder="1.0"
                                step="0.1" min="0" max="2"
                                onChange={e=>setStaffWTEVal(s.init,s.grade,q.id,e.target.value)}/>
                            </td>
                          );
                        })}
                        <td style={{textAlign:"center",fontWeight:700,color:"#6366f1",fontSize:12}}>
                          {Math.round(annual * 10) / 10}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==="targets"&&staffShiftOverrides!==undefined&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>
            Override the calculated shift targets for a specific person and quarter. The calculated value is shown in brackets. Leave a reason for the override.
          </div>
          <div className="card">
            <div style={{overflowX:"auto"}}>
              <table className="tbl">
                <thead>
                  <tr>
                    <th>Name</th><th>Grade</th>
                    {QUARTERS.map(q=><th key={q.id}>{q.id}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {activeStaff.map(s=>{
                    return (
                      <tr key={s.id}>
                        <td style={{fontWeight:600}}>{s.name}</td>
                        <td style={{color:"#64748b"}}>{s.grade}{s.military&&<span className="badge b-admin" style={{marginLeft:4,fontSize:9,padding:"1px 4px"}}>MIL</span>}</td>
                        {QUARTERS.map(q=>{
                          const ov = staffShiftOverrides?.[s.init]?.[q.id];
                          const hasOv = ov && SHIFT_FIELDS.some(f=>ov[f.key]!=null);
                          return (
                            <td key={q.id} style={{padding:"4px 8px"}}>
                              <button className={`btn bsm ${hasOv?"bp":"bs"}`} style={{fontSize:10}}
                                onClick={()=>setTargetModal({init:s.init,name:s.name,grade:s.grade,military:s.military,qid:q.id})}>
                                {hasOv?"Overridden":"Set"}
                              </button>
                              {ov?.reason&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ov.reason}>{ov.reason}</div>}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          {targetModal&&(()=>{
            const {init,name,grade,military,qid} = targetModal;
            const ov = staffShiftOverrides?.[init]?.[qid] || {};
            const cfg = wteConfig[effGrade({grade,military})] || wteConfig["ST4+"] || {};
            const sh = staffHours[init] || {};
            const fullQtr = cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek||0)*13*10)/10;
            const storedHrs = sh[qid] != null ? sh[qid] : fullQtr;
            const wte = fullQtr > 0 ? storedHrs / fullQtr : 1.0;
            const calcTarget = f => Math.round((cfg[f]||0)*wte*10)/10;
            const saveOv = (field, val) => {
              const num = val===""||val==null ? null : parseFloat(val);
              if (num!==null && isNaN(num)) return;
              setShiftOverrides(prev=>{
                const next={...prev,[init]:{...(prev[init]||{}),[qid]:{...(prev[init]?.[qid]||{}),[field]:num}}};
                return next;
              });
            };
            const saveReason = reason => {
              setShiftOverrides(prev=>({...prev,[init]:{...(prev[init]||{}),[qid]:{...(prev[init]?.[qid]||{}),reason}}}));
            };
            const clearAll = () => {
              setShiftOverrides(prev=>{const n={...prev};if(n[init]){const q2={...n[init]};delete q2[qid];n[init]=q2;}return n;});
              setTargetModal(null);
              addAudit("ADM","Shift Override Cleared",`${name} ${qid} overrides removed`);
            };
            return (
              <Modal title={`Shift Targets — ${name} ${qid}`} onClose={()=>setTargetModal(null)}
                footer={<>
                  <button className="btn bd bsm" onClick={clearAll}>Clear All Overrides</button>
                  <button className="btn bs" onClick={()=>setTargetModal(null)}>Close</button>
                  <button className="btn bp" onClick={()=>{addAudit("ADM","Shift Override",`${name} ${qid} targets updated`);setTargetModal(null);}}>Save</button>
                </>}>
                <div className="al al-i" style={{marginBottom:12,fontSize:12}}>
                  Override any shift count target for <strong>{name}</strong> in <strong>{qid}</strong>. Leave blank to use the calculated value (shown in grey).
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                  {SHIFT_FIELDS.map(f=>(
                    <div key={f.key} className="fg">
                      <label className="fl">{f.label} <span style={{color:"#94a3b8",fontWeight:400}}>(calc: {calcTarget(f.key)})</span></label>
                      <input type="number" className="fi" min="0" step="1"
                        value={ov[f.key]??""} placeholder={String(calcTarget(f.key))}
                        onChange={e=>saveOv(f.key,e.target.value)}/>
                    </div>
                  ))}
                </div>
                <div className="fg">
                  <label className="fl">Reason for override</label>
                  <input className="fi" value={ov.reason||""} onChange={e=>saveReason(e.target.value)} placeholder="e.g. Reduced duties, on secondment…"/>

              </Modal>
            );
          })()}
        </div>
      )}

      {tab==="shifttimes"&&shiftTimes&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>Default shift start/end times used for rest-rule calculations in the AI rota generator. <strong>All times in 24hr format.</strong></div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Default Slot Times</span></div>
            <div className="cb">
              <table className="tbl">
                <thead><tr><th>Slot</th><th>Start</th><th>End</th><th style={{color:"#94a3b8"}}>Duration</th></tr></thead>
                <tbody>{SLOT_KEYS_ALL.map(sk=>{
                  const t = shiftTimes[sk] || DEFAULT_SHIFT_TIMES[sk] || {start:"",end:""};
                  const dur = getShiftDuration(sk,null,shiftTimes,{});
                  return (
                    <tr key={sk}>
                      <td style={{fontWeight:700,color:"#475569"}}>{sk}</td>
                      <td><input className="fi" style={{width:80,padding:"3px 7px"}} value={t.start} onChange={e=>setShiftTimes(p=>({...p,[sk]:{...(p[sk]||{}),start:e.target.value,end:(p[sk]||{}).end||t.end}}))} placeholder="HH:MM"/></td>
                      <td><input className="fi" style={{width:80,padding:"3px 7px"}} value={t.end}   onChange={e=>setShiftTimes(p=>({...p,[sk]:{...(p[sk]||{}),end:e.target.value,start:(p[sk]||{}).start||t.start}}))} placeholder="HH:MM"/></td>
                      <td style={{color:"#94a3b8",fontSize:12}}>{dur>0?`${dur}h`:""}</td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>
          {staffShiftTimes&&setStaffShiftTimes&&(
            <div className="card">
              <div className="ch"><span className="ct">Per-Staff Time Overrides</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Override individual timings for a specific person</span></div>
              <div className="cb">
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end",marginBottom:16}}>
                  <div className="fg" style={{margin:0}}>
                    <label className="fl">Staff</label>
                    <select className="fi" style={{padding:"5px 8px",minWidth:160}} value={stStaff} onChange={e=>setStStaff(e.target.value)}>
                      <option value="">Select…</option>
                      {activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
                    </select>
                  </div>
                  <div className="fg" style={{margin:0}}>
                    <label className="fl">Slot</label>
                    <select className="fi" style={{padding:"5px 8px"}} value={stSlot} onChange={e=>setStSlot(e.target.value)}>
                      {SLOT_KEYS_ALL.map(sk=><option key={sk}>{sk}</option>)}
                    </select>
                  </div>
                </div>
                {stStaff&&(()=>{
                  const overrides = staffShiftTimes[stStaff]||{};
                  const existingKeys = Object.keys(overrides);
                  return (
                    <div>
                      {existingKeys.length===0&&<p style={{fontSize:12.5,color:"#94a3b8"}}>No overrides set for {staff.find(s=>s.init===stStaff)?.name||stStaff}.</p>}
                      {existingKeys.map(sk=>{

                            <span style={{width:50,fontWeight:700,fontSize:13}}>{sk}</span>
                            <input className="fi" style={{width:75,padding:"3px 7px"}} value={t.start} onChange={e=>setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[sk]:{...t,start:e.target.value}}}))} placeholder="HH:MM"/>
                            <span style={{color:"#94a3b8"}}>→</span>
                            <input className="fi" style={{width:75,padding:"3px 7px"}} value={t.end}   onChange={e=>setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[sk]:{...t,end:e.target.value}}}))} placeholder="HH:MM"/>
                            <button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>setStaffShiftTimes(p=>{const copy={...p};const sc={...(copy[stStaff]||{})};delete sc[sk];return{...copy,[stStaff]:sc};})}>✕</button>
                          </div>
                        );
                      })}
                      <button className="btn bs bsm" style={{marginTop:10}} onClick={()=>{
                        const defaults=shiftTimes[stSlot]||DEFAULT_SHIFT_TIMES[stSlot]||{start:"08:00",end:"16:30"};
                        setStaffShiftTimes(p=>({...p,[stStaff]:{...(p[stStaff]||{}),[stSlot]:{...defaults}}}));
                      }}>＋ Add {stSlot} override for {staff.find(s=>s.init===stStaff)?.name||stStaff}</button>
                    </div>

              </div>
            </div>
          )}
        </div>
      )}

      {tab==="training"&&trainingDays!==undefined&&(
        <div>
          <div className="al al-i" style={{marginBottom:14}}>Add SpR regional training days or ACP training days. These highlight the whole day on the rota calendar and availability calendar.</div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ch"><span className="ct">Add Training Day</span></div>
            <div className="cb">
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div className="fg" style={{margin:0}}><label className="fl">Date</label><input type="date" className="fi" style={{padding:"5px 8px"}} value={tdDate} onChange={e=>setTdDate(e.target.value)}/></div>
                <div className="fg" style={{margin:0}}><label className="fl">Type</label>
                  <select className="fi" style={{padding:"5px 8px"}} value={tdType} onChange={e=>setTdType(e.target.value)}>
                    <option value="SpR">SpR Regional Training</option>
                    <option value="ACP">ACP Training Day</option>

          <div className="card">

              {trainingDays.length===0&&<p style={{fontSize:12.5,color:"#94a3b8"}}>No training days added yet.</p>}

                    <td style={{fontSize:12,color:"#64748b"}}>{td.note||"—"}</td>
                    <td><button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>setTrainingDays(p=>p.filter(x=>x.id!==td.id))}>Remove</button></td>
