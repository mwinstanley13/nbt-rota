// Returns shift duration in hours (handles overnight crossings)
const getShiftDuration = (slotKey, init, shiftTimes, staffShiftTimes) => {
  const times = ((staffShiftTimes||{})[init]||{})[slotKey] || (shiftTimes||{})[slotKey] || DEFAULT_SHIFT_TIMES[slotKey];
  if (!times) return 0;
  const [sh,sm] = times.start.split(":").map(Number);
  const [eh,em] = times.end.split(":").map(Number);
  let hrs = (eh*60+em - (sh*60+sm)) / 60;
  if (hrs <= 0) hrs += 24;
  return hrs;
};

const fmtISO = d => { const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; };
const fmtDisp = s => new Date(s+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtShort = s => new Date(s+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const isWeekend = d => { const dow=new Date(d+"T00:00:00").getDay(); return dow===0||dow===6; };
const getDayName = d => new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short"});
const getSlotsForDay = d => SLOTS.filter(s => isWeekend(d) ? s.we : s.wd);

const getWeekDates = anchor => {
  const d=new Date(anchor+"T00:00:00"), day=d.getDay(), diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);
  return Array.from({length:7},(_,i)=>{ const x=new Date(d); x.setDate(x.getDate()+i); return fmtISO(x); });
};

const getMonthDays = (yr,mo) => {
  const days=[],first=new Date(yr,mo,1),last=new Date(yr,mo+1,0),sp=(first.getDay()+6)%7;
  for(let i=sp;i>0;i--) days.push({date:fmtISO(new Date(yr,mo,1-i)),inMonth:false});
  for(let d=1;d<=last.getDate();d++) days.push({date:fmtISO(new Date(yr,mo,d)),inMonth:true});
  const ep=7-(days.length%7); if(ep<7) for(let i=1;i<=ep;i++) days.push({date:fmtISO(new Date(yr,mo+1,i)),inMonth:false});
  return days;
};

const getDatesInRange = (start,end) => {
  const dates=[]; let cur=new Date(start+"T00:00:00"); const last=new Date(end+"T00:00:00");
  while(cur<=last){ dates.push(fmtISO(cur)); cur.setDate(cur.getDate()+1); }
  return dates;
};

// Generate realistic demo availability for Q1 — deterministic (seed = staff id)
function generateDemoAvailability(staffList, quarters) {
  const q1 = (quarters||QUARTERS).find(q=>q.id==="Q1") || (quarters||QUARTERS)[0];
  if (!q1) return {};
  const dates = getDatesInRange(q1.start, q1.end);
  const avail = {};

  // pattern 0 = night-pref; 1 = early-pref; 2 = late-pref; 3 = flexible
  staffList.filter(s=>s.role==="staff"&&s.active).forEach(s => {
    avail[s.init] = {};
    const seed = s.id;
    const pattern = seed % 4;

    // ~4 staff get a research/fellowship block (~3 weeks) → matches the high-unavail outliers in real data
    const hasResearchBlock = seed % 7 === 0;
    const blockStart = 14 + (seed % 12); // varies where in the quarter the block falls
    const blockEnd   = blockStart + 20;

    dates.forEach((date, idx) => {
      const dow = new Date(date).getDay(); // 0=Sun,6=Sat
      const isWE = dow===0||dow===6;
      const weekNum = Math.floor(idx/7);

      // Research/fellowship block: ~3 weeks UNAVAILABLE
      if (hasResearchBlock && idx >= blockStart && idx <= blockEnd) {
        avail[s.init][date]={base:"UNAVAILABLE",slots:[]}; return;
      }

      // SL: ~8 days per quarter on weekdays, staggered by seed
      if (!isWE && (idx + seed * 3) % 8 === 0) { avail[s.init][date]={base:"SL",slots:[]}; return; }

      // UNAVAILABLE: ~6 days per quarter on weekdays, staggered differently
      if (!isWE && (idx + seed * 7 + 5) % 11 === 0) { avail[s.init][date]={base:"UNAVAILABLE",slots:[]}; return; }

      // Work 1 in 3 weekends → off 2 in 3 weekends
      if (isWE && weekNum%3!==(seed%3)) { avail[s.init][date]={base:"UNAVAILABLE",slots:[]}; return; }

      // Night-pattern staff: mark Mon–Thu as NIGHT on their night weeks
      if (pattern===0 && dow>=1&&dow<=4 && weekNum%2===(seed%2)) {
        avail[s.init][date]={base:"NIGHT",slots:[]}; return;
      }
      // Friday nights & weekend nights for night-pattern staff
      if (pattern===0 && (dow===5) && weekNum%2===(seed%2)) {
        avail[s.init][date]={base:"NIGHT",slots:[]}; return;
      }

      // Early-preference staff: EARLY on ~1 in 3 weekdays
      if (pattern===1 && !isWE && (idx+seed)%3===0) {
        avail[s.init][date]={base:"EARLY",slots:[]}; return;
      }
      // Late-preference staff: LATE on ~1 in 3 weekdays
      if (pattern===2 && !isWE && (idx+seed)%3===1) {
        avail[s.init][date]={base:"LATE",slots:[]}; return;
      }
      // Mixed staff: occasional early or late preference
      if (pattern===3 && !isWE) {
        if ((idx+seed)%7===0) { avail[s.init][date]={base:"EARLY",slots:[]}; return; }
        if ((idx+seed)%7===3) { avail[s.init][date]={base:"LATE",slots:[]}; return; }
      }

      // All other days: explicitly ANY (fills calendar visually)
      avail[s.init][date]={base:"ANY",slots:[]};
    });
  });
  return avail;
}

const normaliseAvailEntry = (entry) => {
  if (!entry) return null;

  // backwards compatibility with old string format
  if (typeof entry === "string") {
    if (entry === "AVAIL") return { base: "ANY", slots: [] };
    if (entry === "UNAVAIL") return { base: "UNAVAILABLE", slots: [] };
    if (entry === "SL") return { base: "SL", slots: [] };
    return null;
  }

  // old AVAILABLE base (manual slot checkboxes) → treat as ANY for backward compat
  // old AL base → treat as SL for backward compat (AL removed)
  let base = entry.base === "AVAILABLE" ? "ANY" : (entry.base || null);
  if (base === "AL") base = "SL";
  return { base, slots: Array.isArray(entry.slots) ? entry.slots : [] };
};

const isMarkedAvailEntry = (entry) => {
  const e = normaliseAvailEntry(entry);
  return !!(e && e.base);
};

const getAvailEntry = (availability, init, date) =>
  normaliseAvailEntry((availability[init] || {})[date]) || { base: null, slots: [] };

const isBlockedDay = (availability, init, date) => {
  const e = getAvailEntry(availability, init, date);
  return e.base === "UNAVAILABLE" || e.base === "SL" || e.base === "MILITARY" || e.base === "PHEM";
};

// Maps an availability base + grade + date to the slot keys it covers
const getSlotKeysForAvailBase = (base, grade, date) => {
  const we = isWeekend(date);
  switch (base) {
    case "ANY": return getSlotsForDay(date).map(s => s.key);
    case "EARLY": return we ? ["WE1","WE2","WE3"] : ["E1","E2","E3","E4"];
    case "MID":   return we ? [] : ["M1","M2","M3"];
    case "LATE":  return we ? ["WL1","WL2"] : ["L1","L2","L3","L4"];
    case "NIGHT":
      if (grade === "tACP") return ["AN"];
      if (grade === "ACP")  return ["N2","AN"];
      if (grade === "ST3")  return ["SN"];
      return ["N1","N2"]; // ST4+ default
    default: return [];
  }
};

const isSlotPreferred = (availability, init, date, slotKey, grade) => {
  const e = getAvailEntry(availability, init, date);
  if (!e?.base) return false;
  const bases = e.base.split(",");
  const keys = bases.flatMap(b => getSlotKeysForAvailBase(b, grade, date));
  return keys.includes(slotKey);
};

const getAutoSLEntriesForDate = (availability, date, staff) => {
  return staff
    .filter(s => s.role === "staff" && s.active)
    .filter(s => getAvailEntry(availability, s.init, date).base === "SL")
    .map(s => ({
      id: `auto-sl-${s.init}-${date}`,
      init: s.init,
      type: "SL",
      note: "Auto from availability",
      auto: true,
    }));
};

const getMergedLeaveEntries = (date, leaveEntries, availability, staff) => {
  const manual = leaveEntries[date] || [];
  const manualSLInits = new Set(
    manual.filter(x => x.type === "SL").map(x => x.init)
  );
  const auto = getAutoSLEntriesForDate(availability, date, staff).filter(
    x => !manualSLInits.has(x.init)
  );
  return [...manual, ...auto];
};

const staffHasAnythingOnDate = (init, date, rota, leaveEntries, availability, staff) => {
  const daySlots = rota[date] || {};
  const onShift = Object.values(daySlots).includes(init);
  const leave = getMergedLeaveEntries(date, leaveEntries, availability, staff).some(x => x.init === init);
  return onShift || leave;
};

// Budget for one person in one quarter — uses staffHours override, then hoursPerQuarter, then hoursPerWeek × 13
const getStaffQuarterBudget = (init, grade, qid, wteConfig, staffHours) => {
  const override = staffHours[init] && staffHours[init][qid] != null ? staffHours[init][qid] : null;
  if (override !== null) return override;
  const cfg = wteConfig[grade] || wteConfig["ST4+"] || {};
  return cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek || 0) * 13 * 10) / 10;
};

// Sum shift hours for a person across given dates
const getShiftHoursUsed = (init, grade, dates, rota) => {
  let total = 0;
  dates.forEach(d => {
    const day = rota[d] || {};
    Object.entries(day).forEach(([sk, v]) => {
      if (v === init) total += getSlotHours(sk, grade);
    });
  });
  return Math.round(total * 10) / 10;
};

// Leave deduction: 8hrs per SL or Military leave day in the given dates
const getLeaveHoursDeducted = (init, leaveEntries, dates) => {
  let total = 0;
  dates.forEach(d => {
    const entries = leaveEntries[d] || [];
    if (entries.some(e => e.init === init && (e.type === "SL" || e.type === "MILITARY"))) total += 8;
  });
  return total;
};
// Backward-compat alias
const getSLHoursDeducted = getLeaveHoursDeducted;

// Sum of manual hours corrections for a person + quarter
const getCorrectionsTotal = (init, qid, hoursCorrections) =>
  (hoursCorrections || []).filter(c => c.init === init && c.qid === qid).reduce((a, c) => a + c.amount, 0);

// Total carry-forward corrections for a person/quarter (carryForward:true flag)
const getCarryForwardTotal = (init, qid, hoursCorrections) =>
  (hoursCorrections||[]).filter(c=>c.init===init&&c.qid===qid&&c.carryForward).reduce((s,c)=>s+c.amount,0);

// Hours remaining for a person in a quarter
const getHoursRemaining = (init, grade, qid, wteConfig, staffHours, rota, leaveEntries, hoursCorrections) => {
  const q = QUARTERS.find(x => x.id === qid);
  if (!q) return null;
  const dates = getDatesInRange(q.start, q.end);
  const budget = getStaffQuarterBudget(init, grade, qid, wteConfig, staffHours);
  const used = getShiftHoursUsed(init, grade, dates, rota);
  const slDeduct = getLeaveHoursDeducted(init, leaveEntries, dates);
  const corrections = getCorrectionsTotal(init, qid, hoursCorrections);
  return Math.round((budget - used - slDeduct + corrections) * 10) / 10;
};

.bld-tbl th{padding:5px 3px;font-size:9px;font-weight:700;text-align:center;border:1px solid #e2e8f0;white-space:nowrap;position:sticky;top:0;z-index:3}
.bld-tbl td{padding:2px;border:1px solid #e8edf2;text-align:center;background:white;vertical-align:middle}
.bld-date-col{text-align:left!important;padding:6px 10px!important;background:#fafafa!important;position:sticky;left:0;z-index:2;min-width:120px;white-space:nowrap}
.bld-date-col.we-row{background:#dcfce7!important}
.bld-tbl tr.we-row td{background:#f0fdf4}
.bld-date-col.bh-row{background:#fffbeb!important}
.bld-date-col.td-row{background:#f0fdf4!important}
.slot-cell{min-width:44px;height:30px;cursor:pointer;transition:background .1s}
.slot-cell:hover{opacity:.8}
.slot-cell.disabled{background:#f8fafc!important;cursor:default;opacity:.4}
.slot-chip{padding:2px 5px;border-radius:4px;font-size:9.5px;font-weight:800;display:inline-block;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.slot-empty{width:38px;height:22px;background:#f8fafc;border-radius:4px;display:inline-block;border:1px dashed #d1d5db;transition:all .1s}
.slot-empty:hover{border-color:#10b981;background:#f0fdf4}
.avail-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:3px;vertical-align:middle}
.grp-hdr{background:#f1f5f9!important;font-size:8px!important;letter-spacing:.8px!important;color:#64748b!important;font-weight:800!important;text-transform:uppercase}
.leave-row{padding:3px 6px;border-radius:4px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px}

/* ── Reports ── */
.rbar{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.rl{font-size:11.5px;color:#374151;width:155px;flex-shrink:0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt{flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.rf{height:100%;border-radius:3px;transition:width .4s}
.rv{font-size:11px;color:#64748b;width:28px;text-align:right;flex-shrink:0}
.arow{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.at{font-size:10px;color:#94a3b8;width:115px;flex-shrink:0}
.au{font-size:10.5px;font-weight:700;color:#6366f1;width:45px;flex-shrink:0}
.aa{font-size:12px;color:#374151;flex:1}

/* ── Mobile hamburger button (hidden on desktop) ── */
.mob-hbg{display:none;position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:22px;color:#475569;padding:4px;line-height:1;z-index:1}

/* ── Responsive layout ── */
@media(max-width:768px){
  .sb{position:fixed;top:0;left:0;height:100%;z-index:500;transform:translateX(-100%);transition:transform .25s;width:228px;overflow-y:auto}
  .sb.mob-open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.35)}
  .mob-hbg{display:block}
  .hdr{padding-left:52px}
  .body{padding:14px 12px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .dg2{grid-template-columns:1fr}
  .mbox{max-width:calc(100vw - 16px)}
  .stats-sb{display:none}
  .bld-wrap{-webkit-overflow-scrolling:touch}
  .tbl{font-size:11.5px}
  .tbl th,.tbl td{padding:7px 8px}
  .sb-col-btn{display:none}
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-tab-bar{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:0}
.ai-tab{padding:9px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:#94a3b8;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s}
.ai-tab.act{color:#0f172a;border-bottom-color:#10b981}
.draft-cell-new{background:#dcfce7;color:#166534;padding:1px 5px;border-radius:4px;font-weight:700;font-size:10.5px;display:inline-block}
.draft-cell-exist{background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:4px;font-weight:700;font-size:10.5px;display:inline-block}
.draft-cell-conflict{background:#fee2e2;color:#7f1d1d;padding:1px 5px;border-radius:4px;font-weight:700;font-size:10.5px;display:inline-block}
.sb-col-btn{position:absolute;bottom:60px;right:-12px;width:24px;height:24px;border-radius:50%;background:white;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.12);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:10;color:#475569;transition:transform .2s}
.sb-col-btn:hover{background:#f1f5f9}
.sb.sb-col{width:52px;overflow:hidden}
.sb.sb-col .sb-logo p,.sb.sb-col .sb-logo h1 span+*,.sb.sb-col .u-info,.sb.sb-col .u-name,.sb.sb-col .u-role,.sb.sb-col .sb-lbl,.sb.sb-col .nb{display:none}
.sb.sb-col .sb-logo{padding:16px 12px;text-align:center}
.sb.sb-col .sb-logo h1{justify-content:center;font-size:0}
.sb.sb-col .sb-logo h1 span{font-size:18px}
.sb.sb-col .nav-btn{padding:9px 0;justify-content:center;gap:0}
.sb.sb-col .nav-btn .ni{width:auto;font-size:15px}
.sb.sb-col .sb-sec{padding:8px 6px 4px}
.sb.sb-col .sb-user{padding:10px 0;justify-content:center;gap:0}
.sb.sb-col .u-out{position:static}
`;

const Modal = ({title,onClose,children,footer,lg}) => (
  <div className="mbk" onClick={onClose}>
    <div className={`mbox${lg?" mbox-lg":""}`} onClick={e=>e.stopPropagation()}>
      <div className="mh"><span className="mt">{title}</span><button className="mc" onClick={onClose}>×</button></div>
      <div className="mb">{children}</div>
      {footer&&<div className="mf">{footer}</div>}
    </div>
  </div>
);

function Login({staff,onLogin}) {
  const [u,setU]=useState(IS_DEMO?"ADM":""); const [p,setP]=useState(IS_DEMO?"demo2026":""); const [err,setErr]=useState("");
  const go=()=>{const uTrim=u.toLowerCase().trim(),pTrim=p.trim();const f=staff.find(s=>s.init.toLowerCase()===uTrim);const pw=f?.pw||(INIT_STAFF.find(s=>s.init.toLowerCase()===uTrim)?.pw);(f&&pw===pTrim)?onLogin(f):setErr("Invalid username or password.");};
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-hed">
          <img src="icons/icon-192.png?v=2" alt="RotaFlow" style={{width:68,height:68,borderRadius:16,display:"block",margin:"0 auto",boxShadow:"0 6px 24px rgba(13,27,42,.25)"}} />
          <h1>RotaFlow</h1>
          <p>Emergency Medicine · North Bristol Trust</p>
        </div>
        {IS_DEMO&&<div style={{background:"#fef9c3",border:"1px solid #fde68a",borderRadius:9,padding:"10px 14px",marginBottom:14,fontSize:12.5,color:"#92400e",textAlign:"center"}}>
          <strong>Demo Environment</strong><br/>Use <strong>ADM</strong> / <strong>demo2026</strong> — or any staff initials with <strong>rota2026</strong>
        </div>}
        {err&&<div className="login-err">⚠️ {err}</div>}
        <div className="fg"><label className="fl">Initials</label><input className="fi" placeholder="e.g. MC" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} autoFocus/></div>
        <div className="fg" style={{marginBottom:18}}><label className="fl">Password</label><input type="password" className="fi" placeholder="••••••••" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/></div>
        <button className="btn bp" style={{width:"100%",justifyContent:"center",padding:"12px",fontSize:15,borderRadius:10}} onClick={go}>{IS_DEMO?"Enter Demo →":"Sign In →"}</button>
      </div>
    </div>
  );
}

function Sidebar({user,view,setView,onLogout,pendingCount,hasOpenQ,isOpen,onClose,collapsed,onToggleCollapse}) {
  const isAdmin=user.role==="admin";
  const items=[
    {id:"dashboard",icon:"📊",label:"Dashboard"},
    {id:"calendar", icon:"📅",label:"Rota Calendar"},
    ...(!isAdmin?[{id:"myshifts",icon:"👤",label:"My Shifts"}]:[]),
    {id:"availability",icon:"📋",label:"Availability",badge:!isAdmin&&hasOpenQ?"!":null},
    {id:"requests",icon:"📝",label:isAdmin?"Requests":"My Requests",badge:isAdmin&&pendingCount>0?pendingCount:null},
    ...(isAdmin?[
      {id:"airota",      icon:"🤖",label:"AI Rota Builder"},
      {id:"builder",     icon:"🔧",label:"Rota Builder"},
      {id:"adjustments", icon:"⏱️",label:"Hour Adjustments"},
      {id:"staff",       icon:"👥",label:"Staff"},
      {id:"reports",     icon:"📈",label:"Reports"},
      {id:"fixeddays",   icon:"📆",label:"Fixed Days Off"},
      {id:"rotaconfig",  icon:"⚙️",label:"Rota Config"},
      {id:"yearsetup",   icon:"📅",label:"Year Setup"},
      {id:"audit",       icon:"🔍",label:"Audit Log"},
    ]:[{id:"reports",icon:"📈",label:"My Summary"}]),
  ];
  return (
    <div className={`sb${isOpen?" mob-open":""}${collapsed?" sb-col":""}`} style={{position:"relative",transition:"width .2s"}}>
      <button className="sb-col-btn" onClick={onToggleCollapse} title={collapsed?"Expand menu":"Collapse menu"}>
        {collapsed?"▶":"◀"}
      </button>
      <div className="sb-logo"><h1><span style={{width:30,height:30,borderRadius:8,overflow:"hidden",display:"inline-flex",flexShrink:0}}><img src="icons/rotaflow_icon_32.png?v=2" alt="RF" style={{width:30,height:30,display:"block"}} /></span>{!collapsed&&<span style={{marginLeft:8}}>RotaFlow</span>}</h1>{!collapsed&&<p>Rota Year 2026 / 2027</p>}</div>
      <div className="sb-sec">
        {!collapsed&&<div className="sb-lbl">Menu</div>}
        {items.map(n=>(
          <button key={n.id} className={`nav-btn${view===n.id?" act":""}`} onClick={()=>{setView(n.id);onClose&&onClose();}} title={collapsed?n.label:undefined}>
            <span className="ni">{n.icon}</span>{!collapsed&&n.label}
            {!collapsed&&n.badge&&<span className="nb">{n.badge}</span>}
          </button>
        ))}
      </div>
      <div className="sb-user">
        <div className="u-av">{user.init.slice(0,2)}</div>
        {!collapsed&&<div className="u-info"><div className="u-name">{user.name}</div><div className="u-role">{isAdmin?"Administrator":user.grade}</div></div>}
        <button className="u-out" onClick={onLogout} title="Sign out">⏻</button>
      </div>
    </div>
  );
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════════

function Dashboard({user,staff,rota,requests,dayNotes,availability,quarterStatus,quarters,demoMode,loadDemoData,resetToFresh,isAdmin:isAdminProp,swaps,setView}) {
  const qs = quarters || QUARTERS;
  const today=fmtISO(new Date()), isAdmin=isAdminProp||(user.role==="admin");
  const myPendingSwaps = (swaps||[]).filter(s=>s.toInit===user.init&&s.status==="pending_b");
  const todaySlots=rota[today]||{};
  const todayStaffInit=[...new Set(Object.values(todaySlots).filter(Boolean))];
  const pending=requests.filter(r=>r.status==="pending");
  const openQs=qs.filter(q=>quarterStatus[q.id]==="open");
  const myAvail=availability[user.init]||{};
  const myNextShift=useMemo(()=>{
    if(isAdmin) return null;
    return Object.keys(rota).sort().map(d=>({d,slots:Object.values(rota[d]).filter(Boolean)}))
      .find(x=>x.d>=today&&x.slots.includes(user.init));
  },[rota,user,today,isAdmin]);

  return (
    <div style={{maxWidth:920,margin:"0 auto"}}>
      {(dayNotes[today])&&<div className="al al-w" style={{marginBottom:16}}>📌 <strong>Today:</strong> {dayNotes[today]}</div>}
      {!isAdmin&&openQs.length>0&&<div className="al al-i" style={{marginBottom:16}}>📋 Availability open for <strong>{openQs.map(q=>q.id).join(", ")}</strong> — please submit yours.</div>}
      {!isAdmin&&myPendingSwaps.length>0&&<div className="al al-w" style={{marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>🔄 You have <strong>{myPendingSwaps.length}</strong> shift swap request{myPendingSwaps.length>1?"s":""} awaiting your response.</span>
        {setView&&<button className="btn bsm" style={{marginLeft:12,flexShrink:0}} onClick={()=>setView("requests")}>View</button>}
      </div>}
      <div className="sg" style={{marginBottom:18}}>
        <div className="sc" style={{"--ac":"#10b981"}}><div className="sv">{staff.filter(s=>s.role==="staff"&&s.active).length}</div><div className="sl">Active Staff</div></div>
        <div className="sc" style={{"--ac":"#6366f1"}}><div className="sv">{todayStaffInit.length}</div><div className="sl">On Shift Today</div></div>
        <div className="sc" style={{"--ac":"#f59e0b"}}><div className="sv">{pending.length}</div><div className="sl">Pending Requests</div></div>
        <div className="sc" style={{"--ac":"#3b82f6"}}><div className="sv">{openQs.length}</div><div className="sl">Open Availability Q</div></div>
      </div>
      <div className="dg2">
        <div className="card">
          <div className="ch"><span className="ct">Today's Shifts</span><span style={{fontSize:10.5,color:"#94a3b8"}}>{fmtDisp(today)}</span></div>
          <div className="cb" style={{maxHeight:280,overflowY:"auto"}}>
            {todayStaffInit.length===0?<p style={{color:"#94a3b8",fontSize:12}}>No shifts assigned today.</p>
              :todayStaffInit.map(init=>{
                const s=staff.find(x=>x.init===init);
                const mySlots=Object.entries(todaySlots).filter(([k,v])=>v===init).map(([k])=>SLOTS.find(sl=>sl.key===k)).filter(Boolean);
                return (
                  <div key={init} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{width:28,height:28,borderRadius:"50%",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#374151",flexShrink:0}}>{init.slice(0,2)}</div>
                    <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{s?.name||init}</div><div style={{fontSize:10,color:"#64748b"}}>{s?.grade}</div></div>
                    {mySlots.slice(0,2).map(sl=><span key={sl.key} className="chip" style={{background:sl.bg,color:sl.fg,borderColor:sl.bd,fontSize:10}}>{sl.label}</span>)}
                  </div>
                );
              })}
          </div>
        </div>
        <div className="card">
          <div className="ch"><span className="ct">{isAdmin?"Pending Requests":"My Overview"}</span></div>
          <div className="cb">
            {isAdmin?(
              pending.length===0?<div className="al al-s">✓ No pending requests</div>
              :pending.slice(0,5).map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{r.staffName}</div><div style={{fontSize:10,color:"#64748b"}}>{LEAVE_T[r.type]?.label} — {fmtDisp(r.startDate)}</div></div>
                  <span className="badge b-pending">Pending</span>
                </div>
              ))
            ):(
              <div>
                {myNextShift?<div style={{padding:13,background:"#f0fdf4",borderRadius:8,marginBottom:13}}>
                  <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>Next assigned shift</div>
                  <div style={{fontSize:18,fontWeight:800,fontFamily:"Syne,sans-serif"}}>{fmtDisp(myNextShift.d)}</div>
                </div>:<div className="al al-i">No upcoming shifts assigned yet.</div>}
                <div style={{fontSize:11.5,fontWeight:700,color:"#374151",marginBottom:7}}>My availability status</div>
                {Object.keys(myAvail).length===0?<p style={{fontSize:12,color:"#94a3b8"}}>No availability submitted yet.</p>
                  :<div style={{fontSize:12,color:"#64748b"}}>{Object.keys(myAvail).length} dates marked</div>}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Data Management — admin only */}
      {isAdmin&&(
        <div className="card" style={{marginTop:18,border:"1px solid #fecaca"}}>
          <div className="ch" style={{background:"#fff7ed"}}>
            <span className="ct" style={{color:"#9a3412"}}>🔧 Data Management</span>
            <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Admin only</span>
          </div>
          <div className="cb">
            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:220,padding:14,background:"#f0fdf4",borderRadius:8,border:"1px solid #86efac"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:"#14532d"}}>🧪 Load Demo Data</div>
                <div style={{fontSize:12,color:"#166534",marginBottom:10}}>Loads all default staff with realistic Q1 availability so you can test the AI rota builder straight away.{demoMode&&<span style={{marginLeft:6,fontWeight:700}}> (Active)</span>}</div>
                <button className="btn bp bsm" onClick={loadDemoData}>{demoMode?"Reload Demo":"Load Demo"}</button>
              </div>
              <div style={{flex:1,minWidth:220,padding:14,background:"#fff1f2",borderRadius:8,border:"1px solid #fca5a5"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:"#7f1d1d"}}>🗑 Fresh Start</div>
                <div style={{fontSize:12,color:"#991b1b",marginBottom:10}}>Removes <strong>all staff and all data</strong>. Keeps year structure and config (shift times, FTE targets, AI rules). Use when ready to go live.</div>
                <button className="btn bsm" style={{background:"#ef4444",color:"white",border:"none",cursor:"pointer",borderRadius:6,padding:"5px 12px",fontWeight:600}} onClick={resetToFresh}>Reset to Fresh Start</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CALENDAR VIEW (read-only, derived from rota slot data)
// ═══════════════════════════════════════════════════════════════

function CalendarView({rota,leaveEntries,dayNotes,staff,viewMonth,setViewMonth,viewMode,setViewMode,trainingDays}) {
  const [fStaff,setFS]=useState(""), [dayModal,setDM]=useState(null);
  const today=fmtISO(new Date()), yr=viewMonth.getFullYear(), mo=viewMonth.getMonth();
  const tdMap=useMemo(()=>Object.fromEntries((trainingDays||[]).map(t=>[t.date,t])),[trainingDays]);
  const days=useMemo(()=>getMonthDays(yr,mo),[yr,mo]);
  const DOW=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const activeStaff=staff.filter(s=>s.role==="staff"&&s.active);

  // Derive initials→slots for a date
  const getDateStaff=(d)=>{
    const result=[];
    const slots=rota[d]||{};
    Object.entries(slots).forEach(([sk,init])=>{if(init&&(!fStaff||init===fStaff)){const sl=SLOTS.find(s=>s.key===sk);if(sl)result.push({init,slot:sl});}});
    (leaveEntries[d]||[]).forEach(e=>{if(!fStaff||e.init===fStaff){const lt=LEAVE_T[e.type];if(lt)result.push({init:e.init,slot:{...lt,key:e.type,label:lt.label}});}});
    return result;
  };

  const nav=delta=>{const d=new Date(viewMonth);d.setMonth(d.getMonth()+delta);setViewMonth(d);};
  const label=viewMonth.toLocaleDateString("en-GB",{month:"long",year:"numeric"});

  return (
    <div>
      <div className="cal-top">
        <div className="cal-nav"><button onClick={()=>nav(-1)}>‹</button><div className="cal-mo">{label}</div><button onClick={()=>nav(1)}>›</button></div>
        <select className="fi" style={{width:150}} value={fStaff} onChange={e=>setFS(e.target.value)}>
          <option value="">All Staff</option>{activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
        </select>
      </div>
      <div className="card">
        <div className="cg">
          {DOW.map(d=><div key={d} className="cdow">{d}</div>)}
          {days.map(({date,inMonth})=>{
            const isBH=!!BH[date],isToday=date===today,we=isWeekend(date),items=getDateStaff(date),note=dayNotes[date],MAX=3;
            const td=tdMap[date];
            const tdBg=td?(td.type==="SpR"?"rgba(254,240,138,.55)":"rgba(243,232,255,.65)"):null;
            return (
              <div key={date} className={`cc${!inMonth?" om":""}${isToday?" td":""}${isBH?" bh":!inMonth?"":we?" we":""}`} onClick={()=>inMonth&&setDM(date)} style={tdBg?{background:tdBg}:undefined}>
                <div className={`cdate${!inMonth?" om":""}`}>
                  <span className={isToday?"td-num":""}>{new Date(date+"T00:00:00").getDate()}</span>
                  {isBH&&<span className="bh-tag">BH</span>}
                  {td&&<span style={{fontSize:7.5,fontWeight:700,padding:"0px 3px",borderRadius:2,background:td.type==="SpR"?"#fef08a":"#e9d5ff",color:td.type==="SpR"?"#713f12":"#6b21a8",marginLeft:2}}>{td.type}</span>}
                </div>
                {note&&<div style={{fontSize:8,color:"#92400e",background:"#fef9c3",padding:"1px 3px",borderRadius:3,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📌</div>}
                {items.slice(0,MAX).map((x,i)=><span key={i} className="chip-sm" style={{background:x.slot.bg,color:x.slot.fg,borderColor:x.slot.bd}}>{fStaff ? slotCalLabel(x.slot) : x.init}</span>)}
                {items.length>MAX&&<div className="more">+{items.length-MAX}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {dayModal&&(
        <Modal title={`${getDayName(dayModal)}, ${fmtDisp(dayModal)}${BH[dayModal]?" · "+BH[dayModal]:""}`} onClose={()=>setDM(null)} footer={<button className="btn bs" onClick={()=>setDM(null)}>Close</button>}>
          {dayNotes[dayModal]&&<div className="al al-w">📌 {dayNotes[dayModal]}</div>}
          {getDateStaff(dayModal).length===0?<p style={{color:"#94a3b8",fontSize:12}}>No shifts assigned.</p>
            :<table className="tbl"><thead><tr><th>Staff</th><th>Grade</th><th>Shift</th></tr></thead><tbody>
              {getDateStaff(dayModal).map((x,i)=>{const s=staff.find(st=>st.init===x.init);return(
                <tr key={i}><td style={{fontWeight:600}}>{s?.name||x.init}</td><td style={{color:"#64748b"}}>{s?.grade||""}</td>
                <td><span className="chip" style={{background:x.slot.bg,color:x.slot.fg,borderColor:x.slot.bd,fontSize:10.5}}>{x.slot.label}</span></td></tr>
              );})}
            </tbody></table>
          }
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// AVAILABILITY
// ═══════════════════════════════════════════════════════════════

function AvailabilityView({
  user,
  staff,
  setStaff,
  availability,
  setAvailability,
  quarterStatus,
  setQuarterStatus,
  addAudit,
  leaveEntries,
  setLeaveEntries,
  rota,
  requests,
  setRequests,
  applyCarryForward,
  quarters,
  fixedDaysOff,
  setFixedDaysOff
}) {
  const isAdmin = user.role === "admin";

  const [selQ, setSelQ] = useState("Q1");
  const [viewStaff, setViewStaff] = useState(null);
  const [pickModal, setPickModal] = useState(null); // { date }
  const [viewMonth, setVM] = useState(new Date(2026, 7, 1));
  const [modalDraft, setModalDraft] = useState({ base: "", slots: [] });

  const activeQs = quarters || QUARTERS;
  const q = activeQs.find(x => x.id === selQ);
  const myAvail = availability[user.init] || {};
  const qDates = q ? getDatesInRange(q.start, q.end) : [];
  const submittedCount = qDates.filter(d => isMarkedAvailEntry(myAvail[d])).length;
  const pct = qDates.length > 0 ? Math.round((submittedCount / qDates.length) * 100) : 0;

  const yr = viewMonth.getFullYear();
  const mo = viewMonth.getMonth();
  const calDays = useMemo(() => getMonthDays(yr, mo), [yr, mo]);
  const DOW = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

  const dispInit = isAdmin && viewStaff ? viewStaff : user.init;

  const getEntry = (init, date) => normaliseAvailEntry((availability[init] || {})[date]);

  const setEntry = (init, date, entry) => {
    setAvailability(prev => ({
      ...prev,
      [init]: {
        ...(prev[init] || {}),
        [date]: entry
      }
    }));
  };

  const clearEntry = (init, date) => {
    setAvailability(prev => {
      const next = { ...(prev[init] || {}) };
      delete next[date];
      return {
        ...prev,
        [init]: next
      };
    });
  };

  const removeAutoSLLeave = (init, date) => {
    setLeaveEntries(prev => {
      const day = prev[date] || [];
      const filtered = day.filter(
        e => !(e.init === init && (e.type === "SL" || e.type === "MILITARY") && e.autoFromAvailability)
      );
      const out = { ...prev };
      if (filtered.length === 0) delete out[date];
      else out[date] = filtered;
      return out;
    });
  };

  const addAutoSLLeave = (init, date) => {
    setLeaveEntries(prev => {
      const day = prev[date] || [];
      const alreadyThere = day.some(
        e => e.init === init && e.type === "SL" && e.autoFromAvailability
      );
      if (alreadyThere) return prev;

      return {
        ...prev,
        [date]: [
          ...day,
          {
            id: Date.now() + Math.random(),
            init,
            type: "SL",
            note: "Auto-added from availability",
            autoFromAvailability: true
          }
        ]
      };
    });
  };

  const dateHasBuiltRota = (date) => {
    const rotaDay = rota?.[date] || {};
    const hasAssignedSlots = Object.values(rotaDay).some(Boolean);
    const hasLeaveAlready = (leaveEntries?.[date] || []).length > 0;
    return hasAssignedSlots || hasLeaveAlready;
  };

  const saveModal = () => {
    if (!pickModal) return;

    const date = pickModal.date;
    const init = dispInit;
    const existing = getEntry(init, date);
    const wasLeaveBase = existing?.base === "SL" || existing?.base === "MILITARY";
    const willBeSL  = modalDraft.base === "SL";
    const willBeMil = modalDraft.base === "MILITARY";
    const willBeLeave = willBeSL || willBeMil;
    const leaveType = willBeSL ? "SL" : "MILITARY";
    const leaveLabel = willBeSL ? "Study Leave" : "Military";

    if (!modalDraft.base) return;

    // Remove old auto-leave if switching away from a leave base
    if (wasLeaveBase && !willBeLeave) {
      removeAutoSLLeave(init, date);
    }

    // Determine if the quarter is open for this date
    const dateQuarter = activeQs.find(q => date >= q.start && date <= q.end);
    const isQOpen = dateQuarter ? quarterStatus[dateQuarter.id] === "open" : false;

    if (willBeLeave && isQOpen) {
      // Quarter is open — auto-accept leave directly
      setEntry(init, date, { base: modalDraft.base, slots: [] });
      setLeaveEntries(prev => {
        const day = prev[date] || [];
        if (day.some(e => e.init === init && e.type === leaveType && e.autoFromAvailability)) return prev;
        return {
          ...prev,
          [date]: [...day, { id: Date.now() + Math.random(), init, type: leaveType, note: "Auto-added from availability", autoFromAvailability: true }]
        };
      });
      addAudit(user.init, "Availability", `${init} marked ${date}: ${leaveType} (auto-accepted, quarter open)`);
      setPickModal(null);
      return;
    }

    if (willBeLeave && !isQOpen) {
      // Quarter is closed — create a pending request for admin approval
      const alreadyPending = (requests || []).some(
        r => r.staffInitials === init && r.type === leaveType && r.startDate === date && r.status === "pending"
      );
      if (!alreadyPending) {
        setRequests(prev => [
          ...prev,
          {
            id: Date.now(),
            staffInitials: init,
            staffName: staff.find(s => s.init === init)?.name || init,
            type: leaveType,
            startDate: date,
            endDate: date,
            reason: "Submitted from Availability (quarter closed)",
            status: "pending",
            adminNote: "",
            createdAt: fmtISO(new Date())
          }
        ]);
        addAudit(user.init, `${leaveType} Request`, `${init} submitted ${leaveType} request for ${date}`);
      }
      alert(`Availability is closed. ${leaveLabel} has been submitted for admin approval.`);
      setPickModal(null);
      return;
    }

    setEntry(init, date, { base: modalDraft.base, slots: [] });
    addAudit(user.init, "Availability", `${init} marked ${date}: ${modalDraft.base}`);
    setPickModal(null);
  };

  const clearStatus = (date) => {
    const init = dispInit;
    const existing = getEntry(init, date);

    if (existing?.base === "SL" || existing?.base === "MILITARY") {
      removeAutoSLLeave(init, date);
    }

    clearEntry(init, date);
    addAudit(user.init, "Availability", `${init} cleared ${date}`);
    setPickModal(null);
  };

  const toggleQStatus = (qid, status) => {
    setQuarterStatus(prev => ({ ...prev, [qid]: status }));
    addAudit(user.init, "Quarter Status", `${qid} set to ${status}`);
    if (status === "locked" && applyCarryForward) {
      const qs = quarters || QUARTERS;
      const nextQ = qs[qs.findIndex(q=>q.id===qid)+1];
      if (nextQ && confirm(`Apply carry-forward of unworked/overworked hours from ${qid} to ${nextQ.id}?`)) {
        applyCarryForward(qid);
      }
    }
  };

  const openDateModal = (date) => {
    const current = getEntry(dispInit, date);
    setModalDraft(
      current
        ? { base: current.base || "", slots: current.slots || [] }
        : { base: "", slots: [] }
    );
    setPickModal({ date });
  };

  const getAggregate = (date) => {
    const counts = {};
    staff
      .filter(s => s.role === "staff" && s.active)
      .forEach(s => {
        const entry = getEntry(s.init, date);
        if (entry?.base) entry.base.split(",").forEach(b => { counts[b] = (counts[b] || 0) + 1; });
      });
    return counts;
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
        {activeQs.map(qv => {
          const st = quarterStatus[qv.id] || "closed";
          return (
            <button
              key={qv.id}
              onClick={() => setSelQ(qv.id)}
              className={`btn${selQ === qv.id ? " bp" : " bs"}`}
            >
              {qv.id} <span className={`badge b-${st}`} style={{ marginLeft: 5 }}>{st}</span>
            </button>
          );
        })}
      </div>

      {isAdmin ? (
        <div>
          <div className="card" style={{ marginBottom: 16 }}>
            <div className="ch">
              <span className="ct">Quarter Management — {q?.label}</span>
            </div>
            <div className="cb">
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12.5, color: "#374151", fontWeight: 600 }}>Status:</span>
                <span className={`badge b-${quarterStatus[selQ] || "closed"}`} style={{ fontSize: 11 }}>
                  {quarterStatus[selQ] || "closed"}
                </span>
                <div style={{ marginLeft: 8, display: "flex", gap: 7 }}>
                  <button className="btn bp bsm" onClick={() => toggleQStatus(selQ, "open")} disabled={quarterStatus[selQ] === "open"}>Open for Staff</button>
                  <button className="btn bw bsm" onClick={() => toggleQStatus(selQ, "closed")} disabled={quarterStatus[selQ] === "closed"}>Close</button>
                  <button className="btn bd bsm" onClick={() => toggleQStatus(selQ, "locked")} disabled={quarterStatus[selQ] === "locked"}>Lock</button>
                </div>
              </div>
              {quarterStatus[selQ] === "open" && (
                <div className="al al-s" style={{ marginTop: 12, marginBottom: 0 }}>
                  ✓ Staff can currently view and submit availability for {selQ}.
                </div>
              )}
            </div>
          </div>

          <div className="card" style={{ marginBottom: 16 }}>
            <div className="ch">
              <span className="ct">Submission Progress — {q?.label}</span>
            </div>
            <div className="cb">
              {staff.filter(s => s.role === "staff" && s.active).map(s => {
                const av = availability[s.init] || {};
                const cnt = qDates.filter(d => isMarkedAvailEntry(av[d])).length;
                const p = qDates.length > 0 ? Math.round((cnt / qDates.length) * 100) : 0;
                return (
                  <div
                    key={s.id}
                    style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, cursor: "pointer" }}
                    onClick={() => setViewStaff(viewStaff === s.init ? null : s.init)}
                  >
                    <div style={{ fontSize: 12, fontWeight: 600, width: 170, flexShrink: 0, color: viewStaff === s.init ? "#10b981" : "#374151" }}>
                      {s.name}
                    </div>
                    <div className="prog-bar"><div className="prog-fill" style={{ width: `${p}%` }} /></div>
                    <div style={{ fontSize: 11, color: "#64748b", width: 40, textAlign: "right", flexShrink: 0 }}>
                      {cnt}/{qDates.length}
                    </div>
                    {viewStaff === s.init && <span style={{ fontSize: 10, color: "#10b981", fontWeight: 700 }}>viewing ↓</span>}
                  </div>
                );
              })}
            </div>
          </div>

          {viewStaff && (
            <div className="al al-i" style={{ marginBottom: 12 }}>
              Viewing availability for <strong>{staff.find(s => s.init === viewStaff)?.name}</strong>. Click a date to edit on their behalf.
            </div>
          )}
        </div>
      ) : (
        quarterStatus[selQ] === "open" ? (
          <div>
            <div className="card" style={{ marginBottom: 16 }}>
              <div className="ch">
                <span className="ct">{q?.label}</span>
                <span style={{ fontSize: 11, color: "#64748b" }}>{fmtDisp(q?.start)} → {fmtDisp(q?.end)}</span>
              </div>
              <div className="cb">
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 12, color: "#374151", marginBottom: 5 }}>
                    Your progress: <strong>{submittedCount}/{qDates.length} days</strong> marked ({pct}%)
                  </div>
                  <div className="prog-bar" style={{ height: 8 }}>
                    <div className="prog-fill" style={{ width: `${pct}%` }} />
                  </div>
                </div>

                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                  <span className="chip" style={{ background: "#dcfce7", color: "#166534", borderColor: "#166534", borderWidth: 1, fontSize: 10.5 }}>Any</span>
                  <span className="chip" style={{ background: "#d1fae5", color: "#065f46", borderColor: "#065f46", borderWidth: 1, fontSize: 10.5 }}>✓ Specific shifts</span>
                  <span className="chip" style={{ background: "#fee2e2", color: "#7f1d1d", borderColor: "#7f1d1d", borderWidth: 1, fontSize: 10.5 }}>✗ Unavailable</span>
                  <span className="chip" style={{ background: "#f1f5f9", color: "#334155", borderColor: "#334155", borderWidth: 1, fontSize: 10.5 }}>SL Study Leave</span>
                  <span className="chip" style={{ background: "#f8fafc", color: "#94a3b8", borderColor: "#e2e8f0", fontSize: 10.5 }}>⬚ Not marked</span>
                </div>

                <div style={{ fontSize: 11.5, color: "#64748b" }}>
                  Choose <strong>Any</strong>, <strong>Unavailable</strong>, <strong>SL</strong>, or pick <strong>one or more specific shifts</strong>.
                </div>
              </div>
            </div>

            {/* Night block preference — only relevant for staff who do nights */}
            {(() => {
              const me = staff.find(s => s.init === user.init);
              if (!me || !["ST4+","ST3","ACP","tACP"].includes(me.grade)) return null;
              const pref = me.nightBlockPref || "any";
              const opts = [
                { val:"any",  label:"No preference",      desc:"System decides based on staffing needs" },
                { val:"4",    label:"4 nights (Mon–Thu)",  desc:"Prefer to do all 4 weekday nights in one block" },
                { val:"2+2",  label:"Split 2+2",           desc:"Prefer to split into Mon–Tue and Wed–Thu" },
              ];
              const save = (val) => {
                if (setStaff) setStaff(prev => prev.map(s => s.init === user.init ? {...s, nightBlockPref: val} : s));
                addAudit(user.init, "Night Pref", `Set night block preference: ${val}`);
              };
              return (
                <div className="card" style={{ marginBottom: 16 }}>
                  <div className="ch"><span className="ct">🌙 Night Block Preference</span></div>
                  <div className="cb">
                    <div style={{ fontSize: 12, color: "#64748b", marginBottom: 10 }}>
                      When generating the rota, your night shifts will be scheduled as weekday blocks (Mon–Thu) or weekend blocks (Fri–Sun). Choose how you prefer weekday nights to be assigned.
                    </div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {opts.map(o => (
                        <button key={o.val} onClick={() => save(o.val)}
                          style={{ padding:"8px 14px", borderRadius:8, border:`2px solid ${pref===o.val?"#10b981":"#e2e8f0"}`,
                            background: pref===o.val ? "#ecfdf5" : "#f8fafc",
                            color: pref===o.val ? "#065f46" : "#374151",
                            cursor:"pointer", textAlign:"left", minWidth:160 }}>
                          <div style={{ fontWeight: pref===o.val ? 700 : 500, fontSize:13 }}>{pref===o.val ? "✓ " : ""}{o.label}</div>
                          <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{o.desc}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        ) : (
          <div className="al al-w">
            ⏳ Availability for <strong>{q?.label}</strong> is not yet open. Your admin will open it when ready.
          </div>
        )
      )}

      {(isAdmin || quarterStatus[selQ] === "open") && (
        <>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
            <div className="cal-nav">
              <button onClick={() => { const d = new Date(viewMonth); d.setMonth(d.getMonth() - 1); setVM(d); }}>‹</button>
              <div className="cal-mo">{viewMonth.toLocaleDateString("en-GB", { month: "long", year: "numeric" })}</div>
              <button onClick={() => { const d = new Date(viewMonth); d.setMonth(d.getMonth() + 1); setVM(d); }}>›</button>
            </div>
            <span style={{ fontSize: 11.5, color: "#94a3b8" }}>Click a date to mark availability</span>
          </div>

          <div className="card">
            <div className="av-cal">
              {DOW.map(d => <div key={d} className="av-dow">{d}</div>)}
              {calDays.map(({ date, inMonth }) => {
                const isBH = !!BH[date];
                const inQ = q && date >= q.start && date <= q.end;
                const today_ = date === fmtISO(new Date());
                const entry = getEntry(dispInit, date);
                const clickable = inMonth && inQ;
                const agg = isAdmin && !viewStaff ? getAggregate(date) : null;

                const entryBases = entry?.base ? entry.base.split(",") : [];
                const bg = entryBases.length === 1 ? (AVAIL[entryBases[0]]?.bg || "#f1f5f9") : entryBases.length > 1 ? "#e0e7ff" : "";

                return (
                  <div
                    key={date}
                    className={`av-cell${!inMonth ? " om" : ""}${!inQ && inMonth ? " out-range" : ""}${isBH ? " bh" : ""}`}
                    style={{ background: bg, cursor: clickable ? "pointer" : "default" }}
                    onClick={() => clickable && openDateModal(date)}
                  >
                    <div className={`av-date${!inMonth ? " om" : ""}`}>
                      <span style={today_ ? { background: "#10b981", color: "white", borderRadius: "50%", width: 18, height: 18, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 9.5 } : {}}>
                        {new Date(date + "T00:00:00").getDate()}
                      </span>
                      {isBH && <span style={{ fontSize: 7.5, background: "#fde047", color: "#713f12", padding: "0 2px", borderRadius: 2, marginLeft: 2 }}>BH</span>}
                    </div>

                    {clickable && (
                      entry ? (
                        <div>
                          {entryBases.length === 1 ? (() => {
                            const av = AVAIL[entryBases[0]] || { bg:"#f1f5f9", fg:"#334155", short: entryBases[0] };
                            return (
                              <div className="av-status" style={{ background: av.bg, color: av.fg }}>
                                {av.short}
                              </div>
                            );
                          })() : (
                            <div style={{ display:"flex", flexWrap:"wrap", gap:1, justifyContent:"center" }}>
                              {entryBases.map(b => {
                                const av = AVAIL[b] || { bg:"#f1f5f9", fg:"#334155", icon:b[0] };
                                return <span key={b} style={{ fontSize:7, background:av.bg, color:av.fg, borderRadius:2, padding:"0 2px", fontWeight:700 }}>{av.icon || av.short}</span>;
                              })}
                            </div>
                          )}
                        </div>
                      ) : isAdmin && agg && Object.keys(agg).length > 0 ? (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 2 }}>
                          {Object.entries(agg).map(([k, c]) => {
                            const av = AVAIL[k] || { bg:"#f1f5f9", fg:"#334155", icon:k.slice(0,1) };
                            return (
                              <span key={k} style={{ fontSize: 8, background: av.bg, color: av.fg, padding: "1px 3px", borderRadius: 3, fontWeight: 700 }}>
                                {av.icon}{c}
                              </span>
                            );
                          })}
                        </div>
                      ) : (
                        <div className="av-none">{isAdmin ? "—" : "+ mark"}</div>
                      )
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}

      {pickModal&&(()=>{
          const we = isWeekend(pickModal.date);
          const dispGrade = staff.find(s => s.init === dispInit)?.grade || "ST4+";
          const nightLabel =
            dispGrade === "tACP" ? "ACP Night only" :
            dispGrade === "ACP"  ? "SDM N2 + ACP Night" :
            dispGrade === "ST3"  ? "ST3 Night" :
            "SDM Night 1 & 2";

          const availOpts = [
            { key:"ANY",         label:"Any",         bg:AVAIL.ANY.bg,         fg:AVAIL.ANY.fg },
            { key:"UNAVAILABLE", label:"Unavailable", bg:AVAIL.UNAVAILABLE.bg, fg:AVAIL.UNAVAILABLE.fg },
            { key:"SL",          label:"Study Leave", bg:AVAIL.SL.bg,          fg:AVAIL.SL.fg },
            { key:"MILITARY",    label:"Military",    bg:AVAIL.MILITARY.bg,    fg:AVAIL.MILITARY.fg },
            { key:"PHEM",        label:"PHEM",        bg:AVAIL.PHEM.bg,        fg:AVAIL.PHEM.fg },
            { key:"EARLY",       label:"Early",       bg:AVAIL.EARLY.bg,       fg:AVAIL.EARLY.fg },
            ...(!we ? [{ key:"MID", label:"Mid",      bg:AVAIL.MID.bg,         fg:AVAIL.MID.fg }] : []),
            { key:"LATE",        label:"Late",        bg:AVAIL.LATE.bg,        fg:AVAIL.LATE.fg },
            { key:"NIGHT",       label:"Night",       bg:AVAIL.NIGHT.bg,       fg:AVAIL.NIGHT.fg },
          ];

          return (
            <Modal
              title={`${getDayName(pickModal.date)}, ${fmtDisp(pickModal.date)}`}
              onClose={() => setPickModal(null)}
              footer={
                <>
                  <button className="btn bs" onClick={() => clearStatus(pickModal.date)}>Clear</button>
                  <button className="btn bs" onClick={() => setPickModal(null)}>Cancel</button>
                  <button className="btn bp" onClick={saveModal} disabled={!modalDraft.base}>Save</button>
                </>
              }
            >
              <p style={{ fontSize: 12.5, color: "#64748b", marginBottom: 14 }}>
                {isAdmin && viewStaff
                  ? `Marking for: ${staff.find(s => s.init === viewStaff)?.name}`
                  : "Set your availability for this day:"}
              </p>

              {BH[pickModal.date] && (
                <div className="al al-w" style={{ marginBottom: 12 }}>🎉 {BH[pickModal.date]}</div>
              )}

              {(() => {
                const dateQuarter = activeQs.find(q => pickModal.date >= q.start && pickModal.date <= q.end);
                const isQOpen = dateQuarter ? quarterStatus[dateQuarter.id] === "open" : false;
                return !isQOpen && (
                  <div className="al al-i" style={{ marginBottom: 12 }}>
                    Availability is closed for this quarter. Study Leave or Military submitted here will require admin approval.
                  </div>
                );
              })()}

              {(() => {
                const SINGLE = ["ANY","UNAVAILABLE","SL","MILITARY","PHEM"];
                const SHIFT = ["EARLY","MID","LATE","NIGHT"];
                const draftBases = modalDraft.base ? modalDraft.base.split(",") : [];
                const handleClick = (key) => {
                  if (SINGLE.includes(key)) {
                    setModalDraft({ base: key, slots: [] });
                  } else {
                    // Toggle shift option; clear any single-select base first
                    const prev = draftBases.filter(b => SHIFT.includes(b));
                    const next = prev.includes(key) ? prev.filter(b => b !== key) : [...prev, key];
                    setModalDraft({ base: next.join(","), slots: [] });
                  }
                };
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {availOpts.map(opt => {
                      const cur = draftBases.includes(opt.key);
                      return (
                        <button
                          key={opt.key}
                          onClick={() => handleClick(opt.key)}
                          style={{
                            padding: "11px 8px",
                            border: `2px solid ${cur ? opt.fg : opt.fg + "40"}`,
                            borderRadius: 9,
                            background: cur ? opt.bg : "white",
                            color: opt.fg,
                            fontWeight: 700,
                            fontSize: 12,
                            cursor: "pointer",
                            textAlign: "left",

                          }}

                          {opt.label}
                        </button>
                      );
                    })}
                  </div>
                );
              })()}
            </Modal>
          );
        })()}

    {/* ── Fixed Days Off ── */}
    {!isAdmin && fixedDaysOff && setFixedDaysOff && (() => {
      const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
      const REASONS   = ["Research","Fellow Day"];
      const myFixed   = fixedDaysOff.filter(f=>f.init===user.init);
      const [fdDay, setFdDay] = React.useState("Monday");
      const [fdReason, setFdReason] = React.useState("Research");
      const addFixed = () => {
        if (myFixed.some(f=>f.dayOfWeek===fdDay&&f.reason===fdReason)) return;
        setFixedDaysOff(prev=>[...prev,{id:Date.now(),init:user.init,name:user.name,dayOfWeek:fdDay,reason:fdReason,addedDate:fmtISO(new Date())}]);
        addAudit(user.init,"Fixed Day Off",`${user.init} added fixed ${fdReason} day: ${fdDay}`);
      };
      return (
        <div className="card" style={{marginTop:18}}>
          <div className="ch"><span className="ct">Fixed Days Off</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>Regular non-working days (Research / Fellow Day)</span></div>
          <div className="cb">
            {myFixed.length===0&&<p style={{fontSize:12.5,color:"#94a3b8",margin:"8px 0"}}>No fixed days off set.</p>}

              <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                <span style={{flex:1,fontSize:13,fontWeight:600}}>{f.dayOfWeek}</span>
                <span style={{padding:"2px 8px",borderRadius:4,background:"#eff6ff",color:"#1d4ed8",fontSize:11,fontWeight:600}}>{f.reason}</span>
                <button className="btn bs bsm" style={{color:"#ef4444",borderColor:"#ef4444"}} onClick={()=>{setFixedDaysOff(prev=>prev.filter(x=>x.id!==f.id));addAudit(user.init,"Fixed Day Off",`${user.init} removed fixed ${f.reason}: ${f.dayOfWeek}`);}}>Remove</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div className="fg" style={{margin:0}}>
                <label className="fl">Day</label>
                <select className="fi" style={{padding:"5px 8px"}} value={fdDay} onChange={e=>setFdDay(e.target.value)}>
                  {DAY_NAMES.map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
              <div className="fg" style={{margin:0}}>
                <label className="fl">Reason</label>
                <select className="fi" style={{padding:"5px 8px"}} value={fdReason} onChange={e=>setFdReason(e.target.value)}>
                  {REASONS.map(r=><option key={r}>{r}</option>)}

              </div>
              <button className="btn bp" style={{height:34,alignSelf:"flex-end"}} onClick={addFixed}>＋ Add</button>
            </div>
          </div>
        </div>
      );
    })()}

    </div>
  );
}

            return (
              <div key={q.id} style={{background:"#f8fafc",borderRadius:7,padding:"8px 10px",textAlign:"center",border:`1px solid ${col}30`}}>
                <div style={{fontSize:9,color:"#64748b",fontWeight:700}}>{q.id}</div>
                <div style={{fontSize:14,fontWeight:800,color:col}}>{rem!=null?rem:"—"}</div>
                <div style={{fontSize:8,color:"#94a3b8"}}>hrs left</div>

        <div style={{fontSize:11.5,fontWeight:700,color:"#374151",marginBottom:8}}>Add correction</div>

const NIGHT_SLOTS  = new Set(["N1","N2","SN","AN"]);
const WE_SLOTS     = new Set(["WE1","WE2","WE3","WL1","WL2"]);
const EARLY_SLOTS  = new Set(["E1","E2","E3","E4"]);
const MID_SLOTS    = new Set(["M1","M2","M3"]);
const LATE_SLOTS   = new Set(["L1","L2","L3","L4"]);

function countShifts(init, dates, rota) {
  let nights=0, weekends=0, earlies=0, mids=0, lates=0;
  dates.forEach(d => {
    const day = rota[d] || {};
    Object.entries(day).forEach(([sk, v]) => {
      if (v !== init) return;
      if (NIGHT_SLOTS.has(sk))  nights++;
      if (WE_SLOTS.has(sk))     weekends++;
      if (EARLY_SLOTS.has(sk))  earlies++;
      if (MID_SLOTS.has(sk))    mids++;
      if (LATE_SLOTS.has(sk))   lates++;
    });
  });
  return {nights, weekends, earlies, mids, lates};
}

// Effective WTE = actual quarterly hours / grade full-time quarterly hours
function getEffectiveWTE(init, grade, qid, wteConfig, staffHours) {
  const actual = getStaffQuarterBudget(init, grade, qid, wteConfig, staffHours);
  const cfg = wteConfig[grade] || wteConfig["ST4+"] || {};
  const full = cfg.hoursPerQuarter ?? Math.round((cfg.hoursPerWeek || 0) * 13 * 10) / 10;
  return full > 0 ? Math.round(actual / full * 100) / 100 : 1.0;
}

function getTarget(wteConfig, grade, field, wte) {
  const cfg = wteConfig[grade] || wteConfig["ST4+"] || {};
  return Math.round((cfg[field] || 0) * wte * 10) / 10;
}

function StatCell({done, target}) {
  const color = target === 0 ? "#94a3b8" : done > target ? "#ef4444" : done >= target - 1 ? "#f59e0b" : "#94a3b8";
  return (
    <td style={{padding:"3px 5px",textAlign:"center",fontSize:10,fontWeight:600,color,whiteSpace:"nowrap"}}>
      {done}<span style={{color:"#cbd5e1",fontWeight:400}}>/{target}</span>
    </td>
  );
}

// ROTA BUILDER — slot-based, rows=dates
// ═══════════════════════════════════════════════════════════════

function RotaBuilder({rota,setRota,leaveEntries,setLeaveEntries,staff,dayNotes,setDayNotes,availability,addAudit,currentUser,wteConfig,staffHours,hoursCorrections,setHoursCorrections}) {
  const [selQ,setSelQ]=useState("Q1");
  const [assignModal,setAM]=useState(null); // {date, slotKey}
  const [leaveModal,setLM]=useState(null);  // {date}
  const [noteModal,setNM]=useState(null);
  const [noteText,setNT]=useState("");
  const [leaveForm,setLF]=useState({init:"",type:"SL",note:""});
  const today=fmtISO(new Date());

  const q=QUARTERS.find(x=>x.id===selQ)||QUARTERS[0];
  const quarterDates=useMemo(()=>getDatesInRange(q.start,q.end),[q.start,q.end]);
  const activeStaff=staff.filter(s=>s.role==="staff"&&s.active);

  const assignSlot=(date,slotKey,init)=>{
    setRota(p=>({...p,[date]:{...(p[date]||{}),[slotKey]:init||null}}));
    addAudit(currentUser.init,"Slot Assigned",`${slotKey} on ${date} → ${init||"cleared"}`);
    setAM(null);
  };

  const addLeave=()=>{
    if(!leaveForm.init||!leaveForm.type) return;
    setLeaveEntries(p=>({...p,[leaveModal.date]:[...(p[leaveModal.date]||[]),{...leaveForm,id:Date.now()}]}));
    addAudit(currentUser.init,"Leave Added",`${leaveForm.init} ${LEAVE_T[leaveForm.type]?.label} on ${leaveModal.date}`);
    setLM(null); setLF({init:"",type:"SL",note:""});
  };
  const removeLeave=(date,id)=>{
    setLeaveEntries(p=>({...p,[date]:(p[date]||[]).filter(x=>x.id!==id)}));
  };

  const saveNote=()=>{
    noteText.trim()?setDayNotes(p=>({...p,[noteModal]:noteText.trim()})):setDayNotes(p=>{const n={...p};delete n[noteModal];return n;});
    setNM(null);
  };

  // For a given date+slot, get assigned staff
  const getAssigned=(date,slotKey)=>(rota[date]||{})[slotKey];

  // Get availability status of a staff member on a date
  const getAvail = (init, date) => getAvailEntry(availability, init, date);

  // Warn: assigned staff is unavailable
  const hasConflict = (init, date) => getAvail(init, date)?.base === "UNAVAILABLE";

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6}}>
          {QUARTERS.map(qv=>(
            <button key={qv.id} onClick={()=>setSelQ(qv.id)}
              className={`btn${selQ===qv.id?" bp":" bs"}`} style={{fontSize:12,padding:"5px 12px"}}>
              {qv.id}: {qv.label.split(" ")[0]}–{qv.label.split(" ")[2]?.slice(0,3)}
            </button>
          ))}
        </div>
        <div className="al al-i" style={{margin:0,padding:"6px 11px",fontSize:11.5}}>
          💡 Click a slot cell to assign · Click a date to add a note · <strong>Red border</strong> = conflict · 🟢 = available
        </div>
      </div>

      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
      <div className="bld-wrap" style={{flex:1,minWidth:0,overflowY:"auto",maxHeight:"calc(100vh - 180px)"}}>
        <table className="bld-tbl">
          <thead>
            <tr>
              <th className="bld-date-col" style={{background:"#f8fafc",position:"sticky",left:0,zIndex:5}}>Date</th>
              {/* Group headers */}
              {SLOTS.map(sl=>(
                <th key={sl.key} style={{background:sl.bg,color:sl.fg,borderColor:sl.bd,padding:"4px 3px",minWidth:44}}>
                  <div style={{fontSize:8.5,fontWeight:800}}>{sl.key}</div>
                  {sl.hdr&&<div style={{fontSize:7,opacity:.8,marginTop:1}}>{sl.hdr}</div>}
                </th>
              ))}
              <th style={{background:"#fef9c3",color:"#713f12",fontSize:9,fontWeight:700,minWidth:120,padding:"4px 6px"}}>Leave / Away</th>
            </tr>
          </thead>
          <tbody>
            {quarterDates.map(date=>{
              const we=isWeekend(date),isBH=!!BH[date],isToday=date===today;
              const dateSlots=getSlotsForDay(date);
              const dayLeave=leaveEntries[date]||[];
              const note=dayNotes[date];
              const conflicts=SLOTS.map(sl=>{const init=getAssigned(date,sl.key);return init&&hasConflict(init,date)?init:null;}).filter(Boolean);
              return (
                <tr key={date} className={we?"we-row":""}>
                  <td className={`bld-date-col${we?" we-row":""}${isBH?" bh-row":""}${isToday?" td-row":""}`}
                    style={{cursor:"pointer"}} onClick={()=>{setNM(date);setNT(dayNotes[date]||"");}}>
                    <div style={{fontSize:12,fontWeight:700,color:isToday?"#065f46":we?"#6d28d9":"#0d1b2a"}}>{getDayName(date)} {new Date(date+"T00:00:00").getDate()}</div>
                    <div style={{fontSize:9.5,color:"#94a3b8"}}>{new Date(date+"T00:00:00").toLocaleDateString("en-GB",{month:"short",year:"numeric"})}</div>
                    {isBH&&<div style={{fontSize:8,background:"#fde047",color:"#713f12",padding:"1px 4px",borderRadius:2,marginTop:2}}>{BH[date]}</div>}
                    {note&&<div style={{fontSize:8,color:"#92400e",marginTop:2}}>📌 {note.slice(0,20)}</div>}
                    {conflicts.length>0&&<div style={{fontSize:8,color:"#ef4444",fontWeight:700,marginTop:2}}>⚠️ Conflict</div>}
                  </td>
                  {SLOTS.map(sl=>{
                    const applicable=dateSlots.some(s=>s.key===sl.key);
                    const init=getAssigned(date,sl.key);
                    const av = init ? getAvail(init, date) : null;
                    const conflict = init && (av?.base === "UNAVAILABLE" || av?.base === "SL" || av?.base === "MILITARY");
                    const staffMember = init ? activeStaff.find(s=>s.init===init) : null;
                    const pref = init && av?.base && !conflict
                      ? isSlotPreferred(availability, init, date, sl.key, staffMember?.grade)
                      : false;
                    const availCount = applicable ? activeStaff.filter(s=>isSlotPreferred(availability,s.init,date,sl.key,s.grade)).length : 0;
                    if(!applicable) return <td key={sl.key} className="slot-cell disabled"><span style={{fontSize:9,color:"#e2e8f0"}}>—</span></td>;
                    return (
                      <td key={sl.key} className="slot-cell" style={{border:conflict?"2px solid #ef4444":"",background:init?sl.bg+"80":"white"}}
                        onClick={()=>setAM({date,slotKey:sl.key})}>
                        {init?(
                          <span className="slot-chip" style={{background:sl.bg,color:conflict?"#ef4444":sl.fg,borderColor:conflict?"#ef4444":sl.bd,border:conflict?"2px solid #ef4444":"1px solid "+sl.bd}}>
                            {init.slice(0,4)}
                            {pref && <span className="avail-dot" style={{ background: sl.fg || "#94a3b8" }} title="preferred" />}
                          </span>
                        ):<span className="slot-empty"/>}
                        {availCount>0&&<div style={{fontSize:8,background:"#dcfce7",color:"#14532d",borderRadius:8,padding:"0 3px",marginTop:1,lineHeight:"12px"}}>{availCount}✓</div>}
                      </td>
                    );
                  })}
                  <td style={{padding:"4px 6px",minWidth:120,verticalAlign:"top"}}>
                    {dayLeave.map(e=>{const lt=LEAVE_T[e.type];return lt?(
                      <div key={e.id} className="leave-row" style={{background:lt.bg,color:lt.fg,marginBottom:2}}>
                        <span>{e.init}</span><span style={{fontSize:8.5}}>{lt.abbr}</span>
                        <span style={{cursor:"pointer",fontSize:10,opacity:.7}} onClick={()=>removeLeave(date,e.id)}>×</span>
                      </div>
                    ):null;})}
                    <button className="btn bs bsm" style={{fontSize:9.5,padding:"2px 7px",marginTop:dayLeave.length>0?3:0}} onClick={()=>{setLM({date});setLF({init:"",type:"SL",note:""});}}>+ Leave</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <StaffStatsSidebar
        staff={activeStaff}
        rota={rota}
        wteConfig={wteConfig}
        staffHours={staffHours}
        selQ={selQ}
        leaveEntries={leaveEntries}
        hoursCorrections={hoursCorrections}
        setHoursCorrections={setHoursCorrections}
        addAudit={addAudit}
        currentUser={currentUser}
        availability={availability}
      />
      </div>

      {/* Assign slot modal */}
      {assignModal&&(()=>{
        const sl=SLOTS.find(s=>s.key===assignModal.slotKey);
        const cur=getAssigned(assignModal.date,assignModal.slotKey);
        const daySlots=getSlotsForDay(assignModal.date);
        const alreadyAssigned=new Set(Object.values(rota[assignModal.date]||{}).filter(Boolean));
        return (
          <Modal title={`Assign — ${sl?.label} · ${getDayName(assignModal.date)} ${fmtDisp(assignModal.date)}`} onClose={()=>setAM(null)}
            footer={<><button className="btn bs" onClick={()=>setAM(null)}>Cancel</button>{cur&&<button className="btn bd" onClick={()=>assignSlot(assignModal.date,assignModal.slotKey,null)}>Clear</button>}</>}>
            {BH[assignModal.date]&&<div className="al al-w" style={{marginBottom:12}}>🎉 Bank Holiday: {BH[assignModal.date]}</div>}
            {cur&&<div className="al al-i" style={{marginBottom:12}}>Currently: <strong>{staff.find(s=>s.init===cur)?.name||cur}</strong></div>}
            {(()=>{
              const groups={avail:[],none:[],blocked:[]};
              activeStaff.forEach(s=>{
                const av = getAvail(s.init, assignModal.date);
                const avBase = av?.base;
                const isBlocked = avBase==="UNAVAILABLE"||avBase==="SL"||avBase==="MILITARY";
                const isPreferred = !isBlocked && isSlotPreferred(availability, s.init, assignModal.date, assignModal.slotKey, s.grade);
                if(isPreferred) groups.avail.push(s);
                else if(isBlocked) groups.blocked.push(s);
                else groups.none.push(s);
              });
              const sort=arr=>[...arr].sort((a,b)=>a.name.localeCompare(b.name));
              const renderStaff=(arr,groupLabel)=>{
                if(arr.length===0) return null;
                return (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:"#94a3b8",marginBottom:5}}>{groupLabel}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                      {arr.map(s=>{
                        const av = getAvail(s.init, assignModal.date);
                        const avBase = av?.base;
                        const isBlocked = avBase==="UNAVAILABLE"||avBase==="SL"||avBase==="MILITARY";
                        const isPreferred = !isBlocked && isSlotPreferred(availability, s.init, assignModal.date, assignModal.slotKey, s.grade);
                        const busy = alreadyAssigned.has(s.init) && s.init !== cur;
                        const isSelected = s.init === cur;
                        return (
                          <button key={s.id} onClick={()=>!busy&&assignSlot(assignModal.date,assignModal.slotKey,s.init)}
                            style={{
                              padding:"8px 10px",
                              border:`2px solid ${isSelected?"#10b981":isPreferred?"#86efac":isBlocked?"#fca5a5":"#e2e8f0"}`,
                              borderLeft:`4px solid ${isSelected?"#10b981":isPreferred?"#22c55e":isBlocked?"#ef4444":"#e2e8f0"}`,
                              borderRadius:8,
                              background:isSelected?"#f0fdf4":isPreferred?"#f0fdf4":isBlocked?"#fff5f5":busy?"#f9f9f9":"white",
                              cursor:busy?"not-allowed":"pointer",
                              opacity:isBlocked?0.65:busy?0.5:1,
                              textAlign:"left",
                              transition:"all .1s"
                            }}>
                            <div style={{fontSize:11.5,fontWeight:700,color:isSelected?"#065f46":"#0d1b2a"}}>{s.name.split(" ")[0]} <span style={{opacity:.6,fontSize:10}}>{s.name.split(" ")[1]?.[0]}.</span></div>
                            <div style={{fontSize:10,color:"#64748b",marginTop:2,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
                              {s.grade}
                              {isPreferred&&<span style={{padding:"1px 4px",borderRadius:3,background:"#d1fae5",color:"#065f46",fontWeight:700,fontSize:9}}>✓ avail</span>}
                              {isBlocked&&avBase&&<span style={{padding:"1px 4px",borderRadius:3,background:"#fee2e2",color:"#7f1d1d",fontWeight:700,fontSize:9}}>{avBase}</span>}
                              {busy&&<span style={{fontSize:9,color:"#94a3b8"}}>on shift</span>}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              };
              return (
                <div>
                  {renderStaff(sort(groups.avail),"✓ Available for this slot")}
                  {renderStaff(sort(groups.none),"No preference set")}
                  {renderStaff(sort(groups.blocked),"Unavailable / Leave")}
                </div>
              );
            })()}
          </Modal>
        );
      })()}

      {/* Leave modal */}
      {leaveModal&&(
        <Modal title={`Add Leave — ${getDayName(leaveModal.date)} ${fmtDisp(leaveModal.date)}`} onClose={()=>setLM(null)}
          footer={<><button className="btn bs" onClick={()=>setLM(null)}>Cancel</button><button className="btn bp" onClick={addLeave}>Add</button></>}>
          <div className="fg"><label className="fl">Staff Member</label>
            <select className="fi" value={leaveForm.init} onChange={e=>setLF(f=>({...f,init:e.target.value}))}>
              <option value="">Select staff...</option>{activeStaff.map(s=><option key={s.id} value={s.init}>{s.name}</option>)}
            </select>
          </div>
          <div className="fg"><label className="fl">Leave Type</label>
            <select className="fi" value={leaveForm.type} onChange={e=>setLF(f=>({...f,type:e.target.value}))}>
              {Object.entries(LEAVE_T).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Note (optional)</label><input className="fi" value={leaveForm.note} onChange={e=>setLF(f=>({...f,note:e.target.value}))}/></div>
        </Modal>
      )}

      {/* Note modal */}
      {noteModal&&(
        <Modal title={`📌 Day Note — ${fmtDisp(noteModal)}`} onClose={()=>setNM(null)}
          footer={<><button className="btn bs" onClick={()=>setNM(null)}>Cancel</button><button className="btn bp" onClick={saveNote}>Save</button></>}>
          <textarea className="fta" value={noteText} onChange={e=>setNT(e.target.value)} placeholder="e.g. Short staffed — cover needed" style={{minHeight:80}}/>
        </Modal>
      )}
    </div>
  );
}
